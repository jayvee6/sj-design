<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bokeh — sj-design showcase</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f; color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      overflow: hidden;
    }
    #layer-bokeh { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .label {
      position: fixed; top: 24px; left: 24px; z-index: 10;
      font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: #8e8e93;
    }
    .label strong { color: #f5f5f7; letter-spacing: 0.04em; text-transform: none; font-size: 14px; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="label">
    sj-design / atmosphere
    <strong>Bokeh Discs</strong>
  </div>
  <div id="layer-bokeh" aria-hidden="true"></div>

  <script>
    // ─── Bokeh Discs ──────────────────────────────────────────────────────
    // Blurred colored circles drifting slowly and breathing (opacity yoyos).
    // The trick is heavy blur (40px) + very low opacity (0.04–0.11) so they
    // read as out-of-focus highlights, not visible circles. Random color
    // picks from a small palette keep the scene cohesive but non-uniform.

    const bokehLayer = document.getElementById('layer-bokeh');
    const BOKEH_COLORS = [
      'rgba(10,132,255,0.85)',  // Apple blue
      'rgba(88,86,214,0.75)',   // indigo
      'rgba(0,199,190,0.65)',   // teal
      'rgba(255,255,255,0.55)', // neutral white
      'rgba(255,159,10,0.55)',  // warm orange
    ];
    const COUNT = 10;
    const BLUR  = 40;   // px — the effect is mostly this blur

    for (let i = 0; i < COUNT; i++) {
      const color = BOKEH_COLORS[Math.floor(Math.random() * BOKEH_COLORS.length)];
      const sz = 60 + Math.random() * 120;
      const op = 0.04 + Math.random() * 0.07;
      const el = document.createElement('div');
      Object.assign(el.style, {
        position: 'absolute',
        width: sz + 'px', height: sz + 'px',
        borderRadius: '50%',
        background: `radial-gradient(circle, ${color}, transparent 68%)`,
        filter: `blur(${BLUR}px)`,
        left: Math.random() * 100 + '%',
        top:  Math.random() * 100 + '%',
        opacity: op,
        pointerEvents: 'none', willChange: 'transform, opacity',
      });
      bokehLayer.appendChild(el);

      // 9–25s drift durations, per-disc random offsets and delays so no two
      // match. Opacity target is a random multiplier of the starting opacity
      // so brighter discs stay brighter — preserves depth layering.
      gsap.to(el, {
        x: (Math.random() - 0.5) * 220,
        y: (Math.random() - 0.5) * 180,
        opacity: op * (0.35 + Math.random() * 1.1),
        duration: 9 + Math.random() * 16,
        repeat: -1, yoyo: true, ease: 'sine.inOut',
        delay: Math.random() * 9,
      });
    }
  </script>
</body>
</html>
