<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji Tunnel Vortex — sj-design showcase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f; color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      overflow: hidden;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    .label {
      position: fixed; top: 24px; left: 24px; z-index: 10;
      font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: #8e8e93;
    }
    .label strong { color: #f5f5f7; letter-spacing: 0.04em; text-transform: none; font-size: 14px; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="label">
    sj-design / emoji visualizations
    <strong>Tunnel Vortex</strong>
  </div>
  <canvas id="c"></canvas>

  <!-- Optional shared helper — inline fallback below kicks in if it 404s -->
  <script src="../lib/canvas-size.js"></script>
  <script>
    // ─── Emoji Tunnel Vortex ───────────────────────────────────────────────
    // Phyllotaxis: 280 emojis placed at golden-angle increments
    // (θ = i * 2.39996323) with radius = spread * √i. This layout
    // naturally produces Fibonacci-spiral arms with no visible seams.
    //
    // Performance trick: each emoji is rasterized once into an off-screen
    // canvas at CACHE_SIZE px, then composited with drawImage. fillText
    // at 280 calls/frame would be ~10× slower in most browsers.
    //
    // Draw order is outer → inner so small center emojis layer on top.
    // Mid frequency rotates the whole tunnel; bass inflates every emoji's
    // size in unison. The 52%-of-short-side soft fade hides the edge.

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const EMOJIS = ['🐻','🦊','🦁','🐱','🐶','🐼','🤖','🐲','🦄','🐷','🐰','🐵'];

    const GOLDEN_ANGLE = 2.39996323;
    const PHYLLO_COUNT = 280;
    const CACHE_SIZE   = 80;

    // Pre-render each emoji into its own off-screen canvas once.
    const emojiCache = (() => {
      const map = {};
      EMOJIS.forEach(e => {
        const oc = document.createElement('canvas');
        oc.width = oc.height = CACHE_SIZE;
        const octx = oc.getContext('2d');
        octx.font = `${CACHE_SIZE * 0.82}px serif`;
        octx.textAlign = 'center';
        octx.textBaseline = 'middle';
        octx.fillText(e, CACHE_SIZE / 2, CACHE_SIZE / 2);
        map[e] = oc;
      });
      return map;
    })();

    // Canvas sizing — use lib/canvas-size.js if it loaded, else inline fallback.
    // Vortex keeps its custom bass+mid computePulse() inline below — SJPulse
    // doesn't ship a matching shape, and the tunnel rotation is tuned to
    // these exact frequencies.
    if (window.SJCanvas) {
      window.SJCanvas.fit(canvas, ctx);
    } else {
      const resize = () => {
        const dpr = window.devicePixelRatio || 1;
        canvas.width  = window.innerWidth  * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width  = window.innerWidth  + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      };
      window.addEventListener('resize', resize);
      resize();
    }

    // Synthetic pulse — slow-rolling mid for tunnel rotation, punchy bass
    // for size inflation. Replace with real audio for reactivity.
    function computePulse(t) {
      const bass = Math.max(0, Math.sin(t * 2.0)) * 0.6
                 + Math.max(0, Math.sin(t * 5.3 + 1.1)) * 0.2;
      const mid  = 0.35 + 0.25 * Math.sin(t * 0.55);
      return { bass: Math.min(1, bass), mid };
    }

    let tunnelRot    = 0;
    const phylloSpread = 18;   // tightness — higher = more spread
    const phylloZoom   = 1.0;  // >1 zooms in, <1 zooms out

    function render(t) {
      const W = window.innerWidth, H = window.innerHeight;
      ctx.clearRect(0, 0, W, H);

      const { bass, mid } = computePulse(t);
      const cx = W / 2, cy = H / 2;
      const scl = (Math.min(W, H) / 600) * phylloZoom;

      // Base drift + mid-frequency acceleration. 0.003 is the idle rate
      // at 60fps; mid*0.012 is the audio-driven boost.
      tunnelRot += 0.003 + mid * 0.012;

      // Render outer → inner so the smallest center emojis sit on top.
      for (let i = PHYLLO_COUNT - 1; i >= 0; i--) {
        const angle = i * GOLDEN_ANGLE + tunnelRot;
        const r = phylloSpread * Math.sqrt(i) * scl;
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);

        // Size grows with √i (matches the phyllotaxis radius scaling so
        // outer emojis look "closer" in the tunnel illusion).
        const size = (5 + Math.sqrt(i) * 6.5) * scl * (1 + bass * 0.5);

        // Soft edge fade — band from 80%→100% of short-side/2.
        const edge  = Math.min(W, H) * 0.52;
        const alpha = Math.min(1, Math.max(0, 1 - (r - edge * 0.8) / (edge * 0.2)));
        if (size < 2 || alpha < 0.02) continue;

        const img  = emojiCache[EMOJIS[i % EMOJIS.length]];
        const half = size / 2;
        ctx.globalAlpha = alpha;
        ctx.drawImage(img, x - half, y - half, size, size);
      }
      ctx.globalAlpha = 1;
    }

    let t0;
    function frame(ts) {
      if (!t0) t0 = ts;
      render((ts - t0) / 1000);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
