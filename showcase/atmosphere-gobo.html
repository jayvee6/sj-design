<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perlin Gobos — sj-design showcase</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f; color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      overflow: hidden;
    }
    #layer-gobo { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .label {
      position: fixed; top: 24px; left: 24px; z-index: 10;
      font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: #8e8e93;
    }
    .label strong { color: #f5f5f7; letter-spacing: 0.04em; text-transform: none; font-size: 14px; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="label">
    sj-design / atmosphere
    <strong>Perlin Gobo Blobs</strong>
  </div>
  <div id="layer-gobo" aria-hidden="true"></div>

  <script>
    // ─── Perlin Gobo Blobs ────────────────────────────────────────────────
    // Four heavily-blurred colored discs whose positions drift via 2D Perlin
    // noise on a time axis. Every page load takes a unique path because the
    // permutation table is reshuffled from Math.random. The blur is the
    // effect — the discs themselves are invisible at close range; what
    // you're actually seeing is the sum of their radial gradients.

    // ── Perlin (2D gradient noise, self-contained) ────────────────────────
    const _p = new Uint8Array(512);
    (() => {
      const t = new Uint8Array(256);
      for (let i = 0; i < 256; i++) t[i] = i;
      for (let i = 255; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [t[i], t[j]] = [t[j], t[i]];
      }
      _p.set(t); _p.set(t, 256);
    })();
    const _fade = t => t * t * t * (t * (t * 6 - 15) + 10);
    const _lerp = (a, b, t) => a + t * (b - a);
    const _grad = (h, x, y) => {
      const v = h & 3;
      return v === 0 ? x + y : v === 1 ? -x + y : v === 2 ? x - y : -x - y;
    };
    function pnoise(x, y) {
      const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
      x -= Math.floor(x); y -= Math.floor(y);
      const u = _fade(x), v = _fade(y);
      const a = _p[X] + Y, b = _p[X + 1] + Y;
      return _lerp(
        _lerp(_grad(_p[a],     x,     y),     _grad(_p[b],     x - 1, y),     u),
        _lerp(_grad(_p[a + 1], x,     y - 1), _grad(_p[b + 1], x - 1, y - 1), u), v);
    }

    // ── Gobo blob config — colors, size (vw), blur (px), drift range (%) ──
    const goboLayer = document.getElementById('layer-gobo');
    const GOBO_CFG = [
      { color: 'rgba(10,132,255,0.22)', sz: 58, blur: 130, range: 22 },
      { color: 'rgba(88,86,214,0.17)',  sz: 48, blur: 110, range: 18 },
      { color: 'rgba(0,199,190,0.13)',  sz: 42, blur: 100, range: 24 },
      { color: 'rgba(41,151,255,0.10)', sz: 36, blur:  90, range: 20 },
    ];

    const blobs = GOBO_CFG.map(({ color, sz, blur, range }) => {
      const el = document.createElement('div');
      Object.assign(el.style, {
        position: 'fixed', width: sz + 'vw', height: sz + 'vw',
        borderRadius: '50%',
        background: `radial-gradient(circle, ${color}, transparent 70%)`,
        filter: `blur(${blur}px)`,
        pointerEvents: 'none', willChange: 'transform',
        top: '0', left: '0',
      });
      goboLayer.appendChild(el);
      return {
        el,
        ox: Math.random() * 100, oy: Math.random() * 100,
        cx: 15 + Math.random() * 70, cy: 15 + Math.random() * 70,
        range,
      };
    });

    // 0.038 is the time scaling — lower = slower drift. Each blob samples
    // the noise at offset (ox, oy) so they never collapse to the same path.
    gsap.ticker.add(time => {
      const t = time * 0.038;
      blobs.forEach(({ el, ox, oy, cx, cy, range }) => {
        const px = cx + pnoise(t + ox, oy)       * range;
        const py = cy + pnoise(ox,    t + oy * 1.3) * range;
        gsap.set(el, { x: px + 'vw', y: py + 'vh', xPercent: -50, yPercent: -50 });
      });
    });
  </script>
</body>
</html>
