<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project 1: Magic Move — View Transitions API</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: #0d0d0f;
      color: #f5f5f7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════
       GRID VIEW
    ═══════════════════════════════════════ */
    #grid-view {
      padding: 52px 32px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .page-header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .page-header p {
      margin-top: 10px;
      color: #6e6e73;
      font-size: 0.95rem;
    }

    .support-badge {
      display: inline-block;
      margin-top: 14px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: rgba(74, 222, 128, 0.12);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.25);
    }

    .support-badge.unsupported {
      background: rgba(248, 113, 113, 0.12);
      color: #f87171;
      border-color: rgba(248, 113, 113, 0.25);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      max-width: 540px;
      margin: 0 auto;
    }

    .card {
      cursor: pointer;
      border-radius: 18px;
      overflow: hidden;
      background: #1c1c1e;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition:
        transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.22s ease;
      will-change: transform;
    }

    .card:hover  { transform: translateY(-5px) scale(1.02); box-shadow: 0 28px 56px rgba(0,0,0,0.65); }
    .card:active { transform: scale(0.96); }

    .card-image {
      width: 100%;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.8rem;
      /* view-transition-name assigned dynamically in JS */
    }

    .card-body    { padding: 13px 15px 15px; }
    .card-title   { font-size: 0.93rem; font-weight: 600; letter-spacing: -0.01em; }
    .card-meta    { margin-top: 3px; font-size: 0.72rem; color: #555; }

    /* ═══════════════════════════════════════
       HERO VIEW
    ═══════════════════════════════════════ */
    #hero-view {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    #hero-view.active { display: flex; }

    #hero-img {
      width: 100%;
      height: 54vh;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9rem;
      /* view-transition-name: hero-image — set in JS */
    }

    .hero-content {
      flex: 1;
      padding: 38px 44px 56px;
    }

    #hero-ttl {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.08;
      /* view-transition-name: hero-title — set in JS */
    }

    #hero-meta  { margin-top: 8px; font-size: 0.8rem; color: #555; letter-spacing: 0.05em; text-transform: uppercase; }
    #hero-desc  { margin-top: 22px; color: #888; line-height: 1.8; font-size: 1rem; max-width: 460px; }

    .back-btn {
      margin-top: 38px;
      padding: 11px 24px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      color: #f5f5f7;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
    }

    .back-btn:hover  { background: rgba(255,255,255,0.13); transform: translateX(-3px); }
    .back-btn:active { transform: translateX(-1px) scale(0.97); }

    /* ═══════════════════════════════════════
       VIEW TRANSITION OVERRIDES

       When startViewTransition() fires, the browser creates a
       layered pseudo-element tree:

         ::view-transition                   ← full-screen overlay
           ::view-transition-group(root)     ← the page's root fade
           ::view-transition-group(hero-image)
             ::view-transition-image-pair(hero-image)
               ::view-transition-old(hero-image)  ← "before" screenshot
               ::view-transition-new(hero-image)  ← "after" screenshot
           ::view-transition-group(hero-title)
             ...

       Named groups animate their position + size independently (the
       MORPH effect). We can override their timing here.
    ═══════════════════════════════════════ */
    ::view-transition-old(hero-image),
    ::view-transition-new(hero-image) {
      animation-duration: 500ms;
      animation-timing-function: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    ::view-transition-old(hero-title),
    ::view-transition-new(hero-title) {
      animation-duration: 420ms;
      animation-timing-function: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      animation-delay: 40ms;
    }

    /* Everything else (not named) gets a quick root cross-fade */
    ::view-transition-old(root) { animation-duration: 200ms; }
    ::view-transition-new(root) { animation-duration: 240ms; }
  </style>
</head>
<body>

<!-- ─── GRID VIEW ──────────────────────────────────────── -->
<div id="grid-view">
  <div class="page-header">
    <h1>Magic Move</h1>
    <p>Click any card — shared elements morph seamlessly to the hero layout</p>
    <span class="support-badge" id="badge">Checking browser support…</span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- ─── HERO VIEW ──────────────────────────────────────── -->
<div id="hero-view">
  <div id="hero-img"></div>
  <div class="hero-content">
    <div id="hero-ttl"></div>
    <div id="hero-meta"></div>
    <p id="hero-desc"></p>
    <button class="back-btn" id="back-btn">← Back to Grid</button>
  </div>
</div>

<script>
/* ─────────────────────────────────────────────────────────
   DATA
───────────────────────────────────────────────────────── */
const ITEMS = [
  {
    emoji: '🌊',
    gradient: 'linear-gradient(135deg, #023e8a 0%, #0096c7 55%, #90e0ef 100%)',
    title: 'Ocean Deep',
    meta: 'Aquatic Series · No. 1',
    description: 'A study in deep ocean light and pressure gradients — silence meets infinity at 400 metres below the surface off the Azores archipelago.'
  },
  {
    emoji: '🌋',
    gradient: 'linear-gradient(135deg, #6a040f 0%, #dc2f02 55%, #f48c06 100%)',
    title: 'Magma Core',
    meta: 'Fire Series · No. 4',
    description: 'Raw geological power in crimson and amber. Shot during an active lava flow on the Big Island, Hawaii, at 2 a.m. under a moonless sky.'
  },
  {
    emoji: '🌿',
    gradient: 'linear-gradient(135deg, #1b4332 0%, #40916c 55%, #d8f3dc 100%)',
    title: 'Forest Canopy',
    meta: 'Nature Series · No. 7',
    description: 'Ancient growth rings and mossy understory. This old-growth fern grove has stood untouched for over 800 years in the Pacific Northwest.'
  },
  {
    emoji: '🌌',
    gradient: 'linear-gradient(135deg, #10002b 0%, #7b2d8b 55%, #e0aaff 100%)',
    title: 'Nebula Drift',
    meta: 'Cosmos Series · No. 2',
    description: 'A hydrogen emission cloud 6,000 light-years away — imaged over 12 consecutive nights with narrowband filters from the Atacama Desert.'
  },
];

/* ─────────────────────────────────────────────────────────
   DOM REFS
───────────────────────────────────────────────────────── */
const gridView = document.getElementById('grid-view');
const heroView = document.getElementById('hero-view');
const gridEl   = document.getElementById('grid');
const heroImg  = document.getElementById('hero-img');
const heroTtl  = document.getElementById('hero-ttl');
const heroMeta = document.getElementById('hero-meta');
const heroDesc = document.getElementById('hero-desc');
const backBtn  = document.getElementById('back-btn');
const badge    = document.getElementById('badge');

/* ─────────────────────────────────────────────────────────
   BROWSER SUPPORT
───────────────────────────────────────────────────────── */
const supportsVT = 'startViewTransition' in document;
badge.textContent = supportsVT
  ? '✓ View Transitions API supported'
  : '⚠ No API — running instant-swap fallback (use Chrome 111+)';
if (!supportsVT) badge.classList.add('unsupported');

/* ─────────────────────────────────────────────────────────
   STATE
───────────────────────────────────────────────────────── */
let activeCard = null;   // the last-clicked card DOM node

/* ─────────────────────────────────────────────────────────
   BUILD GRID
───────────────────────────────────────────────────────── */
ITEMS.forEach((item, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-image" style="background:${item.gradient}">${item.emoji}</div>
    <div class="card-body">
      <div class="card-title">${item.title}</div>
      <div class="card-meta">${item.meta}</div>
    </div>
  `;
  card.addEventListener('click', () => openHero(card, item));
  gridEl.appendChild(card);
});

/* ─────────────────────────────────────────────────────────
   KEY CONCEPT: view-transition-name

   The CSS property `view-transition-name` tells the browser
   "this element is SHARED across the before/after states —
   animate it as a self-contained layer."

   CRITICAL RULE: The name must be UNIQUE on the page at any
   given moment. Two rendered elements cannot share a name.

   Strategy: we assign names DYNAMICALLY. Only the clicked
   card gets the names — all others stay at 'none'.
   The hero elements (always hidden OR always shown — never
   both at once) can therefore safely share the same names.
───────────────────────────────────────────────────────── */
function tagCard(cardNode, on) {
  cardNode.querySelector('.card-image').style.viewTransitionName =
    on ? 'hero-image' : 'none';
  cardNode.querySelector('.card-title').style.viewTransitionName =
    on ? 'hero-title' : 'none';
}

/* ─────────────────────────────────────────────────────────
   TRANSITION RUNNER (with fallback)
───────────────────────────────────────────────────────── */
function runTransition(updateFn) {
  if (!supportsVT) { updateFn(); return; }
  document.startViewTransition(updateFn);
}

/* ─────────────────────────────────────────────────────────
   OPEN HERO

   Timeline:
   1. Tag the clicked card's children with transition names.
   2. Pre-populate hero content (while hero is still hidden).
   3. Call startViewTransition().
      a. Browser CAPTURES the current page ("before" snapshot).
         card-image and card-title are visible with names set.
      b. Our callback runs — swaps grid ↔ hero in the DOM.
      c. Browser CAPTURES the new page ("after" snapshot).
         hero-img and hero-ttl are now visible with names set.
      d. Browser ANIMATES: named layers morph position + size;
         unnamed content cross-fades via the root group.
───────────────────────────────────────────────────────── */
function openHero(card, item) {
  // Deactivate any previously tagged card
  if (activeCard && activeCard !== card) tagCard(activeCard, false);
  activeCard = card;

  // Step 1 — tag the source elements
  tagCard(card, true);

  // Step 2 — populate hero (heroView is display:none, so these
  //           elements exist in the DOM but are NOT rendered yet
  //           and won't appear in the "before" snapshot)
  heroImg.style.background = item.gradient;
  heroImg.textContent = item.emoji;
  heroImg.style.viewTransitionName = 'hero-image';   // matches card-image
  heroTtl.textContent = item.title;
  heroTtl.style.viewTransitionName = 'hero-title';   // matches card-title
  heroMeta.textContent = item.meta;
  heroDesc.textContent = item.description;

  // Step 3 — fire the transition; the callback is the DOM swap
  runTransition(() => {
    gridView.style.display = 'none';
    heroView.classList.add('active');    // display: flex
  });
}

/* ─────────────────────────────────────────────────────────
   CLOSE HERO (back to grid)

   Reverse journey: browser captures hero as "before", then
   the callback reveals the grid — activeCard still has the
   matching transition names, so the morph plays in reverse.
───────────────────────────────────────────────────────── */
function closeHero() {
  runTransition(() => {
    heroView.classList.remove('active');
    gridView.style.display = '';
  });
  // We intentionally leave activeCard's names intact so the
  // reverse morph works. They'll be cleaned up on next click.
}

backBtn.addEventListener('click', closeHero);
</script>
</body>
</html>
