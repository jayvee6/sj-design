<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity Loop — sj-design showcase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 50%, #0a0a22 0%, #030308 70%);
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      overflow: hidden;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    .label {
      position: fixed; top: 24px; left: 24px; z-index: 10;
      font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: #8e8e93;
    }
    .label strong { color: #f5f5f7; letter-spacing: 0.04em; text-transform: none; font-size: 14px; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="label">
    sj-design / emoji formations
    <strong>Infinity Loop</strong>
  </div>
  <canvas id="c"></canvas>

  <!-- Optional shared helpers — inline fallbacks below kick in if they 404 -->
  <script src="../../lib/canvas-size.js"></script>
  <script src="../../lib/synthetic-pulse.js"></script>
  <script src="../../lib/envelopes.js"></script>
  <script>
    // ─── Infinity Loop ────────────────────────────────────────────────────
    // 12 cosmic emojis flow along a Bernoulli lemniscate (figure-eight).
    // Parametric form:
    //
    //   x(u) = a · cos(u) / (1 + sin²(u))
    //   y(u) = a · sin(u)·cos(u) / (1 + sin²(u))
    //
    // As u sweeps [0, 2π] the point traces both lobes smoothly, crossing
    // the origin at u = π/2 and u = 3π/2 (where the curve self-intersects
    // — the "pinch" point of the infinity).
    //
    // Each emoji sits at u_k(t) = t·ω + k·(2π/12), so all 12 share one
    // angular velocity and stay evenly phased around the loop.
    //
    // Pulse effect is on the **trail length**, not the positions. We fade
    // the canvas each frame via `destination-out` compositing (removing
    // alpha, revealing the CSS gradient behind). Higher pulse → lower
    // fade alpha → longer trails. A kick stretches the comet tails behind
    // every emoji.

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const EMOJIS = ['🪐','🌙','⭐','☄️','🌠','✨','🌌','💫','🌟','🪄','🔮','🌀'];
    const N = EMOJIS.length;

    // Canvas sizing — prefers lib/canvas-size.js (SJCanvas).
    if (window.SJCanvas) {
      window.SJCanvas.fit(canvas, ctx);
    } else {
      const resize = () => {
        const dpr = window.devicePixelRatio || 1;
        canvas.width  = window.innerWidth  * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width  = window.innerWidth  + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      };
      window.addEventListener('resize', resize);
      resize();
    }

    const pulseEnv = window.VizEnv
      ? new window.VizEnv.Envelope({ attack: 0.020, release: 0.35 })
      : null;
    let fallbackPulse = 0;

    function rawPulse(t) {
      return window.SJPulse
        ? window.SJPulse.kick(t)
        : Math.min(
            1,
            Math.pow(Math.max(0, Math.sin(t * 2.2)), 2) * 0.9
              + Math.max(0, Math.sin(t * 5.1 + 1.3)) * 0.35
          );
    }

    function smoothPulse(t, dt) {
      const raw = rawPulse(t);
      if (pulseEnv) return pulseEnv.follow(raw, dt);
      fallbackPulse += (raw - fallbackPulse) * Math.min(1, dt * 8);
      return fallbackPulse;
    }

    // Bernoulli lemniscate, parametric form. Returns (x, y) in half-width `a` units.
    function lemniscate(u, a) {
      const s = Math.sin(u), c = Math.cos(u);
      const denom = 1 + s * s;
      return { x: a * c / denom, y: a * s * c / denom };
    }

    const OMEGA = 0.55;  // rad/sec — emoji takes ~11.4s to complete the figure-8

    function render(t, dt) {
      const W = window.innerWidth, H = window.innerHeight;
      const pulse = smoothPulse(t, dt);

      // Trail fade — destination-out removes alpha from old content,
      // revealing the CSS gradient behind. Lower alpha = longer trails.
      const fadeAlpha = 0.30 - pulse * 0.22;   // 0.30 idle → 0.08 on peak
      ctx.save();
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = `rgba(0, 0, 0, ${fadeAlpha})`;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();

      const cx = W / 2, cy = H / 2;
      const a  = Math.min(W, H) * 0.38;     // half-width of the infinity
      const size = 44;                       // constant size — trails carry the drama

      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `${size}px -apple-system, system-ui, serif`;

      for (let k = 0; k < N; k++) {
        const u = t * OMEGA + k * (Math.PI * 2 / N);
        const p = lemniscate(u, a);
        ctx.fillText(EMOJIS[k], cx + p.x, cy + p.y);
      }
    }

    let t0, tPrev;
    function frame(ts) {
      if (t0 === undefined) { t0 = ts; tPrev = ts; }
      const t  = (ts - t0)    / 1000;
      const dt = Math.min(0.1, (ts - tPrev) / 1000);
      tPrev = ts;
      render(t, dt);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
