<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shape Morph — sj-design showcase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 50%, #0c1322 0%, #04040a 70%);
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      overflow: hidden;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    .label {
      position: fixed; top: 24px; left: 24px; z-index: 10;
      font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: #8e8e93;
    }
    .label strong { color: #f5f5f7; letter-spacing: 0.04em; text-transform: none; font-size: 14px; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="label">
    sj-design / emoji formations
    <strong>Shape Morph</strong>
  </div>
  <canvas id="c"></canvas>

  <!-- Optional shared helpers — inline fallbacks below kick in if they 404 -->
  <script src="../../lib/canvas-size.js"></script>
  <script src="../../lib/synthetic-pulse.js"></script>
  <script src="../../lib/envelopes.js"></script>
  <script>
    // ─── Shape Morph ──────────────────────────────────────────────────────
    // 24 emojis traced around a regular N-gon's perimeter, where N itself
    // continuously morphs triangle → square → pentagon → hexagon → (repeat).
    //
    // Placement: each shape is resampled to the SAME M arc-length perimeter
    // points — emoji m sits at perimeter position s = (m/M)·n, decomposed
    // into edge floor(s) + fraction frac(s), lerped between that edge's two
    // vertices. Because both keyframe shapes use the identical M-point
    // parameterization (first point at the top, −π/2), morphing between a
    // square and a pentagon is a well-defined per-point lerp — a fractional
    // "4.5-gon" is simply the halfway blend.
    //
    // The morph: a keyframe clock advances with time, its rate rising with
    // the pulse (energetic signal → faster morph). The stepped target side
    // count [3,4,5,6] is eased into a *continuous* `sides` by a VizEnv
    // envelope follower; we then render lerp(floor-gon, ceil-gon, frac).
    //
    //   sides   = VizEnv.follow(sides, KEYFRAMES[⌊clock⌋ % 4], dt)
    //   pos_m   = lerp(ngonPoints(⌊sides⌋)[m], ngonPoints(⌈sides⌉)[m], frac)

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const EMOJIS = ['🔶','🔷','🔸','🔹','💠','🟠','🟡','🟢','🔵','🟣','🟥','🟦'];
    const M = 24;   // emojis around the perimeter

    // Canvas sizing — prefers lib/canvas-size.js (SJCanvas).
    if (window.SJCanvas) {
      window.SJCanvas.fit(canvas, ctx);
    } else {
      const resize = () => {
        const dpr = window.devicePixelRatio || 1;
        canvas.width  = window.innerWidth  * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width  = window.innerWidth  + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      };
      window.addEventListener('resize', resize);
      resize();
    }

    const pulseEnv = window.VizEnv
      ? new window.VizEnv.Envelope({ attack: 0.015, release: 0.26 })
      : null;
    let fallbackPulse = 0;

    function rawPulse(t) {
      return window.SJPulse
        ? window.SJPulse.kick(t)
        : Math.min(
            1,
            Math.pow(Math.max(0, Math.sin(t * 2.2)), 2) * 0.9
              + Math.max(0, Math.sin(t * 5.1 + 1.3)) * 0.35
          );
    }

    function smoothPulse(t, dt) {
      const raw = rawPulse(t);
      if (pulseEnv) return pulseEnv.follow(raw, dt);
      fallbackPulse += (raw - fallbackPulse) * Math.min(1, dt * 8);
      return fallbackPulse;
    }

    // Regular N-gon vertices in the shape's own coord space (centered at 0).
    // First vertex at the top (−π/2).
    function ngonVertices(n, R, rot) {
      const verts = [];
      for (let k = 0; k < n; k++) {
        const a = rot - Math.PI / 2 + k * (Math.PI * 2 / n);
        verts.push({ x: R * Math.cos(a), y: R * Math.sin(a) });
      }
      return verts;
    }

    // Resample an n-gon to M arc-length perimeter points. Every shape gets
    // the SAME M points with the SAME starting phase, so point m of a
    // triangle and point m of a hexagon correspond — a per-point lerp
    // between them is a clean morph.
    function ngonPoints(n, R, rot) {
      const verts = ngonVertices(n, R, rot);
      const pts = new Array(M);
      for (let m = 0; m < M; m++) {
        const s  = (m / M) * n;
        const e  = Math.floor(s) % n;
        const f  = s - Math.floor(s);
        const v0 = verts[e];
        const v1 = verts[(e + 1) % n];
        pts[m] = { x: v0.x + (v1.x - v0.x) * f, y: v0.y + (v1.y - v0.y) * f };
      }
      return pts;
    }

    const KEYFRAMES = [3, 4, 5, 6];   // triangle → square → pentagon → hexagon
    const ROT_RATE  = 0.16;           // rad/sec — gentle spin

    // VizEnv eases the stepped target side count into a continuous value.
    // ~0.9s attack/release settles each morph well within the keyframe
    // interval, so shapes "arrive" before the next target jumps.
    const sidesEnv = window.VizEnv
      ? new window.VizEnv.Envelope({ attack: 0.9, release: 0.9, initial: 3 })
      : null;
    let sidesFallback = 3;
    let morphClock = 0;

    function render(t, dt) {
      const W = window.innerWidth, H = window.innerHeight;
      ctx.clearRect(0, 0, W, H);

      const pulse = smoothPulse(t, dt);
      const cx = W / 2, cy = H / 2;

      // Keyframe clock — advances faster when the pulse is hot.
      morphClock += dt * (0.32 + pulse * 0.55);
      const targetSides = KEYFRAMES[Math.floor(morphClock) % KEYFRAMES.length];

      // Ease the stepped target into a continuous side count.
      let sides;
      if (sidesEnv) {
        sides = sidesEnv.follow(targetSides, dt);
      } else {
        sidesFallback += (targetSides - sidesFallback) * Math.min(1, dt * 1.1);
        sides = sidesFallback;
      }
      sides = Math.max(3, sides);

      const R    = Math.min(W, H) * 0.30 * (1 + 0.14 * pulse);
      const rot  = t * ROT_RATE;
      const size = 40 + pulse * 20;

      // Fractional polygon = lerp(floor-gon points, ceil-gon points, frac).
      const nLo   = Math.floor(sides);
      const nHi   = Math.ceil(sides);
      const fr    = sides - nLo;
      const ptsLo = ngonPoints(nLo, R, rot);
      const ptsHi = nHi === nLo ? ptsLo : ngonPoints(nHi, R, rot);

      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `${size}px -apple-system, system-ui, serif`;

      for (let m = 0; m < M; m++) {
        const a = ptsLo[m], b = ptsHi[m];
        const x = cx + a.x + (b.x - a.x) * fr;
        const y = cy + a.y + (b.y - a.y) * fr;
        ctx.globalAlpha = 0.85 + pulse * 0.15;
        ctx.fillText(EMOJIS[m % EMOJIS.length], x, y);
      }
      ctx.globalAlpha = 1;
    }

    let t0, tPrev;
    function frame(ts) {
      if (t0 === undefined) { t0 = ts; tPrev = ts; }
      const t  = (ts - t0)    / 1000;
      const dt = Math.min(0.1, (ts - tPrev) / 1000);
      tPrev = ts;
      render(t, dt);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
