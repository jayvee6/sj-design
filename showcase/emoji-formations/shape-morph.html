<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shape Morph — sj-design showcase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 50%, #0c1322 0%, #04040a 70%);
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      overflow: hidden;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    .label {
      position: fixed; top: 24px; left: 24px; z-index: 10;
      font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: #8e8e93;
    }
    .label strong { color: #f5f5f7; letter-spacing: 0.04em; text-transform: none; font-size: 14px; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="label">
    sj-design / emoji formations
    <strong>Shape Morph</strong>
  </div>
  <canvas id="c"></canvas>

  <!-- Optional shared helpers — inline fallbacks below kick in if they 404 -->
  <script src="../../lib/canvas-size.js"></script>
  <script src="../../lib/synthetic-pulse.js"></script>
  <script src="../../lib/envelopes.js"></script>
  <script>
    // ─── Shape Morph (part 1: static N-gon) ───────────────────────────────
    // 24 emojis traced around a regular N-gon's perimeter via arc-length
    // placement: divide the perimeter into M equal steps; emoji m sits at
    // perimeter position s = (m/M)·N, which decomposes into an edge index
    // floor(s) and a fraction frac(s) — then linearly interpolate between
    // that edge's two vertices. Emojis ride the straight edges, so the
    // polygon's silhouette is unmistakable at any N.
    //
    //   ngonVertices(n, R, rot): n points at rot − π/2 + k·(2π/n)
    //   pos_m = lerp(V[floor(s)], V[(floor(s)+1) % n], frac(s)),  s = (m/M)·n
    //
    // This chunk fixes N = 5 (pentagon) with a gentle rotation + pulse
    // breathing. Part 2 (C6b) swaps the constant N for a VizEnv-eased
    // keyframe morph triangle→square→pentagon→hexagon — the vertex
    // generator and placement here are written N-generic so the morph
    // only has to animate the `sides` value.

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const EMOJIS = ['🔶','🔷','🔸','🔹','💠','🟠','🟡','🟢','🔵','🟣','🟥','🟦'];
    const M = 24;   // emojis around the perimeter

    // Canvas sizing — prefers lib/canvas-size.js (SJCanvas).
    if (window.SJCanvas) {
      window.SJCanvas.fit(canvas, ctx);
    } else {
      const resize = () => {
        const dpr = window.devicePixelRatio || 1;
        canvas.width  = window.innerWidth  * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width  = window.innerWidth  + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      };
      window.addEventListener('resize', resize);
      resize();
    }

    const pulseEnv = window.VizEnv
      ? new window.VizEnv.Envelope({ attack: 0.015, release: 0.26 })
      : null;
    let fallbackPulse = 0;

    function rawPulse(t) {
      return window.SJPulse
        ? window.SJPulse.kick(t)
        : Math.min(
            1,
            Math.pow(Math.max(0, Math.sin(t * 2.2)), 2) * 0.9
              + Math.max(0, Math.sin(t * 5.1 + 1.3)) * 0.35
          );
    }

    function smoothPulse(t, dt) {
      const raw = rawPulse(t);
      if (pulseEnv) return pulseEnv.follow(raw, dt);
      fallbackPulse += (raw - fallbackPulse) * Math.min(1, dt * 8);
      return fallbackPulse;
    }

    // Regular N-gon vertices in the shape's own coord space (centered at 0).
    // First vertex at the top (−π/2). Written N-generic — C6b animates `n`.
    function ngonVertices(n, R, rot) {
      const verts = [];
      for (let k = 0; k < n; k++) {
        const a = rot - Math.PI / 2 + k * (Math.PI * 2 / n);
        verts.push({ x: R * Math.cos(a), y: R * Math.sin(a) });
      }
      return verts;
    }

    const SIDES    = 5;     // C6b will animate this
    const ROT_RATE = 0.16;  // rad/sec — gentle spin

    function render(t, dt) {
      const W = window.innerWidth, H = window.innerHeight;
      ctx.clearRect(0, 0, W, H);

      const pulse = smoothPulse(t, dt);
      const cx = W / 2, cy = H / 2;

      const R     = Math.min(W, H) * 0.30 * (1 + 0.14 * pulse);
      const rot   = t * ROT_RATE;
      const size  = 40 + pulse * 20;
      const verts = ngonVertices(SIDES, R, rot);

      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `${size}px -apple-system, system-ui, serif`;

      for (let m = 0; m < M; m++) {
        const s  = (m / M) * SIDES;          // perimeter position in edge units
        const e  = Math.floor(s) % SIDES;    // edge index
        const f  = s - Math.floor(s);        // fraction along that edge
        const v0 = verts[e];
        const v1 = verts[(e + 1) % SIDES];
        const x  = cx + v0.x + (v1.x - v0.x) * f;
        const y  = cy + v0.y + (v1.y - v0.y) * f;
        ctx.globalAlpha = 0.85 + pulse * 0.15;
        ctx.fillText(EMOJIS[m % EMOJIS.length], x, y);
      }
      ctx.globalAlpha = 1;
    }

    let t0, tPrev;
    function frame(ts) {
      if (t0 === undefined) { t0 = ts; tPrev = ts; }
      const t  = (ts - t0)    / 1000;
      const dt = Math.min(0.1, (ts - tPrev) / 1000);
      tPrev = ts;
      render(t, dt);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
