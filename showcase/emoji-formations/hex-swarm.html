<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hexagonal Swarm — sj-design showcase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 50%, #0a1f14 0%, #04040a 70%);
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      overflow: hidden;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    .label {
      position: fixed; top: 24px; left: 24px; z-index: 10;
      font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: #8e8e93;
    }
    .label strong { color: #f5f5f7; letter-spacing: 0.04em; text-transform: none; font-size: 14px; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="label">
    sj-design / emoji formations
    <strong>Hexagonal Swarm</strong>
  </div>
  <canvas id="c"></canvas>

  <!-- Optional shared helpers — inline fallbacks below kick in if they 404 -->
  <script src="../../lib/canvas-size.js"></script>
  <script src="../../lib/synthetic-pulse.js"></script>
  <script src="../../lib/envelopes.js"></script>
  <script>
    // ─── Hexagonal Swarm ──────────────────────────────────────────────────
    // 12 emojis traced around a pointy-top regular hexagon via polar form.
    // At the 6 vertex angles the distance is the full circumradius `a`; at
    // the 6 edge-midpoint angles it's the apothem a·√3/2, so emojis visibly
    // "dip" inward between vertices — the hexagon reads as a hexagon, not a
    // circle. The whole shape rotates slowly and pulse scales emoji size.
    //
    // Polar form (pointy-top, vertex at θ = 0):
    //   φ(θ)   = (θ mod π/3) − π/6              ∈ [−π/6, π/6]
    //   r(θ)   = a · cos(π/6) / cos(φ)
    //            → a at vertices (φ = ±π/6), a·√3/2 at midpoints (φ = 0)
    //
    // Position per emoji:
    //   θ_k(t) = t·ω + k · (2π/N)               (N = 12)
    //   x_k    = r(θ_k) · cos(θ_k)
    //   y_k    = r(θ_k) · sin(θ_k)

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const EMOJIS = ['🌸','🌺','🌻','🌷','🌹','🌼'];  // 6 flowers, repeated twice across 12 slots

    // Canvas sizing — prefers lib/canvas-size.js (SJCanvas).
    if (window.SJCanvas) {
      window.SJCanvas.fit(canvas, ctx);
    } else {
      const resize = () => {
        const dpr = window.devicePixelRatio || 1;
        canvas.width  = window.innerWidth  * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width  = window.innerWidth  + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      };
      window.addEventListener('resize', resize);
      resize();
    }

    const pulseEnv = window.VizEnv
      ? new window.VizEnv.Envelope({ attack: 0.020, release: 0.25 })
      : null;
    let fallbackPulse = 0;

    function rawPulse(t) {
      return window.SJPulse
        ? window.SJPulse.kick(t)
        : Math.min(
            1,
            Math.pow(Math.max(0, Math.sin(t * 2.2)), 2) * 0.9
              + Math.max(0, Math.sin(t * 5.1 + 1.3)) * 0.35
          );
    }

    function smoothPulse(t, dt) {
      const raw = rawPulse(t);
      if (pulseEnv) return pulseEnv.follow(raw, dt);
      fallbackPulse += (raw - fallbackPulse) * Math.min(1, dt * 8);
      return fallbackPulse;
    }

    const N       = 12;              // emojis around the hex
    const OMEGA   = 0.30;            // rad/sec — gentle spin
    const APOTHEM = Math.cos(Math.PI / 6);  // √3/2

    // Polar distance from center at angle θ, for unit circumradius.
    function hexR(theta) {
      let phi = ((theta % (Math.PI / 3)) + Math.PI / 3) % (Math.PI / 3) - Math.PI / 6;
      return APOTHEM / Math.cos(phi);
    }

    function render(t, dt) {
      const W = window.innerWidth, H = window.innerHeight;
      ctx.clearRect(0, 0, W, H);

      const pulse = smoothPulse(t, dt);
      const cx = W / 2, cy = H / 2;
      const a  = Math.min(W, H) * 0.28;            // circumradius
      const size = 44 + pulse * 22;                // 44..66 px per emoji

      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `${size}px -apple-system, system-ui, serif`;

      for (let k = 0; k < N; k++) {
        const theta  = t * OMEGA + k * (Math.PI * 2 / N);
        const radius = a * hexR(theta);
        const x = cx + radius * Math.cos(theta);
        const y = cy + radius * Math.sin(theta);
        ctx.globalAlpha = 0.80 + pulse * 0.20;
        ctx.fillText(EMOJIS[k % EMOJIS.length], x, y);
      }
      ctx.globalAlpha = 1;
    }

    let t0, tPrev;
    function frame(ts) {
      if (t0 === undefined) { t0 = ts; tPrev = ts; }
      const t  = (ts - t0)    / 1000;
      const dt = Math.min(0.1, (ts - tPrev) / 1000);
      tPrev = ts;
      render(t, dt);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
