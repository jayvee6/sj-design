<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triangle Orbit — sj-design showcase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 50%, #14081f 0%, #04040a 70%);
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      overflow: hidden;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    .label {
      position: fixed; top: 24px; left: 24px; z-index: 10;
      font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: #8e8e93;
    }
    .label strong { color: #f5f5f7; letter-spacing: 0.04em; text-transform: none; font-size: 14px; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="label">
    sj-design / emoji formations
    <strong>Triangle Orbit</strong>
  </div>
  <canvas id="c"></canvas>

  <!-- Optional shared helpers — inline fallbacks below kick in if they 404 -->
  <script src="../../lib/canvas-size.js"></script>
  <script src="../../lib/synthetic-pulse.js"></script>
  <script src="../../lib/envelopes.js"></script>
  <script>
    // ─── Triangle Orbit ───────────────────────────────────────────────────
    // Three emojis rotating around screen center at 120° apart. The angular
    // velocity is constant; the radius and emoji size "breathe" with the
    // synthetic pulse so a kick pushes them outward and makes them briefly
    // larger. This is the simplest formation — pure polar coords + time.
    //
    //   angle_k(t) = t·ω + k · 2π/3             (k = 0, 1, 2)
    //   radius(t)  = r0 · (1 + 0.30 · pulse)
    //   size(t)    = 56 + 24 · pulse
    //
    // VizEnv smooths the pulse so the size/radius transitions read as
    // punchy-but-not-strobing. With no audio, the synthetic SJPulse.kick
    // provides the signal — swap for an audio frame's bass value to make
    // this viz sound-reactive.

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const EMOJIS = ['⭐', '✨', '🌟'];

    // Canvas sizing — prefers lib/canvas-size.js (SJCanvas).
    if (window.SJCanvas) {
      window.SJCanvas.fit(canvas, ctx);
    } else {
      const resize = () => {
        const dpr = window.devicePixelRatio || 1;
        canvas.width  = window.innerWidth  * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width  = window.innerWidth  + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      };
      window.addEventListener('resize', resize);
      resize();
    }

    // Pulse envelope — snap up on kick, ease down. Smoother visual than
    // reading the raw SJPulse signal per frame.
    const pulseEnv = window.VizEnv
      ? new window.VizEnv.Envelope({ attack: 0.015, release: 0.22 })
      : null;
    let fallbackPulse = 0;

    function rawPulse(t) {
      return window.SJPulse
        ? window.SJPulse.kick(t)
        : Math.min(
            1,
            Math.pow(Math.max(0, Math.sin(t * 2.2)), 2) * 0.9
              + Math.max(0, Math.sin(t * 5.1 + 1.3)) * 0.35
          );
    }

    function smoothPulse(t, dt) {
      const raw = rawPulse(t);
      if (pulseEnv) return pulseEnv.follow(raw, dt);
      // Ad-hoc exponential follower if VizEnv didn't load.
      fallbackPulse += (raw - fallbackPulse) * Math.min(1, dt * 8);
      return fallbackPulse;
    }

    const OMEGA = 0.55;  // rad/sec — ~1 full turn every 11.4 sec

    function render(t, dt) {
      const W = window.innerWidth, H = window.innerHeight;
      ctx.clearRect(0, 0, W, H);

      const pulse = smoothPulse(t, dt);
      const cx = W / 2, cy = H / 2;

      // Radius: base 22% of short side, breathes up to +30% on peak pulse.
      const baseR  = Math.min(W, H) * 0.22;
      const radius = baseR * (1 + pulse * 0.30);

      // Size: 56px baseline, grows to 80px on peak. Bigger = more presence.
      const emojiSize = 56 + pulse * 24;

      // Baseline rotation advances with time; each emoji sits 120° further
      // around the ring. Same angular velocity for all three — a true
      // rigid-body orbit, not independent agents.
      const baseAngle = t * OMEGA;

      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `${emojiSize}px -apple-system, system-ui, serif`;

      for (let k = 0; k < 3; k++) {
        const angle = baseAngle + k * (Math.PI * 2 / 3);
        const x = cx + radius * Math.cos(angle);
        const y = cy + radius * Math.sin(angle);
        ctx.globalAlpha = 0.85 + pulse * 0.15;  // brighter on peak
        ctx.fillText(EMOJIS[k], x, y);
      }
      ctx.globalAlpha = 1;
    }

    let t0, tPrev;
    function frame(ts) {
      if (t0 === undefined) { t0 = ts; tPrev = ts; }
      const t  = (ts - t0)    / 1000;
      const dt = Math.min(0.1, (ts - tPrev) / 1000);
      tPrev = ts;
      render(t, dt);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
