<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kitchen Remodel Memo</title>
<style>
:root{
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
  --label-1:#fff;--label-2:rgba(255,255,255,.55);--label-3:rgba(255,255,255,.25);
  --accent:#0A84FF;--accent-glow:rgba(10,132,255,.35);
  --fill-1:rgba(255,255,255,.04);--fill-2:rgba(255,255,255,.08);
  --sep:rgba(255,255,255,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);color:var(--label-1);min-height:100vh;background:#000;
  background-image:radial-gradient(ellipse at 35% 15%,#1A237E 0%,#191970 28%,#0d0d3a 58%,#050510 100%);
  background-attachment:fixed}
.wrap{max-width:780px;margin:0 auto;padding:32px 20px 50vh}
h1{font-size:28px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.meta{color:var(--label-2);font-size:14px;margin-bottom:24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 10px;border-radius:999px;background:var(--fill-2);
  border:1px solid var(--sep);font-size:12px;text-transform:uppercase;letter-spacing:.06em}
.player{position:sticky;top:16px;z-index:10;border-radius:18px;padding:14px 18px;
  background:rgba(255,255,255,.065);backdrop-filter:blur(12px) saturate(200%);
  -webkit-backdrop-filter:blur(12px) saturate(200%);
  border:1px solid rgba(255,255,255,.14);
  box-shadow:inset 0 1.5px 0 rgba(255,255,255,.48),inset 1px 0 0 rgba(255,255,255,.10),
    inset -1px 0 0 rgba(255,255,255,.06),inset 0 -1.5px 0 rgba(0,0,0,.22),
    0 8px 32px rgba(0,0,0,.38),0 1px 2px rgba(0,0,0,.18);
  display:flex;align-items:center;gap:14px;margin-bottom:28px}
.btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;flex:none;
  background:var(--accent);display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.28),inset 0 -1px 0 rgba(0,0,0,.22),0 2px 10px var(--accent-glow)}
.btn svg{width:18px;height:18px;fill:#fff}
.time{font-variant-numeric:tabular-nums;font-size:13px;color:var(--label-2);flex:none;min-width:92px;text-align:center}
.seek{flex:1;appearance:none;-webkit-appearance:none;height:6px;border-radius:3px;
  background:var(--fill-2);outline:none;cursor:pointer}
.seek::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.rate{flex:none;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.09);
  color:var(--label-1);border-radius:999px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:var(--font)}
.seg{display:grid;grid-template-columns:64px 1fr;gap:14px;padding:14px 6px;border-bottom:1px solid var(--sep)}
.ts{color:var(--accent);font-size:13px;font-variant-numeric:tabular-nums;cursor:pointer;padding-top:4px}
.ts:hover{text-decoration:underline}
.orig{font-size:18px;line-height:1.65}
.orig[dir=rtl]{font-size:21px;line-height:1.9;text-align:right}
.w{cursor:pointer;border-radius:5px;transition:background .12s}
.w:hover{background:var(--fill-2)}
.w.active{background:var(--accent);color:#fff;box-shadow:0 0 14px var(--accent-glow)}
.tr{color:var(--label-2);font-size:15px;line-height:1.6;margin-top:6px;font-style:italic}
</style>
</head>

<script>
const D = JSON.parse(document.getElementById('data').textContent);
const audio = document.getElementById('audio');
audio.src = D.audio;
const fmt = s => { s = Math.max(0, Math.floor(s)); return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); };

const meta = document.getElementById('meta');
meta.innerHTML = '<span class="badge">' + D.languageName + '</span>'
  + (D.hasTranslation ? '<span class="badge">English translation</span>' : '')
  + '<span>' + fmt(D.duration) + '</span>';

const tEl = document.getElementById('transcript');
const words = [];
for (const seg of D.segments) {
  const row = document.createElement('div'); row.className = 'seg';
  const ts = document.createElement('div'); ts.className = 'ts'; ts.textContent = fmt(seg.start);
  ts.onclick = () => { audio.currentTime = seg.start; audio.play(); };
  const body = document.createElement('div');
  const orig = document.createElement('div'); orig.className = 'orig';
  if (D.rtl) orig.dir = 'rtl';
  for (const [w, s, e] of seg.words) {
    const sp = document.createElement('span'); sp.className = 'w'; sp.textContent = w;
    sp.dataset.s = s; sp.dataset.e = e;
    sp.onclick = () => { audio.currentTime = s; audio.play(); };
    orig.appendChild(sp); words.push(sp);
  }
  body.appendChild(orig);
  if (seg.tr) { const tr = document.createElement('div'); tr.className = 'tr'; tr.textContent = seg.tr; body.appendChild(tr); }
  row.appendChild(ts); row.appendChild(body); tEl.appendChild(row);
}

const play = document.getElementById('play'), picon = document.getElementById('picon');
const seek = document.getElementById('seek'), time = document.getElementById('time'), rate = document.getElementById('rate');
const PLAY = 'M8 5v14l11-7z', PAUSE = 'M6 5h4v14H6zm8 0h4v14h-4z';
play.onclick = () => audio.paused ? audio.play() : audio.pause();
audio.onplay = () => picon.setAttribute('d', PAUSE);
audio.onpause = () => picon.setAttribute('d', PLAY);
const RATES = [1, 1.25, 1.5, 2]; let ri = 0;
rate.onclick = () => { ri = (ri+1) % RATES.length; audio.playbackRate = RATES[ri]; rate.innerHTML = RATES[ri] + '&times;'; };
let seeking = false;
seek.addEventListener('input', () => { seeking = true; });
seek.addEventListener('change', () => {
  const d = audio.duration || D.duration;
  audio.currentTime = seek.value / 1000 * d; seeking = false;
});

let ai = -1, lastScroll = 0;
// step() drives all sync; called from the rAF loop while visible, and from
// timeupdate/seeked so highlight keeps working in throttled background tabs.
function step() {
  const t = audio.currentTime, d = audio.duration || D.duration || 1;
  if (!seeking) seek.value = Math.floor(t / d * 1000);
  time.textContent = fmt(t) + ' / ' + fmt(d);
  if (ai >= 0 && t < +words[ai].dataset.s) { words[ai].classList.remove('active'); ai = -1; }
  let ni = ai;
  while (ni + 1 < words.length && +words[ni+1].dataset.s <= t) ni++;
  if (ni !== ai) {
    if (ai >= 0) words[ai].classList.remove('active');
    ai = ni;
    if (ai >= 0) {
      words[ai].classList.add('active');
      const now = performance.now();
      if (!audio.paused && now - lastScroll > 700) {
        lastScroll = now;
        words[ai].scrollIntoView({ block: 'center', behavior: 'smooth' });
      }
    }
  } else if (ai >= 0) {
    words[ai].classList.toggle('active', t <= +words[ai].dataset.e + 0.35);
  }
}
window.__step = step;
audio.addEventListener('timeupdate', step);
audio.addEventListener('seeked', step);
(function loop() { step(); requestAnimationFrame(loop); })();
</script>
