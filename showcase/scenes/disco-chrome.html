<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disco Chrome — sj-design WebGPU showcase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #010109; color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      overflow: hidden;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    .label {
      position: fixed; top: 24px; left: 24px; z-index: 10;
      font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: #8e8e93;
    }
    .label strong { color: #f5f5f7; letter-spacing: 0.04em; text-transform: none; font-size: 14px; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="label">
    sj-design / webgpu scenes
    <strong>Disco Chrome</strong>
  </div>
  <canvas id="c"></canvas>

  <!-- Optional shared helpers — compact inline fallbacks below if they 404 -->
  <script src="../../lib/synthetic-pulse.js"></script>
  <script src="../../lib/webgpu-bootstrap.js"></script>
  <script>
    // ─── Disco Chrome (WebGPU) ────────────────────────────────────────────
    // Ported from musicplayer-viz/viz/disco-chrome-wgpu.js — a ray-sphere
    // mirror ball: ~8° flat tiles, 4 orbiting colored spotlights, ACES tone
    // map, all in one fullscreen-triangle fragment shader. The original
    // shared its spin via window.vizSharedRotY (continuity with Lunar); the
    // standalone keeps a LOCAL rotation accumulator instead. bass/beat from
    // SJPulse; valence/energy drift on slow sines so the lighting breathes.

    const canvas = document.getElementById('c');

    const WGSL = /* wgsl */`
struct Uniforms {
    elapsed:    f32,
    bass:       f32,
    beat:       f32,
    rotY:       f32,
    rotX:       f32,
    _pad:       f32,
    resolution: vec2<f32>,   // offset 24
    valence:    f32,         // offset 32
    energy:     f32,         // offset 36
    _pad4:      f32,
    _pad5:      f32,
}
@group(0) @binding(0) var<uniform> u: Uniforms;

struct VSOut {
    @builtin(position) pos: vec4<f32>,
    @location(0)       uv:  vec2<f32>,
}

@vertex fn vs_main(@builtin(vertex_index) vid: u32) -> VSOut {
    var pos = array<vec2<f32>, 3>(
        vec2<f32>(-1.0, -1.0), vec2<f32>(3.0, -1.0), vec2<f32>(-1.0, 3.0),
    );
    var uvs = array<vec2<f32>, 3>(
        vec2<f32>(0.0, 0.0), vec2<f32>(2.0, 0.0), vec2<f32>(0.0, 2.0),
    );
    var out: VSOut;
    out.pos = vec4<f32>(pos[vid], 0.0, 1.0);
    out.uv  = uvs[vid];
    return out;
}

const PI:        f32 = 3.14159265359;
const SPHERE_R:  f32 = 1.0;
const TILE_STEP: f32 = 0.145;
const GROUT_W:   f32 = 0.13;

fn latLon(p: vec3<f32>) -> vec2<f32> {
    let lat = asin(clamp(p.y, -1.0, 1.0));
    let lon = atan2(p.z, p.x);
    return vec2<f32>(lat, lon);
}

fn tileNormal(p: vec3<f32>) -> vec3<f32> {
    let ll   = latLon(p);
    let tLat = (floor(ll.x / TILE_STEP) + 0.5) * TILE_STEP;
    let tLon = (floor(ll.y / TILE_STEP) + 0.5) * TILE_STEP;
    return normalize(vec3<f32>(
        cos(tLat) * cos(tLon),
        sin(tLat),
        cos(tLat) * sin(tLon),
    ));
}

fn isGrout(p: vec3<f32>) -> bool {
    let ll  = latLon(p);
    let fLa = fract(ll.x / TILE_STEP);
    let fLo = fract(ll.y / TILE_STEP);
    return fLa < GROUT_W || fLa > 1.0 - GROUT_W
        || fLo < GROUT_W || fLo > 1.0 - GROUT_W;
}

fn lightPos(i: i32) -> vec3<f32> {
    let fi    = f32(i);
    let phase = fi * (PI * 0.5);
    let ang   = phase + u.elapsed * 0.45;
    let r     = 4.8;
    let y     = 0.6 + sin(u.elapsed * 0.28 + fi * 1.3) * 0.7;
    return vec3<f32>(cos(ang) * r, y, sin(ang) * r);
}

fn lightColor(i: i32) -> vec3<f32> {
    if i == 0 { return vec3<f32>(1.00, 0.15, 0.55); }
    if i == 1 { return vec3<f32>(0.15, 0.55, 1.00); }
    if i == 2 { return vec3<f32>(0.15, 1.00, 0.80); }
    return          vec3<f32>(1.00, 0.82, 0.20);
}

fn aces(x: vec3<f32>) -> vec3<f32> {
    return clamp(
        (x * (2.51 * x + 0.03)) / (x * (2.43 * x + 0.59) + 0.14),
        vec3<f32>(0.0), vec3<f32>(1.0),
    );
}

fn raySphere(O: vec3<f32>, rd: vec3<f32>, r: f32) -> f32 {
    let b    = dot(O, rd);
    let c    = dot(O, O) - r * r;
    let disc = b * b - c;
    if disc < 0.0 { return -1.0; }
    let sq = sqrt(disc);
    let t1 = -b - sq;
    let t2 = -b + sq;
    if t1 > 0.001 { return t1; }
    if t2 > 0.001 { return t2; }
    return -1.0;
}

@fragment fn fs_main(in: VSOut) -> @location(0) vec4<f32> {
    let asp = u.resolution.x / u.resolution.y;

    let camPos = vec3<f32>(0.0, 0.40, 4.80);
    let lookAt = vec3<f32>(0.0, 0.0, 0.0);
    let fwd    = normalize(lookAt - camPos);
    let right  = normalize(cross(fwd, vec3<f32>(0.0, 1.0, 0.0)));
    let up     = cross(right, fwd);
    let ndc    = (in.uv - 0.5) * vec2<f32>(asp, 1.0);
    let rd = normalize(fwd + right * ndc.x * 0.50 + up * ndc.y * 0.50);

    let tHit = raySphere(camPos, rd, SPHERE_R);

    if tHit < 0.0 {
        let bgBase = vec3<f32>(0.006, 0.008, 0.032);
        let fc  = ndc * vec2<f32>(1.0, asp) / asp;
        let d   = length(fc);
        let ang = atan2(fc.y, fc.x);
        let rays = pow(max(0.0, cos(ang * 8.0 + u.rotY * 2.5)), 8.0);
        let fade = exp(-d * d * 3.5);
        var col  = bgBase;
        col += vec3<f32>(0.28, 0.38, 1.00) * rays * fade * (0.06 + u.bass * 0.14);
        for (var li = 0; li < 4; li++) {
            let toLight  = normalize(lightPos(li) - camPos);
            let dotCL    = max(0.0, dot(rd, toLight));
            col += lightColor(li) * pow(dotCL, 10.0) * 0.015 * (1.0 + u.bass);
        }
        return vec4<f32>(aces(col), 1.0);
    }

    let hitP = camPos + tHit * rd;

    let cosR    = cos(u.rotY);
    let sinR    = sin(u.rotY);
    let hitPRot = vec3<f32>(
         hitP.x * cosR + hitP.z * sinR,
         hitP.y,
        -hitP.x * sinR + hitP.z * cosR,
    );

    if isGrout(hitPRot) {
        return vec4<f32>(0.001, 0.001, 0.003, 1.0);
    }

    let tileN_rot = tileNormal(hitPRot);
    let tileN = normalize(vec3<f32>(
         tileN_rot.x * cosR - tileN_rot.z * sinR,
         tileN_rot.y,
         tileN_rot.x * sinR + tileN_rot.z * cosR,
    ));

    let reflDir = reflect(rd, tileN);
    var col = vec3<f32>(0.0);

    let valenceBoostWarm = 0.7 + u.valence * 0.6;
    let valenceBoostCool = 1.3 - u.valence * 0.6;
    let flashBright = 22.0 + u.bass * 30.0 + u.beat * 20.0;
    for (var i = 0; i < 4; i++) {
        let lDir = normalize(lightPos(i) - hitP);
        let d    = max(0.0, dot(reflDir, lDir));
        let valenceFactor = select(valenceBoostCool, valenceBoostWarm, (i & 1) == 0);
        col += lightColor(i) * pow(d, 60.0) * flashBright * valenceFactor;
        col += lightColor(i) * pow(d, 6.0) * 0.20 * valenceFactor;
    }

    let envUp    = max(0.0,  reflDir.y);
    let envDown  = max(0.0, -reflDir.y);
    let envFront = max(0.0, -dot(reflDir, rd));

    col += vec3<f32>(0.04, 0.09, 0.65) * (0.20 + envUp * 1.20) * (1.0 + u.energy * 1.17);
    col += vec3<f32>(0.20, 0.25, 0.90) * pow(envFront, 1.8) * 2.5;
    col += vec3<f32>(0.01, 0.01, 0.03) * envDown * 0.4;
    col += vec3<f32>(0.05, 0.06, 0.18);

    return vec4<f32>(aces(col), 1.0);
}
`;

    // bass/beat punch from SJPulse; valence + energy drift on slow sines so
    // the spotlight warmth and ambient fill breathe instead of sitting flat.
    // Swap for an audio frame's bass/beatPulse/valence/energy to react.
    function signals(t) {
      const bass = window.SJPulse
        ? window.SJPulse.kick(t)
        : Math.min(1, Math.pow(Math.max(0, Math.sin(t * 2.2)), 2) * 0.9
                    + Math.max(0, Math.sin(t * 5.1 + 1.3)) * 0.35);
      const beat = window.SJPulse
        ? window.SJPulse.kick(t, { kickRate: 1.3, ghostAmp: 0 })
        : Math.max(0, Math.sin(t * 1.3));
      return {
        bass,
        beat,
        valence: 0.5 + 0.32 * Math.sin(t * 0.13),
        energy:  0.5 + 0.30 * Math.sin(t * 0.09 + 1.7),
      };
    }

    async function inlineInit(cv) {
      if (!navigator.gpu) { console.warn('[disco-chrome] WebGPU unavailable'); return null; }
      const adapter = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
      if (!adapter) { console.warn('[disco-chrome] no adapter'); return null; }
      const device = await adapter.requestDevice();
      const dpr = window.devicePixelRatio || 1;
      const size = () => { cv.width = Math.round(innerWidth * dpr); cv.height = Math.round(innerHeight * dpr);
        cv.style.width = innerWidth + 'px'; cv.style.height = innerHeight + 'px'; };
      size(); addEventListener('resize', size);
      const context = cv.getContext('webgpu');
      const format = navigator.gpu.getPreferredCanvasFormat();
      context.configure({ device, format, alphaMode: 'opaque' });
      return { adapter, device, queue: device.queue, context, format, canvas: cv, dpr };
    }

    (async () => {
      const gpu = window.SJGpu ? await window.SJGpu.init(canvas) : await inlineInit(canvas);
      if (!gpu) return;
      const { device, queue, context, format } = gpu;

      const module = device.createShaderModule({ label: 'DiscoChrome', code: WGSL });
      const bgl = device.createBindGroupLayout({
        entries: [{ binding: 0, visibility: GPUShaderStage.VERTEX | GPUShaderStage.FRAGMENT,
                    buffer: { type: 'uniform' } }],
      });
      const UNIFORM_BYTES = 48;
      const uniforms   = new Float32Array(UNIFORM_BYTES / 4);
      const uniformBuf = device.createBuffer({
        label: 'DiscoChrome uniforms',
        size:  UNIFORM_BYTES,
        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
      });
      const bindGroup = device.createBindGroup({
        layout: bgl, entries: [{ binding: 0, resource: { buffer: uniformBuf } }],
      });
      const pipeline = device.createRenderPipeline({
        label:  'DiscoChrome',
        layout: device.createPipelineLayout({ bindGroupLayouts: [bgl] }),
        vertex:   { module, entryPoint: 'vs_main' },
        fragment: { module, entryPoint: 'fs_main', targets: [{ format }] },
        primitive: { topology: 'triangle-list' },
      });

      let t0, tPrev, rotY = 0;
      function frame(ts) {
        if (t0 === undefined) { t0 = ts; tPrev = ts; }
        const t  = (ts - t0)    / 1000;
        const dt = Math.min(0.1, Math.max(0.001, (ts - tPrev) / 1000));
        tPrev = ts;
        const s = signals(t);

        // Local rotation accumulator (replaces window.vizSharedRotY).
        rotY += dt * (0.25 + s.bass * 0.35);

        uniforms[0] = t;
        uniforms[1] = s.bass;
        uniforms[2] = s.beat;
        uniforms[3] = rotY;
        uniforms[4] = t * 0.05;
        uniforms[5] = 0;
        uniforms[6] = gpu.canvas.width;
        uniforms[7] = gpu.canvas.height;
        uniforms[8] = s.valence;   // offset 32
        uniforms[9] = s.energy;    // offset 36
        queue.writeBuffer(uniformBuf, 0, uniforms);

        const enc  = device.createCommandEncoder();
        const pass = enc.beginRenderPass({
          colorAttachments: [{
            view:       context.getCurrentTexture().createView(),
            loadOp:     'clear',
            storeOp:    'store',
            clearValue: { r: 0, g: 0, b: 0, a: 1 },
          }],
        });
        pass.setPipeline(pipeline);
        pass.setBindGroup(0, bindGroup);
        pass.draw(3);
        pass.end();
        queue.submit([enc.finish()]);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
