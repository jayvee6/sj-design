  <script src="../../lib/synthetic-pulse.js"></script>
  <script src="../../lib/webgpu-bootstrap.js"></script>
  <script>
    // ─── Cosmic Disco TAA (WebGPU, 3-pass) ────────────────────────────────
    // Canonical build: reprojection-free 3-pass temporal-denoise (the
    // single-pass build was too noisy). Holds locked 60 on M-series at
    // native res. Pipeline:
    //   Pass 1  scene  -> sceneHDR (0.66x, rgba16float): the cd-014 scene,
    //                     linear HDR (NO aces), depth-proxy packed in .a,
    //                     Halton sub-pixel ray jitter + IGN march jitter.
    //   Pass 2  resolve -> histW (0.66x, rgba16float): reproject histR via
    //                     the analytic camera at time-dt + depth proxy,
    //                     3x3 variance clip, luminance flash reject, blend.
    //   Pass 3  present -> swapchain: sample histW, ACES + fine grain,
    //                     hardware upscale to display res.
    // History ping-pongs each frame. No external assets (IGN is procedural).
    //
    // NOTE: this 3-pass build is WebGPU-only. cosmic-disco-threejs.html is
    // a single-pass WebGL reference (no TAA), not a lockstep twin.

    const canvas = document.getElementById('c');

    // Build ID — bump on every change; srcHash fingerprints the shaders.
    const BUILD = 'cd-015';
    function srcHash(s) {
      let h = 2166136261 >>> 0;
      for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
      return h.toString(36).slice(0, 5);
    }

    // Perf HUD — windowed ring-buffer avg + p99 low1% + drops/s (the
    // accurate musicplayer-viz pattern; no EMA). gpu line from
    // onSubmittedWorkDone completion count.
    const HUD = (() => {
      const el = document.getElementById('hud');
      const RING = 120;
      const buf = new Float32Array(RING);
      const sortScratch = new Float32Array(RING);
      let head = 0, count = 0, prevTs = 0, lastUpdate = 0;
      const UPDATE_MS = 250;
      const DROP_RING = 60;
      const dropBuf = new Uint8Array(DROP_RING);
      let dropHead = 0;
      let gpuCount = 0, lastCount = 0, lastWall = 0, gpuFps = 0;
      let meta = { api: '', build: '', gpu: '', res: () => '' };
      return {
        setMeta(m) { meta = m; },
        gpuDone() { gpuCount++; },
        frame(ts) {
          if (!prevTs) { prevTs = ts; return; }
          const dt = ts - prevTs;
          prevTs = ts;
          buf[head] = dt; head = (head + 1) % RING; if (count < RING) count++;
          dropBuf[dropHead] = dt > 33.3 ? 1 : 0;
          dropHead = (dropHead + 1) % DROP_RING;
          if (!el || ts - lastUpdate < UPDATE_MS) return;
          lastUpdate = ts;
          const n = count;
          let sum = 0;
          const sorted = sortScratch.subarray(0, n);
          for (let i = 0; i < n; i++) {
            const v = buf[(head - n + i + RING) % RING];
            sorted[i] = v; sum += v;
          }
          sorted.sort();
          const avg = sum / n;
          const fps = 1000 / avg;
          const p99 = sorted[Math.min(n - 1, Math.floor(n * 0.99))];
          const fpsLow = 1000 / p99;
          let dropSum = 0;
          for (let i = 0; i < DROP_RING; i++) dropSum += dropBuf[i];
          const dps = (dropSum / ((DROP_RING * avg) / 1000)).toFixed(1);
          if (gpuCount > 0) {
            if (lastWall) gpuFps = (gpuCount - lastCount) * 1000 / (ts - lastWall);
            lastCount = gpuCount; lastWall = ts;
          }
          el.textContent = [
            meta.api,
            'build ' + meta.build,
            'fps ' + Math.round(fps) + '  (' + avg.toFixed(1) + ' ms)',
            'low1% ' + Math.round(fpsLow) + '   drops ' + dps + '/s',
            gpuCount > 0 ? 'gpu ' + Math.round(gpuFps) : 'gpu --',
            meta.res(),
            'GPU ' + meta.gpu,
          ].join(String.fromCharCode(10));
        },
      };
    })();

    // ── Shared shader chunk: the cd-014 scene, identical look ────────────
    // (Faithful copy of cosmic-disco.html cd-014's functions. ACES is
    // applied in the PRESENT pass, not here, so TAA runs in linear HDR.)
    const SCENE = /* wgsl */`
struct U {
    elapsed: f32, bass: f32, mid: f32, treble: f32, beat: f32, amp: f32,
    resolution: vec2<f32>,        // render-target (0.66x) size
    rotY: f32, camAng: f32,
    frameIndex: f32, camAngPrev: f32,
}
@group(0) @binding(0) var<uniform> u: U;

const PI: f32 = 3.14159265359;
const SPHERE_R: f32 = 5.0;
const TILE: f32 = 0.0418879;
const GROUT: f32 = 0.045;
const RMAX: f32 = 42.0;
const STEPS: i32 = 36;

fn hash3(p: vec3<f32>) -> f32 {
    var q = fract(p * 0.3183099 + vec3<f32>(0.1, 0.2, 0.3));
    q += dot(q, q.yzx + 19.19);
    return fract((q.x + q.y) * q.z);
}
fn vnoise(p: vec3<f32>) -> f32 {
    let i = floor(p); let f = fract(p);
    let w = f * f * (3.0 - 2.0 * f);
    let n000 = hash3(i + vec3<f32>(0.0,0.0,0.0));
    let n100 = hash3(i + vec3<f32>(1.0,0.0,0.0));
    let n010 = hash3(i + vec3<f32>(0.0,1.0,0.0));
    let n110 = hash3(i + vec3<f32>(1.0,1.0,0.0));
    let n001 = hash3(i + vec3<f32>(0.0,0.0,1.0));
    let n101 = hash3(i + vec3<f32>(1.0,0.0,1.0));
    let n011 = hash3(i + vec3<f32>(0.0,1.0,1.0));
    let n111 = hash3(i + vec3<f32>(1.0,1.0,1.0));
    let x00 = mix(n000, n100, w.x); let x10 = mix(n010, n110, w.x);
    let x01 = mix(n001, n101, w.x); let x11 = mix(n011, n111, w.x);
    return mix(mix(x00, x10, w.y), mix(x01, x11, w.y), w.z);
}
fn fbm3(p0: vec3<f32>) -> f32 {
    var p = p0; var a = 0.5; var s = 0.0;
    for (var i = 0; i < 3; i++) { s += a * vnoise(p); p = p * 2.03; a = a * 0.5; }
    return s;
}
fn raySphere(O: vec3<f32>, rd: vec3<f32>, r: f32) -> f32 {
    let b = dot(O, rd); let c = dot(O, O) - r * r;
    let disc = b * b - c;
    if disc < 0.0 { return -1.0; }
    let sq = sqrt(disc);
    let t1 = -b - sq; let t2 = -b + sq;
    if t1 > 0.001 { return t1; }
    if t2 > 0.001 { return t2; }
    return -1.0;
}
fn shell(O: vec3<f32>, rd: vec3<f32>, r: f32) -> vec2<f32> {
    let b = dot(O, rd); let c = dot(O, O) - r * r;
    let disc = b * b - c;
    if disc < 0.0 { return vec2<f32>(-1.0, -1.0); }
    let s = sqrt(disc);
    return vec2<f32>(-b - s, -b + s);
}
fn galaxy(dir: vec3<f32>, ctr: vec3<f32>) -> f32 {
    let d = dir - ctr; let r = length(d);
    if r > 0.32 { return 0.0; }
    let a = atan2(d.y, d.x) + r * 16.0;
    let arms = 0.5 + 0.5 * cos(a * 2.0);
    return exp(-r*r*70.0) * 1.3 + exp(-r*r*26.0) * pow(arms, 2.0) * 0.55;
}
fn nebulaCore(dir: vec3<f32>) -> vec3<f32> {
    let drift = vec3<f32>(u.elapsed * 0.02, 0.0, u.elapsed * 0.015);
    let wv = fbm3(dir * 1.8 + 11.0);
    let w  = vec3<f32>(wv, wv * 1.31 + 0.21, wv * 0.74 - 0.17);
    let n  = fbm3(dir * 2.6 + w * 1.4 + drift);
    let n2 = fbm3(dir * 5.0 + w * 0.8);
    let ridge = pow(1.0 - abs(n2 * 2.0 - 1.0), 3.0);
    let deep = vec3<f32>(0.020, 0.010, 0.060);
    let rose = vec3<f32>(0.850, 0.180, 0.450);
    let mag  = vec3<f32>(0.950, 0.250, 0.700);
    let gold = vec3<f32>(1.000, 0.720, 0.320);
    let cyan = vec3<f32>(0.250, 0.750, 1.000);
    var col = mix(deep, rose, smoothstep(0.25, 0.65, n));
    col = mix(col, mag, smoothstep(0.50, 0.85, n) * 0.85);
    col += gold * ridge * 0.90;
    col += cyan * pow(max(0.0, n - 0.60), 2.0) * 0.55;
    col *= 0.45 + u.amp * 0.50;
    return col;
}
fn nebula(dir: vec3<f32>) -> vec3<f32> {
    var col = nebulaCore(dir);
    let nd = normalize(dir);
    let g = galaxy(nd, normalize(vec3<f32>( 0.70, 0.45,-0.40)))
          + galaxy(nd, normalize(vec3<f32>(-0.80, 0.30, 0.50)))
          + galaxy(nd, normalize(vec3<f32>( 0.20,-0.55,-0.78)));
    col += vec3<f32>(0.95, 0.88, 1.00) * g;
    let sc = floor(dir * 260.0);
    let sH = hash3(sc);
    let star = step(0.9965, sH) * (0.40 + 0.60 * hash3(sc + 5.0));
    col += vec3<f32>(0.90, 0.92, 1.00) * star;
    return col;
}
fn latLon(p: vec3<f32>) -> vec2<f32> {
    return vec2<f32>(asin(clamp(p.y, -1.0, 1.0)), atan2(p.z, p.x));
}
fn tileNormal(p: vec3<f32>) -> vec3<f32> {
    let ll = latLon(p);
    let tLat = (floor(ll.x / TILE) + 0.5) * TILE;
    let tLon = (floor(ll.y / TILE) + 0.5) * TILE;
    return normalize(vec3<f32>(cos(tLat)*cos(tLon), sin(tLat), cos(tLat)*sin(tLon)));
}
fn cityLights(d: vec3<f32>) -> f32 {
    let q = d * 22.0; let c = floor(q);
    let big = hash3(c);
    if big < 0.55 { return 0.0; }
    let fine = hash3(floor(q * 4.0) + 3.0);
    let lit = smoothstep(0.60, 0.95, fine) * smoothstep(0.55, 0.80, big);
    return lit * (0.60 + 0.40 * fract(big * 37.0));
}
fn lightPos(i: i32) -> vec3<f32> {
    let fi = f32(i);
    let ang = fi * (PI * 0.5) + u.elapsed * 0.50;
    let y = 2.5 + sin(u.elapsed * 0.32 + fi * 1.3) * 2.5;
    return vec3<f32>(cos(ang) * 9.0, y, sin(ang) * 9.0);
}
fn lightColor(i: i32) -> vec3<f32> {
    if i == 0 { return vec3<f32>(1.00, 0.18, 0.65); }
    if i == 1 { return vec3<f32>(0.28, 0.84, 1.00); }
    if i == 2 { return vec3<f32>(1.00, 0.82, 0.45); }
    return vec3<f32>(1.00, 0.95, 1.00);
}
fn smokeEnv(p: vec3<f32>) -> f32 {
    let r = length(p);
    return smoothstep(5.0, 12.0, r) * (1.0 - smoothstep(28.0, 46.0, r));
}
fn smokeNoise(p: vec3<f32>) -> f32 {
    let drift = vec3<f32>(u.elapsed * 0.06, u.elapsed * 0.02, -u.elapsed * 0.04);
    let q = p * 0.06 + drift * 0.10;
    let wx = fbm3(q * 0.7 + 1.0);
    let wy = fbm3(q * 0.7 + 9.0);
    let w  = vec3<f32>(wx, wy, (wx - wy) * 0.5 + 0.5);
    return fbm3(q + w * 0.8);
}
// One club pin-spot bounced off the ball into a thin shaft.
fn discoBeam(p: vec3<f32>, vdir: vec3<f32>, spot: vec3<f32>, cRb: f32, sRb: f32) -> vec3<f32> {
    let Nreq = normalize(spot + vdir);
    let nB = vec3<f32>( Nreq.x*cRb + Nreq.z*sRb, Nreq.y, -Nreq.x*sRb + Nreq.z*cRb );
    let ll = latLon(nB);
    let cLat = floor(ll.x / TILE); let cLon = floor(ll.y / TILE);
    let thB = hash3(vec3<f32>(cLat, cLon, 1.0));
    let tLat = (cLat + 0.5) * TILE; let tLon = (cLon + 0.5) * TILE;
    let tnB = vec3<f32>(cos(tLat)*cos(tLon), sin(tLat), cos(tLat)*sin(tLon));
    let NtW = normalize(vec3<f32>( tnB.x*cRb - tnB.z*sRb, tnB.y, tnB.x*sRb + tnB.z*cRb ));
    let Rbm = reflect(-spot, NtW);
    let m = 1.0 - max(0.0, dot(vdir, Rbm));
    let shaft = exp(-m * 300.0);
    let specHot = pow(max(0.0, dot(NtW, spot)), 3.0);
    let hotTile = smoothstep(0.74, 0.94, thB);
    let bCol = mix(vec3<f32>(1.00,0.35,0.85), vec3<f32>(1.00,0.82,0.42), fract(thB * 7.0));
    return bCol * shaft * specHot * hotTile;
}
struct Smk { c: vec3<f32>, tr: f32, dp: f32, }
fn smoke(ro: vec3<f32>, rd: vec3<f32>, tStart: f32, tEnd: f32, jit0: f32) -> Smk {
    let dtFine = (tEnd - tStart) / f32(STEPS);
    let dtCoarse = dtFine * 3.0;
    var t = tStart + dtFine * jit0;
    var acc  = vec3<f32>(0.0);
    var bAcc = vec3<f32>(0.0);
    var dAcc = 0.0;
    var wSum = 0.0;
    var T = 1.0;
    let SPOT  = normalize(vec3<f32>(-0.35, 0.55, 0.30));
    let SPOT2 = normalize(vec3<f32>( 0.42, 0.48,-0.30));
    let cRb = cos(u.rotY); let sRb = sin(u.rotY);
    for (var i = 0; i < STEPS; i++) {
        if T < 0.04 || t > tEnd { break; }
        let p = ro + rd * t;
        let e = smokeEnv(p);
        if e <= 0.0001 { t += dtCoarse; continue; }
        let dRaw = smokeNoise(p);
        let d = smoothstep(0.52, 0.98, dRaw) * e * 1.30;
        if d <= 0.001 { t += dtCoarse; continue; }
        let l0 = normalize(lightPos(0) - p);
        let l2 = normalize(lightPos(2) - p);
        let ph0 = pow(max(0.0, dot(rd, l0)), 4.0);
        let ph2 = pow(max(0.0, dot(rd, l2)), 4.0);
        let dRamp = smoothstep(0.05, 0.55, d);
        var ct = mix(vec3<f32>(0.04,0.01,0.06), vec3<f32>(0.95,0.30,0.55),
                     smoothstep(0.20, 0.80, dRaw));
        ct *= 0.25 + 1.15 * dRamp;
        ct += vec3<f32>(1.00,0.78,0.45) * pow(d, 3.0) * 0.85;
        ct += vec3<f32>(1.00,0.95,0.88) * pow(d, 6.0) * 0.45;
        ct += lightColor(0) * ph0 * (0.55 + u.bass * 1.0);
        ct += lightColor(2) * ph2 * 0.45;
        ct *= 0.30 + u.amp * 0.45;
        let vdir  = normalize(p);
        let bFall = exp(-max(0.0, length(p) - SPHERE_R) * 0.032);
        let beams = discoBeam(p, vdir, SPOT,  cRb, sRb)
                  + discoBeam(p, vdir, SPOT2, cRb, sRb);
        let aT = exp(-d * dtFine * 0.42);
        let w  = T * (1.0 - aT);
        dAcc += w * t; wSum += w;
        acc  += w * ct;
        bAcc += w * beams * bFall * (18.0 + u.bass * 20.0 + u.beat * 12.0);
        T *= aT;
        t += dtFine;
    }
    acc += bAcc / (1.0 + 0.45 * bAcc);
    let dp = select(60.0, dAcc / max(wSum, 1.0e-4), wSum > 1.0e-4);
    return Smk(acc, T, dp);
}
fn ballShade(camPos: vec3<f32>, rd: vec3<f32>, tS: f32) -> vec3<f32> {
    let hitP = camPos + tS * rd;
    let cR = cos(u.rotY); let sR = sin(u.rotY);
    let hitObj = vec3<f32>( hitP.x*cR + hitP.z*sR, hitP.y, -hitP.x*sR + hitP.z*cR );
    let nObj = normalize(hitObj);
    let poleDamp = smoothstep(1.0, 0.85, abs(nObj.y));
    let ll = latLon(nObj);
    let cLat = floor(ll.x / TILE); let cLon = floor(ll.y / TILE);
    let th = hash3(vec3<f32>(cLat, cLon, 1.0));
    let tnO = tileNormal(nObj);
    let jit = (vec3<f32>(
        hash3(vec3<f32>(cLat, cLon, 7.0)),
        hash3(vec3<f32>(cLat, cLon, 13.0)),
        hash3(vec3<f32>(cLat, cLon, 23.0)),
    ) - 0.5) * (0.16 * poleDamp);
    let tnJ = normalize(tnO + jit);
    let tN = normalize(vec3<f32>( tnJ.x*cR - tnJ.z*sR, tnJ.y, tnJ.x*sR + tnJ.z*cR ));
    let refl = reflect(rd, tN);
    var ball = nebulaCore(refl) * 0.55 + vec3<f32>(0.10, 0.11, 0.16);
    for (var i = 0; i < 4; i++) {
        let lc = lightColor(i);
        let ld = normalize(lightPos(i) - hitP);
        let s = max(0.0, dot(refl, ld));
        ball += lc * exp(120.0 * (s - 1.0)) * (18.0 + u.bass*36.0 + u.beat*26.0);
        ball += lc * pow(s, 8.0) * 0.45;
    }
    ball *= 0.70 + 0.80 * th;
    if th > 0.78 { ball += vec3<f32>(1.45,1.25,1.40) * (0.8 + u.treble*0.8) * poleDamp; }
    let envF = pow(max(0.0, -dot(refl, rd)), 2.0);
    ball += vec3<f32>(0.78,0.80,0.95) * envF * 0.9;
    ball += vec3<f32>(1.00,0.72,0.32) * cityLights(nObj) * (0.55 + u.treble*0.55);
    let fres = pow(1.0 - max(0.0, dot(tN, -rd)), 3.0);
    ball += vec3<f32>(1.00,0.55,0.85) * fres * (0.45 + u.bass*0.80 + u.beat*0.50);
    let aaPix = 1.6 / u.resolution.y;
    let wT = clamp(aaPix * tS / (SPHERE_R * TILE) * 0.7, 1.0e-4, 0.08) * poleDamp;
    let fLa = fract(ll.x / TILE); let fLo = fract(ll.y / TILE);
    let dLa = min(fLa, 1.0 - fLa); let dLo = min(fLo, 1.0 - fLo);
    let gM = clamp(max(
        1.0 - smoothstep(GROUT - wT, GROUT + wT, dLa),
        1.0 - smoothstep(GROUT - wT, GROUT + wT, dLo)), 0.0, 1.0);
    return mix(ball, vec3<f32>(0.010,0.006,0.018), gM);
}

// Camera basis for a given orbit angle (matches the shipped scene).
struct Cam { pos: vec3<f32>, fwd: vec3<f32>, right: vec3<f32>, up: vec3<f32>, }
fn camera(ang: f32) -> Cam {
    let camR = 13.0;
    let pos = vec3<f32>(sin(ang) * camR, 2.4 + sin(ang * 0.6) * 1.2, cos(ang) * camR);
    let fwd = normalize(vec3<f32>(0.0) - pos);
    let right = normalize(cross(fwd, vec3<f32>(0.0, 1.0, 0.0)));
    let up = cross(right, fwd);
    return Cam(pos, fwd, right, up);
}

// Interleaved-gradient noise, animated per frame (procedural blue-noise-ish,
// no texture asset) — feeds the volumetric march start jitter.
fn ign(px: vec2<f32>) -> f32 {
    let m = vec3<f32>(0.06711056, 0.00583715, 52.9829189);
    return fract(m.z * fract(dot(px, m.xy)));
}
fn haltonAt(i: u32, b: u32) -> f32 {
    var f = 1.0; var r = 0.0; var n = i;
    loop {
        if n == 0u { break; }
        f = f / f32(b);
        r = r + f * f32(n % b);
        n = n / b;
    }
    return r;
}

struct VSOut { @builtin(position) pos: vec4<f32>, @location(0) uv: vec2<f32>, }
@vertex fn vs(@builtin(vertex_index) vid: u32) -> VSOut {
    var p = array<vec2<f32>, 3>(vec2<f32>(-1.0,-1.0), vec2<f32>(3.0,-1.0), vec2<f32>(-1.0,3.0));
    var t = array<vec2<f32>, 3>(vec2<f32>(0.0,0.0), vec2<f32>(2.0,0.0), vec2<f32>(0.0,2.0));
    var o: VSOut; o.pos = vec4<f32>(p[vid], 0.0, 1.0); o.uv = t[vid]; return o;
}

// PASS 1 — scene to HDR. rgb = linear pre-tonemap, a = depth proxy.
@fragment fn fs_scene(in: VSOut) -> @location(0) vec4<f32> {
    let asp = u.resolution.x / u.resolution.y;
    let fi = u32(u.frameIndex);
    // Halton(2,3) sub-pixel jitter so TAA accumulates true AA.
    let jx = haltonAt(fi + 1u, 2u) - 0.5;
    let jy = haltonAt(fi + 1u, 3u) - 0.5;
    let uvJ = in.uv;   // no sub-pixel jitter (reprojection-free denoise)
    let ndc = (uvJ - 0.5) * vec2<f32>(asp, 1.0);

    let cam = camera(u.camAng);
    let rd = normalize(cam.fwd + cam.right * ndc.x * 1.6 + cam.up * ndc.y * 1.6);

    let tS = raySphere(cam.pos, rd, SPHERE_R);

    let tCA = max(0.0, dot(-cam.pos, rd));
    let dCA = length(cam.pos + tCA * rd);
    let aaPix = 1.6 / u.resolution.y;
    let silAA = aaPix * length(cam.pos) * 1.4;
    let cov = smoothstep(SPHERE_R + silAA, SPHERE_R - silAA, dCA);
    let tHit = select(tCA, tS, tS > 0.0);

    var behind = vec3<f32>(0.0);
    if cov >= 0.999 { behind = ballShade(cam.pos, rd, tHit); }
    else if cov <= 0.001 { behind = nebula(rd); }
    else { behind = mix(nebula(rd), ballShade(cam.pos, rd, tHit), cov); }

    let sh = shell(cam.pos, rd, RMAX);
    let tStart = max(0.001, sh.x);
    let tClip = select(sh.y, min(sh.y, tS), tS > 0.0);
    let tEnd = mix(sh.y, tClip, cov);

    // IGN-animated march jitter (replaces white-noise hash).
    let px = in.uv * u.resolution;
    let jit0 = fract(ign(px) + f32(fi) * 0.61803398875);

    var col = behind;
    var smk = Smk(vec3<f32>(0.0), 1.0, 60.0);
    if tEnd > tStart {
        smk = smoke(cam.pos, rd, tStart, tEnd, jit0);
        col = smk.c + smk.tr * behind;
    }
    let halo = min(0.9, exp(-dCA * dCA * 0.080) * (0.22 + u.bass*0.50 + u.beat*0.40));
    col += vec3<f32>(1.00, 0.45, 0.85) * halo * smk.tr;
    col *= 0.95 + u.beat * 0.15;          // exposure (linear; ACES is in present)

    // Depth proxy: ball-hit distance where the ball is hit, else the
    // contribution-weighted mean scatter distance of the fog. Coherent
    // per-pixel reproject anchor (constant-60 smeared the whole nebula).
    let depth = select(smk.dp, tS, tS > 0.0);
    return vec4<f32>(col, depth);
}

// PASS 2 — TAA resolve into the write-history (linear HDR).
@group(0) @binding(1) var sceneTex: texture_2d<f32>;
@group(0) @binding(2) var histTex:  texture_2d<f32>;
@group(0) @binding(3) var samp:     sampler;

fn luma(c: vec3<f32>) -> f32 { return dot(c, vec3<f32>(0.2126, 0.7152, 0.0722)); }

@fragment fn fs_resolve(in: VSOut) -> @location(0) vec4<f32> {
    let asp = u.resolution.x / u.resolution.y;
    let cur = textureSampleLevel(sceneTex, samp, in.uv, 0.0);
    let curRGB = cur.rgb;
    let depth = cur.a;

    // Reproject: world point along this pixel ray at the depth proxy,
    // then where it lands in the PREVIOUS camera.
    let camC = camera(u.camAng);
    let ndc = (in.uv - 0.5) * vec2<f32>(asp, 1.0);
    let rd = normalize(camC.fwd + camC.right * ndc.x * 1.6 + camC.up * ndc.y * 1.6);
    let P = camC.pos + rd * depth;

    let camP = camera(u.camAngPrev);
    let v = P - camP.pos;
    let fz = dot(v, camP.fwd);
    var uvPrev = in.uv;
    var valid = fz > 0.0001;
    if valid {
        let nx = (dot(v, camP.right) / fz) / 1.6;
        let ny = (dot(v, camP.up)    / fz) / 1.6;
        uvPrev = vec2<f32>(nx / asp, ny) + 0.5;
        valid = uvPrev.x >= 0.0 && uvPrev.x <= 1.0
             && uvPrev.y >= 0.0 && uvPrev.y <= 1.0;
    }

    // 3x3 neighbourhood stats of the current frame (variance clip box).
    let texel = 1.0 / u.resolution;
    var mean = vec3<f32>(0.0);
    var m2 = vec3<f32>(0.0);
    for (var y = -1; y <= 1; y++) {
        for (var x = -1; x <= 1; x++) {
            let s = textureSampleLevel(sceneTex, samp,
                in.uv + vec2<f32>(f32(x), f32(y)) * texel, 0.0).rgb;
            mean += s; m2 += s * s;
        }
    }
    mean = mean / 9.0;
    let sigma = sqrt(max(m2 / 9.0 - mean * mean, vec3<f32>(0.0)));
    let lo = mean - 1.0 * sigma;
    let hi = mean + 1.0 * sigma;

    if u.frameIndex < 1.5 {
        return vec4<f32>(curRGB, 1.0);            // seed
    }
    // Reprojection-free: same-pixel history, hard variance-clamped to the
    // current neighbourhood so moving content stays sharp (no reproject smear).
    let histRGB = clamp(textureSampleLevel(histTex, samp, in.uv, 0.0).rgb, lo, hi);

    // Feedback, with extra current-weight on bright flashes (anti-ghost).
    let flash = clamp(luma(curRGB) / (luma(histRGB) + 0.0001) - 1.0, 0.0, 1.0);
    let feedback = mix(0.55, 0.45, flash);
    let outc = mix(curRGB, histRGB, feedback);
    return vec4<f32>(outc, 1.0);
}

fn aces(x: vec3<f32>) -> vec3<f32> {
    return clamp((x * (2.51 * x + 0.03)) / (x * (2.43 * x + 0.59) + 0.14),
                 vec3<f32>(0.0), vec3<f32>(1.0));
}
// PASS 3 — present: sample resolved HDR, ACES + fine grain, upscale.
@group(0) @binding(4) var resolvedTex: texture_2d<f32>;
@group(0) @binding(5) var samp3: sampler;
@fragment fn fs_present(in: VSOut) -> @location(0) vec4<f32> {
    let hdr = textureSampleLevel(resolvedTex, samp3, in.uv, 0.0).rgb;
    var c = aces(hdr);
    let g = (ign(in.uv * u.resolution + u.frameIndex) - 0.5) * 0.015;  // fine dither
    c += vec3<f32>(g);
    return vec4<f32>(c, 1.0);
}
`;

    function signals(t) {
      const bass = window.SJPulse ? window.SJPulse.kick(t)
        : Math.min(1, Math.pow(Math.max(0, Math.sin(t * 2.2)), 2) * 0.9);
      const mid = window.SJPulse ? window.SJPulse.wave(t, WAVE_OPT)
        : 0.5 + 0.45 * Math.sin(t * 0.55);
      const treble = window.SJPulse ? window.SJPulse.flicker(t)
        : Math.abs(Math.sin(t * 4.0));
      const beat = window.SJPulse ? window.SJPulse.kick(t, BEAT_OPT)
        : Math.max(0, Math.sin(t * 1.3));
      SIG.bass = bass; SIG.mid = mid; SIG.treble = treble; SIG.beat = beat;
      SIG.amp = (bass + mid + treble) / 3;
      return SIG;
    }
    const SIG = { bass: 0, mid: 0, treble: 0, beat: 0, amp: 0 };
    const WAVE_OPT = { mid: 0.5, amp: 0.45 };
    const BEAT_OPT = { kickRate: 1.3, ghostAmp: 0 };

    (async () => {
      if (!navigator.gpu) { console.warn('[cosmic-disco-taa] WebGPU unavailable'); return; }
      const adapter = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
      if (!adapter) { console.warn('[cosmic-disco-taa] no adapter'); return; }
      const device = await adapter.requestDevice();
      const ctx = canvas.getContext('webgpu');
      const fmt = navigator.gpu.getPreferredCanvasFormat();
      const SCALE = 1.0;   // native res — no upscale blur (cd-taa-003 pivot)
      let rw = 1, rh = 1;
      function size() {
        const dpr = Math.min(window.devicePixelRatio || 1, 1);
        canvas.width  = Math.max(1, Math.round(innerWidth  * dpr));
        canvas.height = Math.max(1, Math.round(innerHeight * dpr));
        canvas.style.width = innerWidth + 'px';
        canvas.style.height = innerHeight + 'px';
        rw = Math.max(1, Math.round(canvas.width  * SCALE));
        rh = Math.max(1, Math.round(canvas.height * SCALE));
      }
      size();
      ctx.configure({ device, format: fmt, alphaMode: 'opaque' });

      const HDR = 'rgba16float';
      function rt() {
        return device.createTexture({ size: [rw, rh], format: HDR,
          usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.TEXTURE_BINDING });
      }
      let sceneT = rt();
      let histA = rt(), histB = rt();         // ping-pong history (HDR, 0.66x)
      const samp = device.createSampler({ magFilter: 'linear', minFilter: 'linear',
        addressModeU: 'clamp-to-edge', addressModeV: 'clamp-to-edge' });

      window.addEventListener('resize', () => {
        size();
        sceneT.destroy(); histA.destroy(); histB.destroy();
        sceneT = rt(); histA = rt(); histB = rt();
      });

      const module = device.createShaderModule({ label: 'cosmic-disco-taa', code: SCENE });

      const UNIFORM_BYTES = 48;     // 12 x f32 (matches struct U; pads reused)
      const uni = new Float32Array(UNIFORM_BYTES / 4);
      const uniBuf = device.createBuffer({ size: UNIFORM_BYTES,
        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

      // Bind group layouts: scene (uniform only); resolve (uniform + 2 tex +
      // sampler); present (uniform + 1 tex + sampler).
      const bglScene = device.createBindGroupLayout({ entries: [
        { binding: 0, visibility: GPUShaderStage.VERTEX | GPUShaderStage.FRAGMENT, buffer: {} },
      ]});
      const bglResolve = device.createBindGroupLayout({ entries: [
        { binding: 0, visibility: GPUShaderStage.FRAGMENT, buffer: {} },
        { binding: 1, visibility: GPUShaderStage.FRAGMENT, texture: {} },
        { binding: 2, visibility: GPUShaderStage.FRAGMENT, texture: {} },
        { binding: 3, visibility: GPUShaderStage.FRAGMENT, sampler: {} },
      ]});
      const bglPresent = device.createBindGroupLayout({ entries: [
        { binding: 0, visibility: GPUShaderStage.FRAGMENT, buffer: {} },
        { binding: 4, visibility: GPUShaderStage.FRAGMENT, texture: {} },
        { binding: 5, visibility: GPUShaderStage.FRAGMENT, sampler: {} },
      ]});

      const mkPipe = (bgl, fsEntry, target) => device.createRenderPipeline({
        layout: device.createPipelineLayout({ bindGroupLayouts: [bgl] }),
        vertex: { module, entryPoint: 'vs' },
        fragment: { module, entryPoint: fsEntry, targets: [{ format: target }] },
        primitive: { topology: 'triangle-list' },
      });
      const pScene   = mkPipe(bglScene,   'fs_scene',   HDR);
      const pResolve = mkPipe(bglResolve, 'fs_resolve', HDR);
      const pPresent = mkPipe(bglPresent, 'fs_present', fmt);

      const bgScene = device.createBindGroup({ layout: bglScene,
        entries: [{ binding: 0, resource: { buffer: uniBuf } }] });
      function bgResolve(hist) {
        return device.createBindGroup({ layout: bglResolve, entries: [
          { binding: 0, resource: { buffer: uniBuf } },
          { binding: 1, resource: sceneT.createView() },
          { binding: 2, resource: hist.createView() },
          { binding: 3, resource: samp },
        ]});
      }
      function bgPresent(resolved) {
        return device.createBindGroup({ layout: bglPresent, entries: [
          { binding: 0, resource: { buffer: uniBuf } },
          { binding: 4, resource: resolved.createView() },
          { binding: 5, resource: samp },
        ]});
      }

      let gpuName = 'WebGPU device';
      try { const ai = adapter.info; if (ai) gpuName =
        [ai.vendor, ai.architecture].filter(Boolean).join(' ') || 'WebGPU'; } catch (e) {}
      HUD.setMeta({ api: 'WebGPU · WGSL · 3-pass TAA',
        build: BUILD + '-' + srcHash(SCENE), gpu: gpuName,
        res: () => rw + 'x' + rh + ' -> ' + canvas.width + 'x' + canvas.height });

      let t0, tPrev, rotY = 0, camAng = 0, camAngPrev = 0, frame = 0;
      function loop(ts) {
        if (t0 === undefined) { t0 = ts; tPrev = ts; }
        const t = (ts - t0) / 1000;
        const dt = Math.min(0.1, Math.max(0.001, (ts - tPrev) / 1000));
        tPrev = ts;
        const s = signals(t);
        camAngPrev = camAng;
        rotY += dt * (0.15 + s.bass * 0.25);
        camAng += dt * 0.05;

        uni[0] = t; uni[1] = s.bass; uni[2] = s.mid; uni[3] = s.treble;
        uni[4] = s.beat; uni[5] = s.amp; uni[6] = rw; uni[7] = rh;
        uni[8] = rotY; uni[9] = camAng; uni[10] = frame; uni[11] = camAngPrev;
        device.queue.writeBuffer(uniBuf, 0, uni);

        const histR = (frame % 2 === 0) ? histA : histB;
        const histW = (frame % 2 === 0) ? histB : histA;

        const enc = device.createCommandEncoder();
        // Pass 1 — scene -> sceneT
        {
          const p = enc.beginRenderPass({ colorAttachments: [{ view: sceneT.createView(),
            loadOp: 'clear', storeOp: 'store', clearValue: { r:0,g:0,b:0,a:60 } }] });
          p.setPipeline(pScene); p.setBindGroup(0, bgScene); p.draw(3); p.end();
        }
        // Pass 2 — resolve (sceneT + histR) -> histW
        {
          const p = enc.beginRenderPass({ colorAttachments: [{ view: histW.createView(),
            loadOp: 'clear', storeOp: 'store', clearValue: { r:0,g:0,b:0,a:1 } }] });
          p.setPipeline(pResolve); p.setBindGroup(0, bgResolve(histR)); p.draw(3); p.end();
        }
        // Pass 3 — present (histW) -> swapchain
        {
          const p = enc.beginRenderPass({ colorAttachments: [{
            view: ctx.getCurrentTexture().createView(),
            loadOp: 'clear', storeOp: 'store', clearValue: { r:0,g:0,b:0,a:1 } }] });
          p.setPipeline(pPresent); p.setBindGroup(0, bgPresent(histW)); p.draw(3); p.end();
        }
        device.queue.submit([enc.finish()]);
        device.queue.onSubmittedWorkDone().then(HUD.gpuDone);
        HUD.frame(ts);
        frame++;
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    })();
  </script>
</body>
