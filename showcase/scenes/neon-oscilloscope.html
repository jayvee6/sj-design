<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Oscilloscope — sj-design WebGPU showcase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000005; color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      overflow: hidden;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    .label {
      position: fixed; top: 24px; left: 24px; z-index: 10;
      font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: #8e8e93;
    }
    .label strong { color: #f5f5f7; letter-spacing: 0.04em; text-transform: none; font-size: 14px; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="label">
    sj-design / webgpu scenes
    <strong>Neon Oscilloscope</strong>
  </div>
  <canvas id="c"></canvas>

  <!-- Optional shared helpers — compact inline fallbacks below if they 404 -->
  <script src="../../lib/synthetic-pulse.js"></script>
  <script src="../../lib/webgpu-bootstrap.js"></script>
  <script>
    // ─── Neon Oscilloscope (WebGPU) ───────────────────────────────────────
    // Ported from musicplayer-viz/viz/neon-oscilloscope-wgpu.js — four
    // colored ribbon waves (magenta/cyan/purple/blue) at Z = −7.5/−2.5/
    // +2.5/+7.5, ray-marched against constant-Z planes from a static
    // perspective camera at (0,3,28). Glow is exp(−d²·sharp) additive,
    // perspective-corrected. One fullscreen-triangle fragment shader,
    // 176-byte uniform layout (incl. a 32-bin spectrum array).
    //
    // Bands come from SJPulse (bass kick / mid wave / treble flicker /
    // slow beat); the 32-bin spectrum is synthesized so each ribbon gets
    // per-x detail that pulses with its band plus a travelling shimmer —
    // reads like a real analyzer feeding the scope. Swap signals()/binsOf()
    // for an audio frame's bass/mid/treble/beatPulse + magnitudesSmooth to
    // make it sound-reactive.

    const canvas = document.getElementById('c');

    const WGSL = /* wgsl */`
struct Uniforms {
    elapsed:    f32,
    bass:       f32,
    mid:        f32,
    treble:     f32,
    beat:       f32,
    react:      f32,
    resolution: vec2<f32>,   // offset 24
    avg:        f32,          // offset 32
    _pad:       f32,
    _pad2:      f32,
    _pad3:      f32,
    bins:       array<f32, 32>,  // offset 48
}
@group(0) @binding(0) var<uniform> u: Uniforms;

struct VSOut {
    @builtin(position) pos: vec4<f32>,
    @location(0)       uv:  vec2<f32>,
}

@vertex fn vs_main(@builtin(vertex_index) vid: u32) -> VSOut {
    var pos = array<vec2<f32>, 3>(
        vec2<f32>(-1.0, -1.0),
        vec2<f32>( 3.0, -1.0),
        vec2<f32>(-1.0,  3.0),
    );
    var uvs = array<vec2<f32>, 3>(
        vec2<f32>(0.0, 0.0),
        vec2<f32>(2.0, 0.0),
        vec2<f32>(0.0, 2.0),
    );
    var out: VSOut;
    out.pos = vec4<f32>(pos[vid], 0.0, 1.0);
    out.uv  = uvs[vid];
    return out;
}

const PI: f32 = 3.14159265359;

fn ribbonZ(i: i32) -> f32 {
    if i == 0 { return -7.5; }
    if i == 1 { return -2.5; }
    if i == 2 { return  2.5; }
    return  7.5;
}

fn bandVal(i: i32) -> f32 {
    if i == 0 { return u.bass;   }
    if i == 1 { return u.mid;    }
    if i == 2 { return u.treble; }
    return u.avg;
}

fn bandBinVal(ribbonIdx: i32, xNorm: f32) -> f32 {
    var lo: i32 = 0;
    var hi: i32 = 31;
    if ribbonIdx == 0 { lo =  0; hi =  7; }
    if ribbonIdx == 1 { lo =  8; hi = 17; }
    if ribbonIdx == 2 { lo = 18; hi = 31; }
    let binF = f32(lo) + clamp(xNorm, 0.0, 1.0) * f32(hi - lo);
    let binI = i32(floor(binF));
    let frac = binF - f32(binI);
    let idx0 = clamp(binI,     lo, hi);
    let idx1 = clamp(binI + 1, lo, hi);
    return mix(u.bins[idx0], u.bins[idx1], frac);
}

fn ribbonGain(i: i32) -> f32 {
    if i == 0 { return 6.5; }
    if i == 1 { return 5.8; }
    if i == 2 { return 5.0; }
    return 4.2;
}

fn ribbonColor(i: i32) -> vec3<f32> {
    if i == 0 { return vec3<f32>(1.000, 0.169, 0.839); }
    if i == 1 { return vec3<f32>(0.000, 1.000, 1.000); }
    if i == 2 { return vec3<f32>(0.706, 0.294, 1.000); }
    return     vec3<f32>(0.239, 0.420, 1.000);
}

fn taperfn(xNorm: f32) -> f32 {
    return max(0.0, sin(PI * clamp(xNorm, 0.0, 1.0)));
}

fn waveAmp(x: f32, t: f32, fi: f32, bv: f32, gain: f32, beat: f32) -> f32 {
    let phase = fi * 1.7;
    let speed = 1.0 + fi * 0.15;
    let ambient = sin(x * 0.20 + t * 2.0 * speed + phase)       * 0.12
                + sin(x * 0.55 - t * 1.5 * speed + phase * 1.3) * 0.07;
    let peakScale = 0.15 + bv * gain + beat * 0.7;
    let xSlow = x * 1.3 + t * 0.7 + fi * 2.4;
    let sp    = sin(xSlow * 0.50)
              * sin(xSlow * 0.93 + fi)
              * sin(xSlow * 1.47 + fi * 2.0);
    let spikes = pow(abs(sp), 3.0);
    return ambient + spikes * peakScale;
}

@fragment fn fs_main(in: VSOut) -> @location(0) vec4<f32> {
    let camPos = vec3<f32>(0.0, 3.0, 28.0);
    let camTarget = vec3<f32>(0.0, 0.0, 0.0);
    let fwd    = normalize(camTarget - camPos);
    let right  = normalize(cross(fwd, vec3<f32>(0.0, 1.0, 0.0)));
    let up     = cross(right, fwd);
    let asp    = u.resolution.x / u.resolution.y;
    let fovScale = 0.41421f;
    let scr    = (in.uv - 0.5) * vec2<f32>(asp, 1.0) * fovScale;
    let rd     = normalize(fwd + right * scr.x + up * scr.y);

    var col    = vec3<f32>(0.0);
    let beat   = u.beat;
    let t      = u.elapsed;

    for (var i: i32 = 0; i < 4; i++) {
        let zR = ribbonZ(i);
        if (abs(rd.z) < 0.001) { continue; }
        let tRay = (zR - camPos.z) / rd.z;
        if (tRay <= 0.0) { continue; }

        let p = camPos + tRay * rd;
        if (abs(p.x) > 50.0) { continue; }
        let xNorm = (p.x + 50.0) / 100.0;
        let tap   = taperfn(xNorm);

        let fi   = f32(i);
        let bv   = bandBinVal(i, xNorm);
        let gain = ribbonGain(i);
        let wave = waveAmp(p.x, t, fi, bv, gain, beat) * tap;

        let dy = abs(p.y - wave);
        let perspScale = tRay / 20.0;
        let sharp = 5.0 / (perspScale * perspScale);
        let glow  = exp(-dy * dy * sharp);

        let bright = 0.80 + beat * 0.45 + bv * 0.25;
        col += ribbonColor(i) * glow * bright;
    }

    col += vec3<f32>(0.15, 0.05, 0.30) * (beat * beat);

    let bg = vec3<f32>(0.000, 0.000, 0.020);
    let colLen = length(col);
    col += bg * max(0.0, 1.0 - colLen);

    return vec4<f32>(clamp(col, vec3<f32>(0.0), vec3<f32>(1.0)), 1.0);
}
`;

    function signals(t) {
      const bass = window.SJPulse
        ? window.SJPulse.kick(t)
        : Math.min(1, Math.pow(Math.max(0, Math.sin(t * 2.2)), 2) * 0.9);
      const mid    = window.SJPulse ? window.SJPulse.wave(t, { rate: 0.7, mid: 0.4, amp: 0.32 }) : 0.4;
      const treble = window.SJPulse ? window.SJPulse.flicker(t, { rate: 5.0 }) * 0.6 : 0.2;
      const beat   = window.SJPulse ? window.SJPulse.kick(t, { kickRate: 1.0, ghostAmp: 0 }) : 0;
      return { bass, mid, treble, beat, avg: (bass + mid + treble) / 3 };
    }

    // Synthetic 32-bin mel spectrum. Bins 0–7 track bass, 8–17 mid,
    // 18–31 treble (matches the shader's bandBinVal ranges); a per-bin
    // sine adds a shimmer that travels along each ribbon so it isn't a
    // flat line across x.
    const _bins = new Float32Array(32);
    function binsOf(t, s) {
      for (let b = 0; b < 32; b++) {
        const band = b <= 7 ? s.bass : (b <= 17 ? s.mid : s.treble);
        const shimmer = 0.5 + 0.5 * Math.sin(t * (2.0 + b * 0.30) + b * 0.7);
        _bins[b] = Math.min(1, band * (0.40 + 0.60 * shimmer));
      }
      return _bins;
    }

    async function inlineInit(cv) {
      if (!navigator.gpu) { console.warn('[neon-oscilloscope] WebGPU unavailable'); return null; }
      const adapter = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
      if (!adapter) { console.warn('[neon-oscilloscope] no adapter'); return null; }
      const device = await adapter.requestDevice();
      const dpr = window.devicePixelRatio || 1;
      const size = () => { cv.width = Math.round(innerWidth * dpr); cv.height = Math.round(innerHeight * dpr);
        cv.style.width = innerWidth + 'px'; cv.style.height = innerHeight + 'px'; };
      size(); addEventListener('resize', size);
      const context = cv.getContext('webgpu');
      const format = navigator.gpu.getPreferredCanvasFormat();
      context.configure({ device, format, alphaMode: 'opaque' });
      return { adapter, device, queue: device.queue, context, format, canvas: cv, dpr };
    }

    (async () => {
      const gpu = window.SJGpu ? await window.SJGpu.init(canvas) : await inlineInit(canvas);
      if (!gpu) return;
      const { device, queue, context, format } = gpu;

      const module = device.createShaderModule({ label: 'NeonOscilloscope', code: WGSL });
      const bgl = device.createBindGroupLayout({
        entries: [{ binding: 0, visibility: GPUShaderStage.VERTEX | GPUShaderStage.FRAGMENT,
                    buffer: { type: 'uniform' } }],
      });
      const UNIFORM_BYTES = 176;
      const uniforms   = new Float32Array(UNIFORM_BYTES / 4);
      const uniformBuf = device.createBuffer({
        label: 'NeonOscilloscope uniforms',
        size:  UNIFORM_BYTES,
        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
      });
      const bindGroup = device.createBindGroup({
        layout: bgl, entries: [{ binding: 0, resource: { buffer: uniformBuf } }],
      });
      const pipeline = device.createRenderPipeline({
        label:  'NeonOscilloscope',
        layout: device.createPipelineLayout({ bindGroupLayouts: [bgl] }),
        vertex:   { module, entryPoint: 'vs_main' },
        fragment: { module, entryPoint: 'fs_main', targets: [{ format }] },
        primitive: { topology: 'triangle-list' },
      });

      let t0;
      function frame(ts) {
        if (t0 === undefined) t0 = ts;
        const t = (ts - t0) / 1000;
        const s = signals(t);

        uniforms[0]  = t;
        uniforms[1]  = s.bass;
        uniforms[2]  = s.mid;
        uniforms[3]  = s.treble;
        uniforms[4]  = s.beat;
        uniforms[5]  = 1.0;   // react — constant in standalone
        uniforms[6]  = gpu.canvas.width;
        uniforms[7]  = gpu.canvas.height;
        uniforms[8]  = s.avg;
        // [9..11] pad. [12..43] = synthetic 32-bin spectrum.
        const bins = binsOf(t, s);
        for (let b = 0; b < 32; b++) uniforms[12 + b] = bins[b];
        queue.writeBuffer(uniformBuf, 0, uniforms);

        const enc  = device.createCommandEncoder();
        const pass = enc.beginRenderPass({
          colorAttachments: [{
            view:       context.getCurrentTexture().createView(),
            loadOp:     'clear',
            storeOp:    'store',
            clearValue: { r: 0, g: 0, b: 0.02, a: 1 },
          }],
        });
        pass.setPipeline(pipeline);
        pass.setBindGroup(0, bindGroup);
        pass.draw(3);
        pass.end();
        queue.submit([enc.finish()]);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
