<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project 3: 3D Cube Swap</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: #000;
      overflow: hidden;
      height: 100dvh;
    }

    /* ═══════════════════════════════════════
       3D SCENE SETUP

       Three properties work together to create depth:

       1. perspective: distance from the viewer's eye to the z=0 plane.
          Smaller = more dramatic distortion. We use 250vw so the effect
          is noticeable but not cartoonish on any screen width.

       2. transform-style: preserve-3d on .cube lets child elements
          exist in the same 3D space. Without it, they flatten.

       3. overflow: hidden clips the faces — because translateZ brings
          them toward the viewer, they project slightly larger than
          the viewport. Clipping keeps them contained.
    ═══════════════════════════════════════ */
    .scene {
      position: fixed;
      inset: 0;
      perspective: 250vw;
      perspective-origin: center center;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════
       THE CUBE

       The cube is a transparent box whose children are its faces.
       We rotate THIS element — the faces rotate with it.
       Transition only on transform so the snap-reset is instant.
    ═══════════════════════════════════════ */
    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateY(0deg);
      transition: transform 0.75s cubic-bezier(0.65, 0, 0.35, 1);
    }

    /* ═══════════════════════════════════════
       FACES

       Each face is absolute-positioned to fill the cube.
       translateZ(50vw) moves each face half the viewport-width
       forward (or, after rotation, to the side).

       backface-visibility: hidden prevents you from seeing the
       back of a face after it has rotated more than 90°. Without
       this you'd see a mirrored ghost of the face as it swings away.
    ═══════════════════════════════════════ */
    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* face-a: always at the front, facing the viewer */
    #face-a { transform: translateZ(50vw); }

    /*
      face-b: parked position is right-face of the cube.
              transform is overridden in JS to ±90deg based on nav direction.
      rotateY(90deg)  → right  face (used when navigating FORWARD)
      rotateY(-90deg) → left   face (used when navigating BACKWARD)
    */
    #face-b { transform: rotateY(90deg) translateZ(50vw); }

    /* ═══════════════════════════════════════
       SLIDE CONTENT

       Each face hosts a full-bleed slide. The content container
       is narrower than the face so it stays in the "safe zone"
       even if the perspective scaling clips the edges slightly.
    ═══════════════════════════════════════ */
    .slide-bg {
      position: absolute;
      inset: 0;
      transition: background 0s; /* instant on snap-reset */
    }

    .slide-content {
      position: relative;   /* above .slide-bg */
      z-index: 1;
      text-align: center;
      padding: 48px;
      max-width: 700px;
      color: #f5f5f7;
    }

    .eyebrow {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.85;
    }

    .slide-title {
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 24px;
      white-space: pre-line;
    }

    .slide-body {
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 400;
      line-height: 1.7;
      opacity: 0.55;
      white-space: pre-line;
    }

    /* Edge shadow — thin black strip at left & right to simulate
       the ambient occlusion of a real 3D cube corner */
    .edge-shadow {
      position: absolute;
      top: 0; bottom: 0;
      width: 40px;
      pointer-events: none;
      z-index: 10;
    }
    .edge-shadow.left  {
      left: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.35) 0%, transparent 100%);
    }
    .edge-shadow.right {
      right: 0;
      background: linear-gradient(to left, rgba(0,0,0,0.35) 0%, transparent 100%);
    }

    /* ═══════════════════════════════════════
       NAVIGATION CONTROLS
    ═══════════════════════════════════════ */
    .controls {
      position: fixed;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: background 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn:hover    { background: rgba(255,255,255,0.18); }
    .nav-btn.disabled { opacity: 0.3; pointer-events: none; }

    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.35);
    }

    /* Label for technique explanation */
    .label {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- ─── 3D Scene ───────────────────────────────────────── -->
<div class="scene">
  <div class="cube" id="cube">

    <!-- Face A — always the "current" front face -->
    <div class="face" id="face-a">
      <div class="slide-bg" id="bg-a"></div>
      <div class="slide-content">
        <span class="eyebrow" id="eyebrow-a"></span>
        <h1 class="slide-title" id="title-a"></h1>
        <p class="slide-body" id="body-a"></p>
      </div>
      <div class="edge-shadow left"></div>
      <div class="edge-shadow right"></div>
    </div>

    <!-- Face B — loaded with incoming slide, parked off to the side -->
    <div class="face" id="face-b">
      <div class="slide-bg" id="bg-b"></div>
      <div class="slide-content">
        <span class="eyebrow" id="eyebrow-b"></span>
        <h1 class="slide-title" id="title-b"></h1>
        <p class="slide-body" id="body-b"></p>
      </div>
      <div class="edge-shadow left"></div>
      <div class="edge-shadow right"></div>
    </div>

  </div>
</div>

<!-- ─── Controls ──────────────────────────────────────── -->
<div class="label">3D Cube Swap — CSS preserve-3d</div>

<nav class="controls">
  <button class="nav-btn" id="prev-btn">&#8592;</button>
  <div class="dots" id="dots"></div>
  <button class="nav-btn" id="next-btn">&#8594;</button>
</nav>

<script>
/* ─────────────────────────────────────────────────────────
   SLIDE DATA
───────────────────────────────────────────────────────── */
const SLIDES = [
  {
    gradient: 'radial-gradient(ellipse at 60% 40%, #1c1c3a 0%, #000000 70%)',
    accent:   '#a78bfa',
    eyebrow:  'Introducing',
    title:    'Think\ndifferent.',
    body:     'Some ideas change everything.\nThis is one of them.',
  },
  {
    gradient: 'radial-gradient(ellipse at 40% 55%, #3c096c 0%, #0d0d0d 70%)',
    accent:   '#c77dff',
    eyebrow:  'Performance',
    title:    'Fast.\nAnd then some.',
    body:     'A18 Pro chip. The most powerful\nsemiconductor ever put in a phone.',
  },
  {
    gradient: 'radial-gradient(ellipse at 55% 45%, #023e8a 0%, #000000 70%)',
    accent:   '#48cae4',
    eyebrow:  'Camera System',
    title:    'Pro captures.\nEverywhere.',
    body:     '48MP main · 4K ProRes · Spatial Video',
  },
  {
    gradient: 'radial-gradient(ellipse at 45% 50%, #6a040f 0%, #050505 70%)',
    accent:   '#ff6b35',
    eyebrow:  'Battery Life',
    title:    'All day.\nAnd all night.',
    body:     '29 hours video playback.\nOur longest-lasting battery, ever.',
  },
  {
    gradient: 'radial-gradient(ellipse at 50% 45%, #1c1c1e 0%, #000000 70%)',
    accent:   '#f5f5f7',
    eyebrow:  'Available Now · From $999',
    title:    'Get yours.',
    body:     'Natural · Blue · White · Black Titanium.',
  },
];

/* ─────────────────────────────────────────────────────────
   DOM REFS
───────────────────────────────────────────────────────── */
const cube    = document.getElementById('cube');
const faceA   = document.getElementById('face-a');
const faceB   = document.getElementById('face-b');
const dotsEl  = document.getElementById('dots');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

/* ─────────────────────────────────────────────────────────
   RENDER HELPERS
───────────────────────────────────────────────────────── */
function renderFace(suffix, slide) {
  document.getElementById(`bg-${suffix}`).style.background     = slide.gradient;
  document.getElementById(`eyebrow-${suffix}`).textContent     = slide.eyebrow;
  document.getElementById(`eyebrow-${suffix}`).style.color     = slide.accent;
  document.getElementById(`title-${suffix}`).textContent       = slide.title;
  document.getElementById(`body-${suffix}`).textContent        = slide.body;
}

/* ─────────────────────────────────────────────────────────
   DOTS
───────────────────────────────────────────────────────── */
SLIDES.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.addEventListener('click', () => {
    if (!isAnimating && i !== current) {
      navigate(i > current ? 1 : -1, i);
    }
  });
  dotsEl.appendChild(dot);
});

function updateDots() {
  dotsEl.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
  prevBtn.classList.toggle('disabled', current === 0);
  nextBtn.classList.toggle('disabled', current === SLIDES.length - 1);
}

/* ─────────────────────────────────────────────────────────
   STATE
───────────────────────────────────────────────────────── */
let current     = 0;
let isAnimating = false;

/* ─────────────────────────────────────────────────────────
   INITIALISE

   face-a starts as the front face: translateZ(50vw)
   face-b is parked off to the right: rotateY(90deg) translateZ(50vw)
   It won't be visible until needed.
───────────────────────────────────────────────────────── */
faceA.style.transform = 'translateZ(50vw)';
faceB.style.transform = 'rotateY(90deg) translateZ(50vw)';
renderFace('a', SLIDES[0]);
updateDots();

/* ─────────────────────────────────────────────────────────
   NAVIGATE

   The core 3-step pattern for a CSS 3D transition:

   1. POSITION  — place face-b on the correct side of the cube
                  (right for forward, left for backward)

   2. ROTATE    — rotate the entire cube so face-b comes to front
                  (-90° for forward, +90° for backward)

   3. SNAP-RESET — when the animation ends:
                   a) copy incoming slide's content to face-a
                   b) disable transition (no animation)
                   c) teleport cube back to rotateY(0)
                   d) force reflow to commit the teleport
                   e) re-enable transition

   The user never sees step 3 — it happens in zero time.
   The next navigation will start cleanly from rotateY(0).
───────────────────────────────────────────────────────── */
function navigate(dir, targetIndex) {
  if (isAnimating) return;

  const next = targetIndex !== undefined
    ? targetIndex
    : (current + dir + SLIDES.length) % SLIDES.length;

  // If wrapping is disabled (first/last), bail
  if (next === current) return;

  const faceAngle = dir > 0 ?  90 : -90;  // which side face-b sits on
  const cubeAngle = dir > 0 ? -90 :  90;  // how much the cube rotates

  // Step 1 — load face-b with the incoming slide and position it
  renderFace('b', SLIDES[next]);
  faceB.style.transform = `rotateY(${faceAngle}deg) translateZ(50vw)`;

  // Step 2 — trigger the rotation
  isAnimating = true;
  cube.style.transform = `rotateY(${cubeAngle}deg)`;

  // Step 3 — snap-reset after animation completes
  cube.addEventListener('transitionend', function onEnd(e) {
    if (e.propertyName !== 'transform') return;
    cube.removeEventListener('transitionend', onEnd);

    // a) Update face-a with the now-current slide
    renderFace('a', SLIDES[next]);

    // b) Kill transition for the instant reset
    cube.style.transition = 'none';

    // c) Teleport cube to origin, face-b back to its parked position
    cube.style.transform         = 'rotateY(0deg)';
    faceA.style.transform        = 'translateZ(50vw)';
    faceB.style.transform        = 'rotateY(90deg) translateZ(50vw)';

    // d) Force a synchronous reflow — this commits all the above
    //    changes BEFORE we re-enable the transition. Without this,
    //    the browser may batch the changes and animate from old→new
    //    when the transition is restored.
    void cube.offsetHeight;

    // e) Restore the transition
    cube.style.transition = '';

    current     = next;
    isAnimating = false;
    updateDots();
  });
}

/* ─────────────────────────────────────────────────────────
   INPUT
───────────────────────────────────────────────────────── */
prevBtn.addEventListener('click', () => navigate(-1));
nextBtn.addEventListener('click', () => navigate(+1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  navigate(+1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    navigate(-1);
});

// Touch/swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
});
</script>
</body>
</html>
