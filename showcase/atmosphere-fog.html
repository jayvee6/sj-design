<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fog — sj-design showcase</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f; color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      overflow: hidden;
    }
    #layer-fog { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; opacity: 0.40; }
    .fog-band {
      position: absolute;
      bottom: -10%;
      left: -20%;
      width: 140%;
      height: 45%;
      background: radial-gradient(ellipse at 50% 100%,
        rgba(160,180,220,0.18) 0%,
        rgba(120,140,190,0.10) 40%,
        transparent 75%);
      transform-origin: bottom center;
    }
    .label {
      position: fixed; top: 24px; left: 24px; z-index: 10;
      font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: #8e8e93;
    }
    .label strong { color: #f5f5f7; letter-spacing: 0.04em; text-transform: none; font-size: 14px; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="label">
    sj-design / atmosphere
    <strong>Marine Fog</strong>
  </div>
  <div id="layer-fog" aria-hidden="true">
    <div class="fog-band" id="fog-band-1"></div>
    <div class="fog-band" id="fog-band-2" style="bottom:-15%;opacity:0.7;height:38%"></div>
  </div>

  <script>
    // ─── Marine Fog ───────────────────────────────────────────────────────
    // Two overlapping radial-gradient bands anchored to the bottom of the
    // viewport, sliding left ↔ right at different speeds (18s and 22s with a
    // 4s phase offset). The ellipse gradient from translucent cool-blue at
    // the base to transparent 75% up gives the "fog settling in" feel —
    // it's denser at the horizon than in the air above.
    //
    // The 140%-wide bands with -20% left inset mean the edges never show
    // when sliding ±8% x — no visible band-end seams.

    gsap.to('#fog-band-1', { x: '8%',  duration: 18, repeat: -1, yoyo: true, ease: 'sine.inOut' });
    gsap.to('#fog-band-2', { x: '-6%', duration: 22, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4 });
  </script>
</body>
</html>
