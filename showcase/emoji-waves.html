<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji Concentric Waves — sj-design showcase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f; color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      overflow: hidden;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    .label {
      position: fixed; top: 24px; left: 24px; z-index: 10;
      font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: #8e8e93;
    }
    .label strong { color: #f5f5f7; letter-spacing: 0.04em; text-transform: none; font-size: 14px; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="label">
    sj-design / emoji visualizations
    <strong>Concentric Waves</strong>
  </div>
  <canvas id="c"></canvas>

  <!-- Optional shared helpers — inline fallbacks below kick in if they 404 -->
  <script src="../lib/canvas-size.js"></script>
  <script src="../lib/synthetic-pulse.js"></script>
  <script>
    // ─── Emoji Concentric Waves ────────────────────────────────────────────
    // 6 rings of emojis centered on the canvas. Ring N holds N*6 emojis
    // (ring 0 is a single center emoji). Every other ring spins in the
    // opposite direction. Each ring reads an older pulse value than the
    // ring before it, so a bass hit "ripples" outward in time.
    //
    // Originally built as Mode 1 of the musicplayer-viz web app, driven by
    // real FFT bass bins. Here we feed it a synthetic pulse so the effect
    // runs standalone. Swap `computePulse(t)` for your own audio reader
    // to make it reactive — the API is { bass, history }.

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const EMOJIS = ['🐻','🦊','🦁','🐱','🐶','🐼','🤖','🐲','🦄','🐷','🐰','🐵'];
    const BASS_HISTORY_LEN = 16;
    const bassHistory = new Array(BASS_HISTORY_LEN).fill(0);

    // Pre-rasterize each emoji once into an off-screen canvas. Per-frame
    // fillText() of color-emoji glyphs is ~10× slower than drawImage() on
    // Windows (Segoe UI Emoji / DirectWrite) — same technique as
    // emoji-vortex.html. Smooth on Windows, unchanged on macOS.
    const EMOJI_GLYPH  = 0.82;   // glyph fraction of the cache box (safe padding)
    const EMOJI_MAX_PX = 56;     // ≥ largest on-screen emoji in this demo
    const emojiCache = (() => {
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      const px  = Math.ceil((EMOJI_MAX_PX / EMOJI_GLYPH) * dpr);
      const map = {};
      for (const e of EMOJIS) {
        const oc = document.createElement('canvas');
        oc.width = oc.height = px;
        const o = oc.getContext('2d');
        o.font = `${px * EMOJI_GLYPH}px serif`;
        o.textAlign = 'center';
        o.textBaseline = 'middle';
        o.fillText(e, px / 2, px / 2);
        map[e] = oc;
      }
      return map;
    })();
    function drawEmoji(emoji, x, y, size) {
      const img = emojiCache[emoji];
      if (!img) return;
      const box = size / EMOJI_GLYPH, h = box / 2;
      ctx.drawImage(img, x - h, y - h, box, box);
    }

    // Canvas sizing — use lib/canvas-size.js if it loaded, else inline fallback.
    if (window.SJCanvas) {
      window.SJCanvas.fit(canvas, ctx);
    } else {
      const resize = () => {
        const dpr = window.devicePixelRatio || 1;
        canvas.width  = window.innerWidth  * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width  = window.innerWidth  + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      };
      window.addEventListener('resize', resize);
      resize();
    }

    // Synthetic pulse — punchy "kick + ghost notes" so the ring ripple
    // reads even without music. Replace with a real audio frame to
    // make the viz react to sound.
    function computePulse(t) {
      // Prefer lib/synthetic-pulse.js (SJPulse.kick) — identical math to the
      // inline fallback below so the visual is unchanged either way.
      const bass = window.SJPulse
        ? window.SJPulse.kick(t)
        : Math.min(
            1,
            Math.pow(Math.max(0, Math.sin(t * 2.2)), 2) * 0.9
              + Math.max(0, Math.sin(t * 5.1 + 1.3)) * 0.35
          );
      bassHistory.unshift(bass);
      bassHistory.pop();
      return bass;
    }

    let waveSpin = 0;
    const RINGS = 6;

    function render(t) {
      const W = window.innerWidth, H = window.innerHeight;
      // Full clear — no trails. For a ghostly trail effect, fill with
      // rgba(10,10,15,0.22) instead of clearRect.
      ctx.clearRect(0, 0, W, H);

      const bass = computePulse(t);
      const cx = W / 2, cy = H / 2;
      waveSpin += 0.008;  // 0.008 rad/frame ≈ gentle drift at 60fps

      for (let ring = 0; ring < RINGS; ring++) {
        // Ring 0 holds the live pulse; outer rings lag behind by ring*2
        // frames so the ripple travels outward through time.
        const delayedBass = ring === 0
          ? bass
          : bassHistory[Math.min(ring * 2, BASS_HISTORY_LEN - 1)];

        const baseR = (ring + 1) * Math.min(W, H) * 0.09;
        const r     = baseR * (1 + delayedBass * 0.45);
        const count = ring === 0 ? 1 : ring * 6;       // 1, 6, 12, 18, 24, 30
        const size  = 14 + ring * 3 + delayedBass * 18;
        const dir   = ring % 2 === 0 ? 1 : -1;          // alternating spin

        // No per-frame ctx.font / fillText — drawEmoji() blits the cache.
        for (let j = 0; j < count; j++) {
          const angle = (j / count) * Math.PI * 2 + waveSpin * dir;
          const x = cx + r * Math.cos(angle);
          const y = cy + r * Math.sin(angle);
          const emoji = EMOJIS[(ring * 4 + j) % EMOJIS.length];
          drawEmoji(emoji, x, y, size);
        }
      }
    }

    let t0;
    function frame(ts) {
      if (!t0) t0 = ts;
      render((ts - t0) / 1000);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
