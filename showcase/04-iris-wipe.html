<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project 4: Cinematic Iris Wipe</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100dvh;
      cursor: pointer;   /* whole viewport is clickable */
    }

    /* ═══════════════════════════════════════
       THE STAGE — two full-viewport slides stacked

       slide-a: the current slide, always fully visible
       slide-b: the incoming slide, hidden behind a clip-path circle
                that starts at radius 0 and expands to 150%
    ═══════════════════════════════════════ */
    .stage {
      position: fixed;
      inset: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide-bg {
      position: absolute;
      inset: 0;
      transition: background 0s;
    }

    /* slide-b sits on top and is initially invisible (radius = 0).
       clip-path is set inline by JS so the origin point (at X% Y%)
       matches exactly where the user clicked or the button center.

       pointer-events: none lets mouse events fall through to slide-a
       when slide-b is in the "closed" state. */
    #slide-b {
      pointer-events: none;
    }

    /* ═══════════════════════════════════════
       SLIDE CONTENT

       Light/dark text colours are applied inline per slide.
       Using clamp() so titles scale gracefully in the preview.
    ═══════════════════════════════════════ */
    .slide-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 48px;
      max-width: 720px;
      pointer-events: none;
    }

    .eyebrow {
      display: block;
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 22px;
      opacity: 0.9;
    }

    .slide-title {
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 700;
      letter-spacing: -0.045em;
      line-height: 1.04;
      margin-bottom: 26px;
      white-space: pre-line;
    }

    .slide-body {
      font-size: clamp(1rem, 2vw, 1.18rem);
      font-weight: 400;
      line-height: 1.7;
      opacity: 0.5;
      white-space: pre-line;
    }

    /* ═══════════════════════════════════════
       IRIS ORIGIN PULSE

       A brief expanding ring appears where the iris opens.
       Pure CSS animation — no JS animation frame needed.
    ═══════════════════════════════════════ */
    #iris-pulse {
      position: fixed;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.7);
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
    }

    #iris-pulse.fire {
      animation: iris-ring 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes iris-ring {
      0%   { transform: translate(-50%, -50%) scale(0.2); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(5);   opacity: 0; }
    }

    /* ═══════════════════════════════════════
       EASING PICKER

       Swapping the timing function live demonstrates exactly
       how much personality a cubic-bezier injects.
    ═══════════════════════════════════════ */
    .ease-bar {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 22px;
      padding: 5px 8px;
      pointer-events: auto;
    }

    .ease-label {
      font-size: 0.68rem;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0 6px;
      white-space: nowrap;
    }

    .ease-btn {
      padding: 5px 13px;
      border-radius: 14px;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      border: 1px solid transparent;
      color: rgba(255, 255, 255, 0.5);
      transition: all 0.15s;
      white-space: nowrap;
    }

    .ease-btn:hover  { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.08); }
    .ease-btn.active { color: #fff; background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.2); }

    /* ═══════════════════════════════════════
       NAV CONTROLS
    ═══════════════════════════════════════ */
    .controls {
      position: fixed;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      display: flex;
      align-items: center;
      gap: 22px;
      pointer-events: auto;
    }

    .nav-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(128,128,128,0.18);
      border: 1px solid rgba(128,128,128,0.25);
      color: rgba(255,255,255,0.8);
      font-size: 1.1rem;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.15s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn:hover    { background: rgba(128,128,128,0.3); }
    .nav-btn.disabled { opacity: 0.25; pointer-events: none; }

    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(128,128,128,0.5);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
      pointer-events: auto;
    }

    .dot.active {
      background: rgba(255,255,255,0.85);
      transform: scale(1.4);
    }

    /* Hint text */
    .hint {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      font-size: 0.72rem;
      color: rgba(128,128,128,0.5);
      letter-spacing: 0.04em;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<!-- ─── Slides ────────────────────────────────────────── -->
<div class="stage" id="stage">

  <div class="slide" id="slide-a">
    <div class="slide-bg" id="bg-a"></div>
    <div class="slide-content">
      <span class="eyebrow" id="eyebrow-a"></span>
      <h1 class="slide-title" id="title-a"></h1>
      <p class="slide-body" id="body-a"></p>
    </div>
  </div>

  <div class="slide" id="slide-b">
    <div class="slide-bg" id="bg-b"></div>
    <div class="slide-content">
      <span class="eyebrow" id="eyebrow-b"></span>
      <h1 class="slide-title" id="title-b"></h1>
      <p class="slide-body" id="body-b"></p>
    </div>
  </div>

</div>

<!-- ─── Iris pulse indicator ──────────────────────────── -->
<div id="iris-pulse"></div>

<!-- ─── Easing picker ─────────────────────────────────── -->
<div class="ease-bar" id="ease-bar">
  <span class="ease-label">Curve</span>
</div>

<!-- ─── Navigation ────────────────────────────────────── -->
<nav class="controls">
  <button class="nav-btn" id="prev-btn">&#8592;</button>
  <div class="dots" id="dots"></div>
  <button class="nav-btn" id="next-btn">&#8594;</button>
</nav>

<p class="hint">Click anywhere to advance · ← → to navigate</p>

<script>
/* ─────────────────────────────────────────────────────────
   SLIDE DATA — alternating light/dark for maximum contrast,
   so the iris wipe is dramatic on every transition
───────────────────────────────────────────────────────── */
const SLIDES = [
  {
    bg:    '#f5f5f7',
    text:  '#1d1d1f',
    accent:'#0071e3',
    eyebrow:'Apple Keynote · 2024',
    title: 'One more\nthing.',
    body:  'The moment the whole world waits for.',
  },
  {
    bg:    '#000000',
    text:  '#f5f5f7',
    accent:'#2997ff',
    eyebrow:'iPhone 16 Pro',
    title: 'Forged in\ntitanium.',
    body:  'The strongest material ever used in an iPhone.\nLighter. More durable. More beautiful.',
  },
  {
    bg:    '#f0faf4',
    text:  '#1d3a28',
    accent:'#28a745',
    eyebrow:'Environment',
    title: 'Carbon neutral\nby 2030.',
    body:  'Every product. Every process.\nEvery supplier. Every decision.',
  },
  {
    bg:    '#0a0a14',
    text:  '#f5f5f7',
    accent:'#ff9f0a',
    eyebrow:'M4 Pro',
    title: 'Unbounded\nperformance.',
    body:  'More memory bandwidth than any other\npersonal computer chip on the planet.',
  },
  {
    bg:    '#fff0f3',
    text:  '#3d0014',
    accent:'#ff375f',
    eyebrow:'Available Now',
    title: 'The future\nis here.',
    body:  'Order today. Delivers Friday.\nStarting at $999.',
  },
];

/* ─────────────────────────────────────────────────────────
   EASING PRESETS

   This is the educational core of Project 4: the same
   clip-path animation, four completely different feels,
   just by swapping the cubic-bezier.

   ┌─────────────────────────────────────────────────────┐
   │ cubic-bezier(P1x, P1y, P2x, P2y)                    │
   │                                                     │
   │  P1 controls the START of the curve (ease-in feel)  │
   │  P2 controls the END  of the curve (ease-out feel)  │
   │                                                     │
   │  Both X values must be in [0,1].                    │
   │  Y values outside [0,1] create overshoot (spring).  │
   └─────────────────────────────────────────────────────┘
───────────────────────────────────────────────────────── */
const EASING = [
  {
    name:     'Spring',
    ease:     'cubic-bezier(0.34, 1.25, 0.64, 1)',
    duration: '0.82s',
    note:     'P2y > 1.0 — the iris briefly overshoots 150% and snaps back',
  },
  {
    name:     'Expo',
    ease:     'cubic-bezier(0.16, 1, 0.3, 1)',
    duration: '0.72s',
    note:     'Slow start, explosive mid, silky landing — closest to Apple\'s native feel',
  },
  {
    name:     'Smooth',
    ease:     'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
    duration: '0.90s',
    note:     'Symmetric ease-in-out — balanced, professional',
  },
  {
    name:     'Linear',
    ease:     'linear',
    duration: '0.60s',
    note:     'Constant velocity — mechanical, robotic, no personality',
  },
];

/* ─────────────────────────────────────────────────────────
   DOM REFS
───────────────────────────────────────────────────────── */
const slideA   = document.getElementById('slide-a');
const slideB   = document.getElementById('slide-b');
const dotsEl   = document.getElementById('dots');
const prevBtn  = document.getElementById('prev-btn');
const nextBtn  = document.getElementById('next-btn');
const easeBar  = document.getElementById('ease-bar');
const pulseDot = document.getElementById('iris-pulse');

/* ─────────────────────────────────────────────────────────
   RENDER
───────────────────────────────────────────────────────── */
function renderSlide(suffix, slide) {
  document.getElementById(`bg-${suffix}`).style.background      = slide.bg;
  document.getElementById(`eyebrow-${suffix}`).textContent      = slide.eyebrow;
  document.getElementById(`eyebrow-${suffix}`).style.color      = slide.accent;
  document.getElementById(`title-${suffix}`).textContent        = slide.title;
  document.getElementById(`title-${suffix}`).style.color        = slide.text;
  document.getElementById(`body-${suffix}`).textContent         = slide.body;
  document.getElementById(`body-${suffix}`).style.color         = slide.text;
}

/* ─────────────────────────────────────────────────────────
   EASING PICKER
───────────────────────────────────────────────────────── */
let activeEasingIdx = 1;   // default: Expo

EASING.forEach((preset, i) => {
  const btn = document.createElement('button');
  btn.className  = 'ease-btn' + (i === activeEasingIdx ? ' active' : '');
  btn.textContent = preset.name;
  btn.title = preset.note;
  btn.addEventListener('click', e => {
    e.stopPropagation();
    activeEasingIdx = i;
    easeBar.querySelectorAll('.ease-btn').forEach((b, j) => {
      b.classList.toggle('active', j === i);
    });
  });
  easeBar.appendChild(btn);
});

/* ─────────────────────────────────────────────────────────
   DOTS
───────────────────────────────────────────────────────── */
SLIDES.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.addEventListener('click', e => {
    e.stopPropagation();
    if (!isAnimating && i !== current) {
      navigate(i > current ? 1 : -1, i);
    }
  });
  dotsEl.appendChild(dot);
});

function updateUI() {
  dotsEl.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
  prevBtn.classList.toggle('disabled', current === 0);
  nextBtn.classList.toggle('disabled', current === SLIDES.length - 1);
}

/* ─────────────────────────────────────────────────────────
   IRIS PULSE

   A pure CSS animation — we reposition the element,
   strip the class, force reflow, then re-add it.
   This restarts the @keyframes from the beginning.
───────────────────────────────────────────────────────── */
function firePulse(x, y) {
  pulseDot.style.left = x + 'px';
  pulseDot.style.top  = y + 'px';
  pulseDot.classList.remove('fire');
  void pulseDot.offsetHeight;   // restart keyframes
  pulseDot.classList.add('fire');
}

/* ─────────────────────────────────────────────────────────
   STATE
───────────────────────────────────────────────────────── */
let current     = 0;
let isAnimating = false;

/* ─────────────────────────────────────────────────────────
   INITIALISE
───────────────────────────────────────────────────────── */
renderSlide('a', SLIDES[0]);
// slide-b starts collapsed; actual content loaded on first navigate()
slideB.style.clipPath = 'circle(0% at 50% 50%)';
updateUI();

/* ─────────────────────────────────────────────────────────
   NAVIGATE

   The iris wipe in three CSS lines:

     1. clip-path: circle(0% at OX% OY%)    — instant, start closed
     2. [reflow]
     3. clip-path: circle(150% at OX% OY%)  — transition plays

   The "at OX% OY%" value stays CONSTANT across both
   states — only the radius animates. If you change the
   origin mid-transition the interpolation breaks.

   150% guarantees coverage even from a corner origin:
   the maximum distance from any corner to the opposite
   corner is ~141% of sqrt((w²+h²)/2), so 150% always wins.
───────────────────────────────────────────────────────── */
function navigate(dir, targetIdx) {
  if (isAnimating) return;

  const next = targetIdx !== undefined
    ? targetIdx
    : (current + dir + SLIDES.length) % SLIDES.length;

  if (next === current) return;

  const { ease, duration } = EASING[activeEasingIdx];

  // Calculate iris origin from button center or click position
  // (caller sets this via the event; default = viewport center)
  const ox = (navigate._ox ?? 50).toFixed(2);
  const oy = (navigate._oy ?? 50).toFixed(2);
  navigate._ox = navigate._oy = null;   // clear for next call

  // Load incoming slide into face B
  renderSlide('b', SLIDES[next]);
  firePulse(
    parseFloat(ox) / 100 * window.innerWidth,
    parseFloat(oy) / 100 * window.innerHeight
  );

  isAnimating = true;

  /* ── The core iris transition ──────────────────────── */
  // Step 1: snap to closed (no transition)
  slideB.style.transition = 'none';
  slideB.style.clipPath   = `circle(0% at ${ox}% ${oy}%)`;

  // Step 2: commit — synchronous reflow forces the browser to
  // paint the "closed" state before we re-enable transitions.
  // Without this, both style changes batch together and the
  // browser skips directly to the final open state with no animation.
  void slideB.offsetHeight;

  // Step 3: enable transition and open the iris
  slideB.style.transition = `clip-path ${duration} ${ease}`;
  slideB.style.clipPath   = `circle(150% at ${ox}% ${oy}%)`;

  /* ── Cleanup ──────────────────────────────────────── */
  slideB.addEventListener('transitionend', function onEnd(e) {
    if (e.propertyName !== 'clip-path') return;
    slideB.removeEventListener('transitionend', onEnd);

    // Promote slide B → slide A content
    renderSlide('a', SLIDES[next]);

    // Silently reset slide B back to closed
    slideB.style.transition = 'none';
    slideB.style.clipPath   = 'circle(0% at 50% 50%)';

    current     = next;
    isAnimating = false;
    updateUI();
  });
}

/* ─────────────────────────────────────────────────────────
   INPUT — set origin before calling navigate()
───────────────────────────────────────────────────────── */
function withOrigin(x, y, fn) {
  navigate._ox = (x / window.innerWidth  * 100);
  navigate._oy = (y / window.innerHeight * 100);
  fn();
}

// Click anywhere on stage → advance from click point
document.getElementById('stage').addEventListener('click', e => {
  if (current < SLIDES.length - 1) {
    withOrigin(e.clientX, e.clientY, () => navigate(+1));
  }
});

// Button nav — iris from button center
function btnOrigin(btn, dir) {
  const r = btn.getBoundingClientRect();
  withOrigin(r.left + r.width / 2, r.top + r.height / 2, () => navigate(dir));
}

prevBtn.addEventListener('click', e => { e.stopPropagation(); btnOrigin(prevBtn, -1); });
nextBtn.addEventListener('click', e => { e.stopPropagation(); btnOrigin(nextBtn, +1); });

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(+1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});

// Touch swipe
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) {
    const touch = e.changedTouches[0];
    withOrigin(touch.clientX, touch.clientY, () => navigate(dx < 0 ? 1 : -1));
  }
});
</script>
</body>
</html>
