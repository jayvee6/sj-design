<!DOCTYPE html>
<html lang="en" data-theme="{{THEME}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>

  <!-- GSAP — industry-standard animation engine -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    /* ─── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Design tokens ──────────────────────────────────────────── */
    :root {
      --font:        -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
                     "Helvetica Neue", Arial, sans-serif;
      --font-serif:  Georgia, "Times New Roman", serif;

      /* Dark (default) */
      --bg:          #000000;
      --bg-gradient: radial-gradient(ellipse at 25% 25%, #0c0c22 0%, #060610 45%, #000 100%);
      --label-1:     #ffffff;
      --label-2:     rgba(255,255,255,0.55);
      --label-3:     rgba(255,255,255,0.25);
      --accent:      #0A84FF;
      --accent-glow: rgba(10,132,255,0.35);
      --fill-1:      rgba(255,255,255,0.04);
      --fill-2:      rgba(255,255,255,0.08);
      --sep:         rgba(255,255,255,0.10);
      --glass-bg:    rgba(255,255,255,0.05);
      --glass-bdr:   rgba(255,255,255,0.10);
      --glass-shd:   0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    [data-theme="light"] {
      --bg:          #f5f5f7;
      --bg-gradient: linear-gradient(145deg, #f5f5f7 0%, #e5e5ea 100%);
      --label-1:     #1d1d1f;
      --label-2:     rgba(0,0,0,0.55);
      --label-3:     rgba(0,0,0,0.25);
      --accent:      #0071E3;
      --accent-glow: rgba(0,113,227,0.25);
      --fill-1:      rgba(0,0,0,0.04);
      --fill-2:      rgba(0,0,0,0.07);
      --sep:         rgba(0,0,0,0.10);
      --glass-bg:    rgba(255,255,255,0.65);
      --glass-bdr:   rgba(0,0,0,0.08);
      --glass-shd:   0 8px 40px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.9);
    }

    /* ─── Base ───────────────────────────────────────────────────── */
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font);
      background: var(--bg-gradient);
      color: var(--label-1);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    /* ─── Ambient glow orbs ──────────────────────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(120px);
      opacity: 0.25;
    }

    /* ─── Deck ───────────────────────────────────────────────────── */
    #deck {
      position: relative;
      width:  min(100vw, 177.78vh);
      height: min(100vh, 56.25vw);
      overflow: hidden;
    }

    /* ─── Slides ─────────────────────────────────────────────────── */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(28px, 5%, 72px) clamp(36px, 7%, 108px);
      opacity: 0;
      pointer-events: none;
      will-change: opacity, transform;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ─── Slide inner containers ─────────────────────────────────── */
    .slide-inner {
      width: 100%;
      max-width: 960px;
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 1.8vw, 24px);
    }

    .slide-inner--center {
      align-items: center;
      text-align: center;
    }

    /* ─── Eyebrow ────────────────────────────────────────────────── */
    .eyebrow {
      font-size:      clamp(9px, 0.95vw, 14px);
      font-weight:    600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color:          var(--accent);
    }

    /* ─── Icon ───────────────────────────────────────────────────── */
    .slide-icon {
      font-size: clamp(28px, 4.5vw, 64px);
      line-height: 1;
    }

    /* ─── Headlines ──────────────────────────────────────────────── */
    .headline {
      font-size:      clamp(26px, 4.6vw, 68px);
      font-weight:    700;
      line-height:    1.06;
      letter-spacing: -0.028em;
      color:          var(--label-1);
    }

    .slide-title .headline {
      font-size:      clamp(32px, 6vw, 88px);
      font-weight:    800;
      letter-spacing: -0.038em;
    }

    .closing-headline {
      font-size:      clamp(32px, 5.5vw, 80px);
      font-weight:    800;
      letter-spacing: -0.035em;
    }

    .media-heading {
      font-size:      clamp(18px, 2.6vw, 38px);
    }

    /* ─── Subheading ─────────────────────────────────────────────── */
    .subheading {
      font-size:   clamp(14px, 1.8vw, 28px);
      font-weight: 400;
      line-height: 1.45;
      color:       var(--label-2);
    }

    /* ─── Bullets ────────────────────────────────────────────────── */
    .bullets {
      list-style:    none;
      display:       flex;
      flex-direction: column;
      gap:           clamp(6px, 1vw, 14px);
    }

    .bullets li {
      font-size:   clamp(13px, 1.65vw, 24px);
      font-weight: 400;
      line-height: 1.5;
      color:       var(--label-2);
      padding-left: clamp(18px, 1.8vw, 28px);
      position:    relative;
    }

    .bullets li::before {
      content:       '';
      position:      absolute;
      left:          0;
      top:           0.65em;
      width:         clamp(4px, 0.45vw, 7px);
      height:        clamp(4px, 0.45vw, 7px);
      border-radius: 50%;
      background:    var(--accent);
    }

    /* ─── Slide note ─────────────────────────────────────────────── */
    .slide-note {
      font-size:  clamp(10px, 0.95vw, 14px);
      font-style: italic;
      color:      var(--label-3);
      margin-top: clamp(4px, 0.5vw, 8px);
    }

    /* ─── Quote slide ────────────────────────────────────────────── */
    .slide-inner--quote {
      position: relative;
      gap: clamp(20px, 3vw, 48px);
    }

    /* Decorative watermark — positioned behind content, out of flow */
    .quote-watermark {
      position:      absolute;
      top:           -12%;
      left:          50%;
      transform:     translateX(-50%);
      font-size:     clamp(140px, 22vw, 320px);
      font-family:   var(--font-serif);
      line-height:   1;
      color:         var(--accent);
      opacity:       0;           /* animated in by GSAP */
      pointer-events: none;
      user-select:   none;
      z-index:       0;
    }

    .slide-inner--quote .slide-icon,
    .slide-inner--quote .eyebrow,
    .slide-inner--quote blockquote,
    .slide-inner--quote cite {
      position: relative;
      z-index: 1;
    }

    blockquote {
      font-size:      clamp(20px, 3.2vw, 48px);
      font-weight:    600;
      line-height:    1.38;
      letter-spacing: -0.02em;
      color:          var(--label-1);
      max-width:      76%;
      padding:        clamp(8px, 1.2vw, 18px) 0;
    }

    cite {
      font-size:   clamp(12px, 1.2vw, 18px);
      font-style:  normal;
      color:       var(--accent);
      letter-spacing: 0.01em;
    }

    /* ─── Two-column ─────────────────────────────────────────────── */
    .two-col {
      display:               grid;
      grid-template-columns: 1fr 1fr;
      gap:                   clamp(16px, 2.5vw, 48px);
    }

    .col {
      display:        flex;
      flex-direction: column;
      gap:            clamp(6px, 0.8vw, 12px);
      padding:        clamp(14px, 1.8vw, 28px);
      background:     var(--fill-1);
      border-radius:  clamp(10px, 1.2vw, 18px);
      border:         1px solid var(--sep);
    }

    .col-title {
      font-size:   clamp(13px, 1.4vw, 20px);
      font-weight: 600;
      color:       var(--label-1);
    }

    .col-text {
      font-size:   clamp(11px, 1.1vw, 16px);
      line-height: 1.55;
      color:       var(--label-2);
    }

    /* ─── Media slide ────────────────────────────────────────────── */
    .slide-inner--media {
      gap: clamp(10px, 1.5vw, 20px);
    }

    .media-frame {
      width:         100%;
      max-width:     min(780px, 84vw);
      aspect-ratio:  16 / 9;
      border-radius: clamp(8px, 1vw, 14px);
      overflow:      hidden;
      background:    #000;
      box-shadow:    var(--glass-shd);
    }

    .media-frame iframe,
    .media-frame video,
    .media-frame img {
      width:       100%;
      height:      100%;
      object-fit:  cover;
      display:     block;
      border:      none;
    }

    .media-caption {
      font-size: clamp(10px, 0.95vw, 14px);
      color:     var(--label-3);
    }

    /* ─── Closing slide ──────────────────────────────────────────── */
    .cta {
      font-size:   clamp(14px, 1.6vw, 24px);
      font-weight: 500;
      color:       var(--accent);
    }

    .contact {
      font-size: clamp(11px, 1vw, 16px);
      color:     var(--label-3);
    }

    /* ─── Progress bar ───────────────────────────────────────────── */
    #progress {
      position:   fixed;
      bottom:     0;
      left:       0;
      height:     2px;
      width:      0%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
      transition: width 0.45s cubic-bezier(0.16,1,0.3,1);
      z-index:    200;
    }

    /* ─── HUD (counter + hints) ──────────────────────────────────── */
    #hud {
      position:    fixed;
      bottom:      clamp(10px, 1.2vw, 18px);
      left:        0;
      right:       0;
      display:     flex;
      align-items: center;
      justify-content: space-between;
      padding:     0 clamp(16px, 2vw, 28px);
      pointer-events: none;
      z-index:     200;
    }

    .hud-label {
      font-size:       clamp(9px, 0.75vw, 11px);
      color:           var(--label-3);
      letter-spacing:  0.06em;
      font-variant-numeric: tabular-nums;
    }

    /* ─── Pre-hide animatable children ──────────────────────────── */
    /* Set opacity:0 before JS loads so there's no flash of content  */
    /* before GSAP's fromTo() takes over. GSAP overrides via inline  */
    /* styles, so these rules have no effect during/after animation. */
    .slide .eyebrow,
    .slide .slide-icon,
    .slide .headline,
    .slide .subheading,
    .slide .bullets li,
    .slide blockquote,
    .slide cite,
    .slide .quote-watermark,
    .slide .col,
    .slide .media-frame,
    .slide .media-caption,
    .slide .cta,
    .slide .contact,
    .slide .slide-note {
      opacity: 0;
    }
  </style>
</head>

<body>

<!-- Ambient orbs -->
<div class="orb" style="width:55vw;height:55vw;top:-15vh;left:-10vw;background:radial-gradient(circle,rgba(10,132,255,0.18),transparent 70%)"></div>
<div class="orb" style="width:45vw;height:45vw;bottom:-10vh;right:-8vw;background:radial-gradient(circle,rgba(88,86,214,0.14),transparent 70%)"></div>

<div id="deck">
{{SLIDES}}
</div>

<div id="progress"></div>

<div id="hud">
  <span class="hud-label" id="counter">1 / {{SLIDE_COUNT}}</span>
  <span class="hud-label" id="hint">← → navigate &nbsp;·&nbsp; F fullscreen</span>
</div>

<script>
(function () {
  'use strict';

  // ── Constants ────────────────────────────────────────────────────
  const TOTAL   = {{SLIDE_COUNT}};
  const slides  = Array.from(document.querySelectorAll('.slide'));

  // Apple expo-out easing — same curve iOS/macOS use for most transitions
  const EASE_OUT    = 'cubic-bezier(0.16, 1, 0.3, 1)';
  const EASE_SPRING = 'back.out(1.5)';
  const EASE_SOFT   = 'cubic-bezier(0.25, 0.46, 0.45, 0.94)';
  const DUR         = 0.6;

  let current   = 0;
  let animating = false;

  // ── Animate a slide's children in ───────────────────────────────
  // Uses fromTo() exclusively so start AND end states are unambiguous —
  // gsap.from() alone breaks when elements were previously set to opacity:0.
  function animateIn(slide) {
    const type = (Array.from(slide.classList)
      .find(c => c.startsWith('slide-') && c !== 'slide-inner') || '')
      .replace('slide-', '');

    const tl = gsap.timeline();

    const get  = sel => slide.querySelector(sel);
    const getA = sel => Array.from(slide.querySelectorAll(sel));

    const eyebrow   = get('.eyebrow');
    const icon      = get('.slide-icon');
    const headline  = get('.headline');
    const sub       = get('.subheading');
    const bullets   = getA('.bullets li');
    const bq        = get('blockquote');
    const cite      = get('cite');
    const watermark = get('.quote-watermark');
    const cols      = getA('.col');
    const frame     = get('.media-frame');
    const caption   = get('.media-caption');
    const cta       = get('.cta');
    const contact   = get('.contact');
    const note      = get('.slide-note');

    const S = 0.09; // stagger per item

    // Helper: fromTo with visible end state
    const ft = (el, from, opts, pos) => {
      if (!el) return;
      tl.fromTo(el, from, { ...from, y: 0, x: 0, scale: 1, opacity: 1, ...opts }, pos);
    };

    switch (type) {

      case 'title':
        ft(icon,     { y: -16, opacity: 0 }, { duration: DUR * 0.75, ease: EASE_OUT }, 0);
        ft(eyebrow,  { y: -12, opacity: 0 }, { duration: DUR * 0.7,  ease: EASE_OUT }, 0.05);
        ft(headline, { y:  44, opacity: 0 }, { duration: DUR,        ease: EASE_OUT }, icon || eyebrow ? 0.12 : 0);
        ft(sub,      { y:  20, opacity: 0 }, { duration: DUR,        ease: EASE_OUT }, 0.28);
        break;

      case 'content':
        ft(eyebrow,  { x: -18, opacity: 0 }, { duration: DUR * 0.65, ease: EASE_OUT }, 0);
        ft(headline, { x: -28, opacity: 0 }, { duration: DUR,        ease: EASE_OUT }, 0.06);
        bullets.forEach((li, i) => {
          ft(li, { x: -18, opacity: 0 }, { duration: DUR * 0.85, ease: EASE_OUT }, 0.22 + i * S);
        });
        ft(note, { opacity: 0 }, { duration: DUR * 0.55, ease: EASE_SOFT }, 0.22 + bullets.length * S + 0.1);
        break;

      case 'quote':
        if (watermark) tl.fromTo(watermark,
          { opacity: 0, scale: 1.4 },
          { opacity: 0.065, scale: 1, duration: 0.95, ease: EASE_OUT }, 0);
        ft(icon,    { scale: 0.7, opacity: 0 }, { duration: DUR * 0.75, ease: EASE_SPRING }, 0.1);
        ft(eyebrow, { y: -10, opacity: 0 },     { duration: DUR * 0.65, ease: EASE_OUT },    0.18);
        ft(bq,      { y:  32, opacity: 0 },     { duration: DUR * 1.05, ease: EASE_OUT },    0.22);
        ft(cite,    { y:  12, opacity: 0 },     { duration: DUR * 0.7,  ease: EASE_SOFT },   0.52);
        break;

      case 'two-column':
        ft(eyebrow,  { y: -14, opacity: 0 }, { duration: DUR * 0.65, ease: EASE_OUT }, 0);
        ft(headline, { y:  22, opacity: 0 }, { duration: DUR,        ease: EASE_OUT }, 0.06);
        ft(cols[0],  { x: -38, opacity: 0 }, { duration: DUR,        ease: EASE_OUT }, 0.22);
        ft(cols[1],  { x:  38, opacity: 0 }, { duration: DUR,        ease: EASE_OUT }, 0.32);
        // Stagger bullets inside each col after the cards land
        bullets.forEach((li, i) => ft(li, { y: 8, opacity: 0 },
          { duration: DUR * 0.65, ease: EASE_OUT }, 0.42 + i * 0.07));
        break;

      case 'media':
        ft(headline, { y: -18, opacity: 0   }, { duration: DUR * 0.75, ease: EASE_OUT  }, 0);
        ft(frame,    { scale: 0.94, opacity: 0 }, { duration: DUR * 1.05, ease: EASE_OUT }, headline ? 0.1 : 0);
        ft(caption,  { opacity: 0 },          { duration: DUR * 0.6,  ease: EASE_SOFT }, 0.45);
        break;

      case 'closing':
        ft(headline, { scale: 0.88, opacity: 0 }, { duration: DUR * 1.1, ease: EASE_SPRING }, 0);
        ft(cta,      { y:  20, opacity: 0 },      { duration: DUR,       ease: EASE_OUT },    0.28);
        ft(contact,  { opacity: 0 },              { duration: DUR * 0.75, ease: EASE_SOFT },  0.46);
        break;

      default: {
        const all = [icon, eyebrow, headline, sub, bq, cite,
                     frame, caption, cta, contact, note,
                     ...bullets, ...cols].filter(Boolean);
        all.forEach((el, i) => ft(el, { y: 12, opacity: 0 },
          { duration: DUR, ease: EASE_OUT }, i * S));
      }
    }

    return tl;
  }

  // ── Reset slide children to hidden before entering ──────────────
  // Called before a slide becomes active to prevent flashing of
  // previously-animated content (which has GSAP inline opacity:1).
  const CHILD_SEL = '.eyebrow, .slide-icon, .headline, .subheading, ' +
    '.bullets li, blockquote, cite, .col, .media-frame, ' +
    '.media-caption, .cta, .contact, .slide-note';

  function resetSlide(slide) {
    gsap.set(slide.querySelectorAll(CHILD_SEL), { opacity: 0 });
    const wm = slide.querySelector('.quote-watermark');
    if (wm) gsap.set(wm, { opacity: 0, scale: 1.4 });
  }

  // ── Navigate to a slide ──────────────────────────────────────────
  function goTo(next, dir) {
    if (next < 0 || next >= TOTAL || animating) return;
    animating = true;

    const from = slides[current];
    const to   = slides[next];
    const dx   = dir * 36;

    // Hide incoming slide's children BEFORE it becomes visible
    resetSlide(to);

    // Outgoing slide
    gsap.to(from, {
      opacity: 0,
      x: -dx,
      duration: 0.28,
      ease: EASE_SOFT,
      onComplete() {
        from.classList.remove('active');
        gsap.set(from, { clearProps: 'x,opacity' });
      }
    });

    // Incoming slide — starts offset, snaps to 0
    gsap.set(to, { opacity: 1, x: dx * 0.6 });
    to.classList.add('active');

    gsap.to(to, {
      x: 0,
      duration: 0.35,
      ease: EASE_OUT,
      delay: 0.12,
      onComplete() { animating = false; }
    });

    // Animate content in after slide starts arriving
    setTimeout(() => animateIn(to), 100);

    current = next;
    updateHUD();
  }

  // ── HUD ──────────────────────────────────────────────────────────
  function updateHUD() {
    document.getElementById('counter').textContent = `${current + 1} / ${TOTAL}`;
    document.getElementById('progress').style.width = `${((current + 1) / TOTAL) * 100}%`;
  }

  // ── Hide hint after first interaction ───────────────────────────
  let hintDismissed = false;
  function dismissHint() {
    if (hintDismissed) return;
    hintDismissed = true;
    const hint = document.getElementById('hint');
    gsap.to(hint, { opacity: 0, duration: 0.4 });
  }

  // ── Input handling ───────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    dismissHint();
    switch (e.key) {
      case 'ArrowRight': case 'ArrowDown': case ' ':
        e.preventDefault(); goTo(current + 1, 1); break;
      case 'ArrowLeft': case 'ArrowUp':
        e.preventDefault(); goTo(current - 1, -1); break;
      case 'f': case 'F':
        toggleFullscreen(); break;
      case 'Home':
        e.preventDefault(); goTo(0, -1); break;
      case 'End':
        e.preventDefault(); goTo(TOTAL - 1, 1); break;
    }
  });

  document.getElementById('deck').addEventListener('click', e => {
    dismissHint();
    const rect = e.currentTarget.getBoundingClientRect();
    const frac = (e.clientX - rect.left) / rect.width;
    goTo(frac > 0.42 ? current + 1 : current - 1, frac > 0.42 ? 1 : -1);
  });

  // Touch / swipe
  let t0x = 0, t0y = 0;
  document.addEventListener('touchstart', e => {
    t0x = e.touches[0].clientX;
    t0y = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - t0x;
    const dy = e.changedTouches[0].clientY - t0y;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      dismissHint();
      goTo(current + (dx < 0 ? 1 : -1), dx < 0 ? 1 : -1);
    }
  }, { passive: true });

  // ── Fullscreen ───────────────────────────────────────────────────
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.().catch(() => {});
    } else {
      document.exitFullscreen?.();
    }
  }

  // ── Init ─────────────────────────────────────────────────────────
  const first = slides[0];
  first.classList.add('active');
  gsap.set(first, { opacity: 1 });
  resetSlide(first);   // guarantee all children start at opacity:0 via
                       // inline styles *before* the first RAF fires,
                       // so there's no 1-frame flash even if CSS pre-hide
                       // loses a specificity battle or paints late.
  animateIn(first);
  updateHUD();

  // Fade hint out after 4 s of inactivity
  setTimeout(() => {
    if (!hintDismissed) gsap.to(document.getElementById('hint'), { opacity: 0, duration: 0.6 });
  }, 4000);

}());
</script>

</body>
</html>
