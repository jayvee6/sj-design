<!DOCTYPE html>
<html lang="en" data-theme="{{THEME}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>

  <!-- GSAP — industry-standard animation engine -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    /* ─── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Design tokens ──────────────────────────────────────────── */
    :root {
      --font:        -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
                     "Helvetica Neue", Arial, sans-serif;
      --font-serif:  Georgia, "Times New Roman", serif;

      /* Dark — Blue Hour: deep indigo night sky */
      --bg:          #060618;
      --bg-gradient: radial-gradient(ellipse at 35% 15%, #1A237E 0%, #191970 28%, #0d0d3a 58%, #050510 100%);
      --label-1:     #ffffff;
      --label-2:     rgba(255,255,255,0.55);
      --label-3:     rgba(255,255,255,0.25);
      --accent:      #0A84FF;
      --accent-glow: rgba(10,132,255,0.35);
      --fill-1:      rgba(255,255,255,0.04);
      --fill-2:      rgba(255,255,255,0.08);
      --sep:         rgba(255,255,255,0.10);
      --glass-bg:    rgba(255,255,255,0.09);
      --glass-bdr:   rgba(255,255,255,0.18);
      --glass-shd:   0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
    }

    [data-theme="light"] {
      /* Crissy Field — California bright, fog-free afternoon at the Golden Gate */
      --bg:          #E8F4FF;
      --bg-gradient: linear-gradient(175deg, #0096FF 0%, #1E90FF 28%, #5BB8FF 52%, #C8E8FF 72%, #EEF7FF 100%);
      --label-1:     #001E3C;
      --label-2:     rgba(0,30,60,0.55);
      --label-3:     rgba(0,30,60,0.28);
      --accent:      #E8450A;
      --accent-glow: rgba(232,69,10,0.28);
      --fill-1:      rgba(0,100,200,0.05);
      --fill-2:      rgba(0,100,200,0.09);
      --sep:         rgba(0,80,180,0.12);
      --glass-bg:    rgba(200,230,255,0.68);
      --glass-bdr:   rgba(0,100,200,0.14);
      --glass-shd:   0 8px 40px rgba(0,50,120,0.12), inset 0 1px 0 rgba(255,255,255,0.85);
    }

    /* ─── Base ───────────────────────────────────────────────────── */
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    html { transition: background 0.4s; }

    body {
      font-family: var(--font);
      background: var(--bg-gradient);
      color: var(--label-1);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    /* ─── Perlin gobo layer ──────────────────────────────────────── */
    #gobo-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: visible;
      contain: layout style;
    }

    /* ─── Starfield ──────────────────────────────────────────────── */
    #starfield {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      contain: strict;
    }

    /* ─── Bokeh ──────────────────────────────────────────────────── */
    #bokeh-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
      contain: strict;
    }

    /* Star twinkle — driven by CSS custom properties set per-element */
    @keyframes star-twinkle {
      from { opacity: var(--op); }
      to   { opacity: var(--op-low); }
    }

    /* Hide starfield in light theme — golden hour has no stars */
    [data-theme="light"] #starfield { opacity: 0; }

    /* ─── Deck ───────────────────────────────────────────────────── */
    #deck {
      position: relative;
      z-index: 9; /* above fog (z-index:8) — galleries and slides render in foreground */
      width:  min(100vw, 177.78vh);
      height: min(100vh, 56.25vw);
      overflow: hidden;
      perspective:        1400px;   /* enables rotateX/Y depth on slide children */
      perspective-origin: 50% 38%;
    }

    /* ─── Slides ─────────────────────────────────────────────────── */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(28px, 5%, 72px) clamp(36px, 7%, 108px);
      opacity: 0;
      pointer-events: none;
      will-change: opacity, transform;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ─── Slide inner containers ─────────────────────────────────── */
    .slide-inner {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      gap: clamp(12px, 2vw, 28px);
    }

    .slide-inner--center {
      align-items: center;
      text-align: center;
    }

    /* ─── Eyebrow ────────────────────────────────────────────────── */
    .eyebrow {
      font-size:      clamp(17px, 2.2vw, 32px);
      font-weight:    600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color:          var(--accent);
    }
    /* In Crissy Field light mode the vivid blue background kills contrast
       on small-caps orange — swap to near-white for legibility */
    [data-theme="light"] .eyebrow {
      color: rgba(255,255,255,0.92);
    }

    /* ─── Icon ───────────────────────────────────────────────────── */
    .slide-icon {
      font-size: clamp(28px, 4.5vw, 64px);
      line-height: 1;
    }

    /* ─── Headlines ──────────────────────────────────────────────── */
    .headline {
      font-size:      clamp(26px, 4.6vw, 68px);
      font-weight:    700;
      line-height:    1.06;
      letter-spacing: -0.028em;
      color:          var(--label-1);
    }

    .slide-title .headline {
      font-size:      clamp(32px, 6vw, 88px);
      font-weight:    800;
      letter-spacing: -0.038em;
    }

    .closing-headline {
      font-size:      clamp(32px, 5.5vw, 80px);
      font-weight:    800;
      letter-spacing: -0.035em;
    }

    .media-heading {
      font-size:      clamp(18px, 2.6vw, 38px);
    }

    /* ─── Subheading ─────────────────────────────────────────────── */
    .subheading {
      font-size:   clamp(17px, 2.2vw, 32px);
      font-weight: 400;
      line-height: 1.45;
      color:       var(--label-2);
    }

    /* ─── Bullets ────────────────────────────────────────────────── */
    .bullets {
      list-style:    none;
      display:       flex;
      flex-direction: column;
      gap:           clamp(10px, 1.4vw, 20px);
    }

    .bullets li {
      font-size:   clamp(17px, 2.3vw, 34px);
      font-weight: 500;
      line-height: 1.5;
      color:       var(--label-1);
      padding-left: clamp(18px, 1.8vw, 28px);
      position:    relative;
    }

    .bullets li::before {
      content:       '';
      position:      absolute;
      left:          0;
      top:           0.65em;
      width:         clamp(4px, 0.45vw, 7px);
      height:        clamp(4px, 0.45vw, 7px);
      border-radius: 50%;
      background:    var(--accent);
    }

    /* ─── Slide note ─────────────────────────────────────────────── */
    .slide-note {
      font-size:  clamp(10px, 0.95vw, 14px);
      font-style: italic;
      color:      var(--label-3);
      margin-top: clamp(4px, 0.5vw, 8px);
    }

    /* ─── Quote slide ────────────────────────────────────────────── */
    .slide-inner--quote {
      position: relative;
      gap: clamp(20px, 3vw, 48px);
    }

    /* Decorative watermark — positioned behind content, out of flow */
    .quote-watermark {
      position:      absolute;
      top:           -12%;
      left:          50%;
      transform:     translateX(-50%);
      font-size:     clamp(140px, 22vw, 320px);
      font-family:   var(--font-serif);
      line-height:   1;
      color:         var(--accent);
      opacity:       0;           /* animated in by GSAP */
      pointer-events: none;
      user-select:   none;
      z-index:       0;
    }

    .slide-inner--quote .slide-icon,
    .slide-inner--quote .eyebrow,
    .slide-inner--quote blockquote,
    .slide-inner--quote cite {
      position: relative;
      z-index: 1;
    }

    blockquote {
      font-size:      clamp(20px, 3.2vw, 48px);
      font-weight:    600;
      line-height:    1.38;
      letter-spacing: -0.02em;
      color:          var(--label-1);
      max-width:      76%;
      padding:        clamp(8px, 1.2vw, 18px) 0;
    }

    cite {
      font-size:   clamp(12px, 1.2vw, 18px);
      font-style:  normal;
      color:       var(--accent);
      letter-spacing: 0.01em;
    }

    .quote-credit {
      font-size:      clamp(10px, 0.95vw, 14px);
      font-style:     normal;
      color:          var(--label-2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top:     clamp(4px, 0.6vw, 8px);
      position:       relative;
      z-index:        1;
    }

    /* ─── Two-column ─────────────────────────────────────────────── */
    .two-col {
      display:               grid;
      grid-template-columns: 1fr 1fr;
      gap:                   clamp(16px, 2.5vw, 48px);
    }

    /* Two-column slides have more content — top-align so nothing gets cropped */
    .slide-two-column {
      align-items: flex-start;
    }

    /* Bullets inside columns need to be smaller than full-width bullets */
    .slide-two-column .bullets li {
      font-size:   clamp(13px, 1.4vw, 20px);
      line-height: 1.55;
    }

    .col {
      display:        flex;
      flex-direction: column;
      gap:            clamp(6px, 0.8vw, 12px);
      padding:        clamp(14px, 1.8vw, 28px);
      background:     var(--glass-bg);
      border-radius:  clamp(10px, 1.2vw, 18px);
      border:         1px solid var(--glass-bdr);
      box-shadow:     var(--glass-shd);
    }

    .col-title {
      font-size:      clamp(13px, 1.4vw, 20px);
      font-weight:    700;
      color:          var(--label-1);
      letter-spacing: 0.01em;
      padding-bottom: clamp(4px, 0.5vw, 8px);
      border-bottom:  1px solid var(--sep);
      margin-bottom:  clamp(2px, 0.3vw, 4px);
    }

    .col-text {
      font-size:   clamp(11px, 1.1vw, 16px);
      line-height: 1.55;
      color:       var(--label-2);
    }

    /* ─── Media slide ────────────────────────────────────────────── */
    .slide-inner--media {
      gap: clamp(10px, 1.5vw, 20px);
    }

    .media-frame {
      width:         100%;
      max-width:     min(780px, 84vw);
      aspect-ratio:  16 / 9;
      border-radius: clamp(8px, 1vw, 14px);
      overflow:      hidden;
      background:    #000;
      box-shadow:    var(--glass-shd);
    }

    .media-frame iframe,
    .media-frame video,
    .media-frame img {
      width:       100%;
      height:      100%;
      object-fit:  cover;
      display:     block;
      border:      none;
    }

    /* ─── Ken Burns Gallery ──────────────────────────────────────── */
    .slide-gallery .slide-inner {
      gap:     clamp(6px, 0.9vw, 14px);
      padding: clamp(10px, 1.5vh, 24px) clamp(10px, 1.8vw, 28px);
    }

    .gallery-frame {
      width:         100%;
      max-width:     min(1260px, 97vw);
      aspect-ratio:  16 / 9;
      border-radius: clamp(8px, 1vw, 14px);
      overflow:      hidden;
      background:    #000;
      border:        1px solid var(--glass-bdr);
      box-shadow:    var(--glass-shd);
      position:      relative;
    }

    .gallery-kb {
      position: relative;
      width:    100%;
      height:   100%;
    }

    .kb-slide {
      position: absolute;
      inset:    0;
      opacity:  0; /* GSAP controls crossfade — no CSS transition */
    }

    .kb-slide img {
      width:        100%;
      height:       100%;
      object-fit:   cover;
      will-change:  transform;
      display:      block;
    }

    /* All photos animate continuously — opacity controls visibility.
       Negative delays start each photo mid-cycle so they're already
       in motion when they cross-fade in. No snap-back on transition. */
    .kb-slide:nth-child(1) img { animation: kb-1 7s ease-in-out infinite alternate; animation-delay:  -0s; }
    .kb-slide:nth-child(2) img { animation: kb-2 7s ease-in-out infinite alternate; animation-delay: -2s; }
    .kb-slide:nth-child(3) img { animation: kb-3 7s ease-in-out infinite alternate; animation-delay: -4s; }
    .kb-slide:nth-child(4) img { animation: kb-4 7s ease-in-out infinite alternate; animation-delay: -1s; }
    .kb-slide:nth-child(5) img { animation: kb-1 7s ease-in-out infinite alternate; animation-delay: -3s; }
    .kb-slide:nth-child(6) img { animation: kb-2 7s ease-in-out infinite alternate; animation-delay: -5s; }
    .kb-slide:nth-child(7) img { animation: kb-3 7s ease-in-out infinite alternate; animation-delay: -2s; }
    .kb-slide:nth-child(8) img { animation: kb-4 7s ease-in-out infinite alternate; animation-delay: -6s; }
    .kb-slide:nth-child(9) img { animation: kb-1 7s ease-in-out infinite alternate; animation-delay: -3s; }

    @keyframes kb-1 {
      0%   { transform: scale(1.00) translate( 0%,   0%); }
      100% { transform: scale(1.18) translate(-3%,  -2%); }
    }
    @keyframes kb-2 {
      0%   { transform: scale(1.18) translate(-3%,   2%); }
      100% { transform: scale(1.00) translate( 3%,  -1%); }
    }
    @keyframes kb-3 {
      0%   { transform: scale(1.00) translate( 3%,   1%); }
      100% { transform: scale(1.16) translate(-2%,  -3%); }
    }
    @keyframes kb-4 {
      0%   { transform: scale(1.12) translate(-1%,   2%); }
      100% { transform: scale(1.00) translate( 2%,  -2%); }
    }

    /* Dot indicators */
    .gallery-dots {
      display:         flex;
      gap:             clamp(4px, 0.5vw, 8px);
      justify-content: center;
      margin-top:      clamp(4px, 0.6vw, 10px);
    }

    .gallery-dot {
      width:         5px;
      height:        5px;
      border-radius: 50%;
      background:    rgba(255,255,255,0.22);
      transition:    background 0.4s ease, transform 0.4s ease;
    }

    .gallery-dot.kb-dot-active {
      background: rgba(255,255,255,0.88);
      transform:  scale(1.4);
    }

    .media-caption {
      font-size: clamp(10px, 0.95vw, 14px);
      color:     var(--label-3);
    }

    /* ─── Closing slide ──────────────────────────────────────────── */
    .cta {
      font-size:   clamp(14px, 1.6vw, 24px);
      font-weight: 500;
      color:       var(--accent);
    }

    .contact {
      font-size: clamp(11px, 1vw, 16px);
      color:     var(--label-3);
    }

    /* ─── Stats bento ────────────────────────────────────────────── */
    .slide-stats .slide-inner {
      gap: clamp(6px, 0.9vw, 14px);
      justify-content: flex-start;
      padding-top: clamp(12px, 2vh, 30px);
    }

    .stats-grid {
      display:               grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows:        minmax(clamp(62px, 8vh, 105px), auto);
      gap:                   clamp(8px, 1.1vw, 16px);
      width:                 100%;
    }

    .stat-card {
      display:        flex;
      flex-direction: column;
      justify-content: flex-end;
      gap:             clamp(3px, 0.4vw, 6px);
      padding:         clamp(14px, 1.8vw, 26px);
      background:      var(--glass-bg);
      border:          1px solid var(--glass-bdr);
      border-radius:   clamp(10px, 1.3vw, 20px);
      box-shadow:      var(--glass-shd);
      position:        relative;
      overflow:        visible;
      min-width:       0; /* prevent 1fr grid columns from expanding to fit nowrap content */
    }

    /* Featured: spans 2 columns */
    .stat-card.stat-featured {
      grid-column: span 2;
    }

    .stat-label {
      font-size:      clamp(10px, 1vw, 14px);
      font-weight:    500;
      color:          var(--label-2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .stat-value {
      font-size:      clamp(28px, 4.2vw, 62px);
      font-weight:    700;
      color:          var(--accent);
      letter-spacing: -0.03em;
      line-height:    1;
      white-space:    nowrap;   /* never wrap mid-number */
    }

    .stat-card.stat-featured .stat-value {
      font-size: clamp(38px, 6.2vw, 92px); /* 2-col wide card can go bigger */
    }

    .stat-sublabel {
      font-size:   clamp(10px, 0.9vw, 13px);
      color:       var(--label-2);
      font-weight: 400;
    }

    /* ─── Progress bar ───────────────────────────────────────────── */
    #progress {
      position:   fixed;
      bottom:     0;
      left:       0;
      height:     2px;
      width:      0%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
      transition: width 0.45s cubic-bezier(0.16,1,0.3,1);
      z-index:    200;
    }

    /* ─── Emoji Rain ─────────────────────────────────────────────── */
    #emoji-rain {
      position:       fixed;
      inset:          0;
      pointer-events: none;
      z-index:        999;
      overflow:       hidden;
    }

    /* Back-layer lives inside the closing slide so it respects the
       slide's GSAP-created stacking context and sits behind the text */
    .emoji-rain-back {
      position:       absolute;
      inset:          0;
      overflow:       hidden;
      pointer-events: none;
      z-index:        0;
    }

    /* Slide-inner must sit above the back rain layer */
    .slide-closing .slide-inner {
      position: relative;
      z-index:  1;
    }

    .emoji-particle {
      position:    absolute;
      top:         -80px;
      line-height: 1;
      user-select: none;
      will-change: transform, opacity;
    }

    .emoji-particle.ep-front {
      font-size: clamp(24px, 3.5vw, 52px);
    }

    .emoji-particle.ep-back {
      font-size: clamp(14px, 2vw, 32px);
      filter:    blur(1.2px);
    }

    /* ─── SF Fog ─────────────────────────────────────────────────── */
    #sf-fog {
      position:       fixed;
      inset:          0;
      pointer-events: none;
      z-index:        8;   /* above slides, well below HUD (200) */
      overflow:       hidden;
    }

    .fog-particle {
      position:    absolute;
      line-height: 1;
      user-select: none;
      will-change: transform, opacity;
    }

    /* Deep background — Karl in all his glory. Huge, fully dissolved into bokeh */
    .fog-deep {
      font-size:   clamp(220px, 38vw, 520px);
      filter:      blur(32px);
      text-shadow: 0 0 80px  rgba(180, 210, 255, 0.50),
                   0 0 160px rgba(160, 190, 240, 0.28);
    }

    /* Mid layer — still massive, softer bokeh */
    .fog-mid {
      font-size:   clamp(160px, 26vw, 360px);
      filter:      blur(16px);
      text-shadow: 0 0 50px rgba(190, 215, 255, 0.38),
                   0 0 100px rgba(170, 200, 245, 0.18);
    }

    /* Near layer — large and lazy, just slightly in focus */
    .fog-near {
      font-size:   clamp(100px, 17vw, 240px);
      filter:      blur(6px);
      text-shadow: 0 0 28px rgba(200, 220, 255, 0.28);
    }

    /* ─── HUD (counter + hints) ──────────────────────────────────── */
    #hud {
      position:              fixed;
      bottom:                clamp(10px, 1.2vw, 18px);
      left:                  0;
      right:                 0;
      display:               grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:           center;
      padding:               0 clamp(16px, 2vw, 28px);
      pointer-events:        none;
      z-index:               200;
    }

    #hud-right {
      display:         flex;
      align-items:     center;
      justify-content: flex-end;
      gap:             clamp(8px, 1.2vw, 16px);
      pointer-events:  all;
    }

    .hud-label {
      font-size:       clamp(9px, 0.75vw, 11px);
      color:           var(--label-3);
      letter-spacing:  0.06em;
      font-variant-numeric: tabular-nums;
    }

    /* ─── Text size presets ──────────────────────────────────────── */
    /* ts-md is the default — no overrides needed                   */
    .ts-sm .headline                        { font-size: clamp(22px, 3.8vw, 56px); }
    .ts-sm .slide-title .headline           { font-size: clamp(26px, 5vw, 72px); }
    .ts-sm .closing-headline                { font-size: clamp(26px, 4.5vw, 66px); }
    .ts-sm .subheading                      { font-size: clamp(13px, 1.6vw, 24px); }
    .ts-sm .bullets li                      { font-size: clamp(14px, 1.9vw, 28px); }
    .ts-sm blockquote                       { font-size: clamp(16px, 2.6vw, 40px); }
    .ts-sm .col-title                       { font-size: clamp(11px, 1.1vw, 16px); }
    .ts-sm .col-text                        { font-size: clamp(9px, 0.9vw, 13px); }
    .ts-sm .eyebrow                         { font-size: clamp(10px, 1.1vw, 16px); }
    .ts-sm .stat-value                      { font-size: clamp(24px, 4.0vw, 62px); }
    .ts-sm .stat-card.stat-featured .stat-value { font-size: clamp(32px, 5.5vw, 82px); }
    .ts-sm .stat-label                      { font-size: clamp(8px, 0.85vw, 12px); }
    .ts-sm .stat-sublabel                   { font-size: clamp(8px, 0.75vw, 11px); }
    .ts-sm cite                             { font-size: clamp(10px, 1vw, 15px); }
    .ts-sm .media-caption,
    .ts-sm .slide-note                      { font-size: clamp(9px, 0.8vw, 12px); }

    .ts-lg .headline                        { font-size: clamp(30px, 5.4vw, 80px); }
    .ts-lg .slide-title .headline           { font-size: clamp(38px, 7.2vw, 104px); }
    .ts-lg .closing-headline                { font-size: clamp(38px, 6.5vw, 94px); }
    .ts-lg .subheading                      { font-size: clamp(19px, 2.6vw, 36px); }
    .ts-lg .bullets li                      { font-size: clamp(20px, 2.7vw, 40px); }
    .ts-lg blockquote                       { font-size: clamp(24px, 3.8vw, 56px); }

    /* ─── Word-split inner spans ────────────────────────────────── */

    /* ─── Pre-hide animatable children ──────────────────────────── */
    /* Set opacity:0 before JS loads so there's no flash of content  */
    /* before GSAP's fromTo() takes over. GSAP overrides via inline  */
    /* styles, so these rules have no effect during/after animation. */
    .slide .eyebrow,
    .slide .slide-icon,
    .slide .headline,
    .slide .subheading,

<body>

<!-- Perlin atmosphere layers (gobo blobs → starfield → bokeh) -->
<div id="gobo-layer"  aria-hidden="true"></div>
<div id="starfield"   aria-hidden="true"></div>
<div id="bokeh-layer" aria-hidden="true"></div>

<div id="deck">
{{SLIDES}}
</div>

<div id="progress"></div>
<div id="sf-fog"></div>
<div id="emoji-rain"></div>

<div id="hud">
  <div id="nav-jumps">
    <button class="ts-btn" id="btn-first" title="Jump to first slide">⏮</button>
    <button class="ts-btn" id="btn-last"  title="Jump to last slide">⏭</button>
    <button class="ts-btn" id="btn-emoji-toggle" title="Toggle emoji rain">😅</button>
  </div>
  <span class="hud-label" id="counter">1 / {{SLIDE_COUNT}}</span>
  <div id="hud-right">
    <span class="hud-label" id="hint">← → &nbsp;·&nbsp; F fullscreen</span>
    <div id="text-sizer">
      <button class="ts-btn" data-ts="sm">A−</button>
      <button class="ts-btn ts-active" data-ts="md">A</button>
      <button class="ts-btn" data-ts="lg">A+</button>
      <button class="ts-btn" data-ts="xl">A++</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ── Constants ────────────────────────────────────────────────────
  const TOTAL   = {{SLIDE_COUNT}};
  const slides  = Array.from(document.querySelectorAll('.slide'));

  // Apple expo-out easing — same curve iOS/macOS use for most transitions
  const EASE_OUT    = 'cubic-bezier(0.16, 1, 0.3, 1)';
  const EASE_SPRING = 'back.out(1.5)';
  const EASE_SOFT   = 'cubic-bezier(0.25, 0.46, 0.45, 0.94)';
  const DUR         = 0.6;

  let current   = 0;
  let animating = false;

  // ── Perlin noise (smoothstep 2-D gradient noise) ─────────────────
  // Used to drive gobo blobs, bokeh drift, and star shimmer.
  // Self-contained: builds its own permutation table so each page
  // load produces a unique animation without any external dependency.
  const _p = new Uint8Array(512);
  (function () {
    const t = new Uint8Array(256);
    for (let i = 0; i < 256; i++) t[i] = i;
    for (let i = 255; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [t[i], t[j]] = [t[j], t[i]];
    }
    _p.set(t); _p.set(t, 256);
  }());
  function _fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
  function _lerp(a, b, t) { return a + t * (b - a); }
  function _grad(h, x, y) {
    const v = h & 3;
    return v === 0 ? x + y : v === 1 ? -x + y : v === 2 ? x - y : -x - y;
  }
  function pnoise(x, y) {
    const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
    x -= Math.floor(x); y -= Math.floor(y);
    const u = _fade(x), v = _fade(y);
    const a = _p[X] + Y, b = _p[X + 1] + Y;
    return _lerp(
      _lerp(_grad(_p[a],     x,     y),   _grad(_p[b],     x - 1, y),   u),
      _lerp(_grad(_p[a + 1], x,     y - 1), _grad(_p[b + 1], x - 1, y - 1), u), v);
  }

  // ── Perlin gobo blobs ────────────────────────────────────────────
  // Slow-drifting radial blobs driven by 2-D Perlin noise — each blob
  // wanders a different path, creating an ever-changing ambient glow.
  function initGobos() {
    const layer = document.getElementById('gobo-layer');
    if (!layer) return;

    // Accent colors pulled from the design token palette
    const CFG = [
      { color: 'rgba(10,132,255,0.20)',  sz: 58, blur: 130, range: 22 },  // blue
      { color: 'rgba(88,86,214,0.16)',   sz: 48, blur: 110, range: 18 },  // purple
      { color: 'rgba(0,199,190,0.12)',   sz: 42, blur: 100, range: 24 },  // teal
      { color: 'rgba(255,159,10,0.10)',  sz: 36, blur:  90, range: 20 },  // amber (accent variety)
    ];

    const blobs = CFG.map(({ color, sz, blur, range }, i) => {
      const el = document.createElement('div');
      Object.assign(el.style, {
        position:      'fixed',
        width:         sz  + 'vw',
        height:        sz  + 'vw',
        borderRadius:  '50%',
        background:    `radial-gradient(circle, ${color}, transparent 70%)`,
        filter:        `blur(${blur}px)`,
        pointerEvents: 'none',
        willChange:    'transform',
        top:           '0',
        left:          '0',
      });
      layer.appendChild(el);
      return {
        el,
        ox: Math.random() * 100,          // unique noise offset X
        oy: Math.random() * 100,          // unique noise offset Y
        cx: 15 + Math.random() * 70,      // centre %, keeps blobs on-screen
        cy: 15 + Math.random() * 70,
        range,
      };
    });

    gsap.ticker.add(time => {
      const t = time * 0.038;
      blobs.forEach(({ el, ox, oy, cx, cy, range }) => {
        const px = cx + pnoise(t + ox, oy)          * range;
        const py = cy + pnoise(ox,     t + oy * 1.3) * range;
        // Use transform (not left/top) for GPU compositing
        gsap.set(el, { x: px + 'vw', y: py + 'vh', xPercent: -50, yPercent: -50 });
      });
    });
  }

  // ── Starfield ────────────────────────────────────────────────────
  // Tiny white dots that twinkle independently — pure CSS + GSAP, no
  // canvas, so they respect the presentation's stacking context and
  // stay invisible in light theme via the CSS opacity:0.3 override.
  function initStarfield() {
    const layer = document.getElementById('starfield');
    if (!layer) return;

    const COUNT = 95;
    for (let i = 0; i < COUNT; i++) {
      const el  = document.createElement('div');
      const sz  = 1 + Math.random() * 2.2;
      const x   = Math.random() * 100;
      const y   = Math.random() * 100;
      const op  = 0.18 + Math.random() * 0.52;

      Object.assign(el.style, {
        position:      'absolute',
        width:         sz + 'px',
        height:        sz + 'px',
        borderRadius:  '50%',
        background:    '#ffffff',
        left:          x + '%',
        top:           y + '%',
        opacity:       op,
      });
      layer.appendChild(el);

      // Each star twinkles at its own random cadence
      gsap.to(el, {
        opacity:  op * (0.15 + Math.random() * 0.65),
        duration: 1.8 + Math.random() * 4.5,
        repeat:   -1,
        yoyo:     true,
        ease:     'sine.inOut',
        delay:    Math.random() * 6,
      });
    }
  }

  // ── Bokeh ────────────────────────────────────────────────────────
  // Large, heavily blurred glowing discs that drift slowly — mimics
  // out-of-focus light sources (city lights, stage rigs, etc.).
  // Keeps opacity low so slides stay legible at all sizes.
  function initBokeh() {
    const layer = document.getElementById('bokeh-layer');
    if (!layer) return;

    const COLORS = [
      'rgba(10,132,255,0.85)',   // accent blue
      'rgba(88,86,214,0.75)',    // purple
      'rgba(0,199,190,0.65)',    // teal
      'rgba(255,255,255,0.55)',  // white highlight
      'rgba(255,159,10,0.55)',   // amber
    ];

    for (let i = 0; i < 15; i++) {
      const color  = COLORS[Math.floor(Math.random() * COLORS.length)];
      const sz     = 48 + Math.random() * 110;  // px
      const blurPx = 14 + Math.random() * 28;
      const op     = 0.04 + Math.random() * 0.07;
      const el     = document.createElement('div');

      Object.assign(el.style, {
        position:      'absolute',
        width:         sz + 'px',
        height:        sz + 'px',
        borderRadius:  '50%',
        background:    `radial-gradient(circle, ${color}, transparent 68%)`,
        filter:        `blur(${blurPx}px)`,
        left:          Math.random() * 100 + '%',
        top:           Math.random() * 100 + '%',
        opacity:       op,
        pointerEvents: 'none',
        willChange:    'transform, opacity',
      });
      layer.appendChild(el);

      // Slow parallax drift + gentle opacity breathe
      gsap.to(el, {
        x:        (Math.random() - 0.5) * 220,
        y:        (Math.random() - 0.5) * 180,
        opacity:  op * (0.35 + Math.random() * 1.1),
        duration: 9 + Math.random() * 16,
        repeat:   -1,
        yoyo:     true,
        ease:     'sine.inOut',
        delay:    Math.random() * 9,
      });
    }
  }

  // ── Ken Burns Gallery ────────────────────────────────────────────
  const _kbTimers = new Map();

  function _startGallery(slide) {
    const gallery = slide.querySelector('.gallery-kb');
    if (!gallery) return;
    const kbSlides = Array.from(gallery.querySelectorAll('.kb-slide'));
    const dots     = Array.from(slide.querySelectorAll('.gallery-dot'));
    if (!kbSlides.length) return;

    let idx = 0;
    // Fade first photo in via GSAP
    gsap.to(kbSlides[0], { opacity: 1, duration: 0.8, ease: 'power2.inOut' });
    if (dots[0]) dots[0].classList.add('kb-dot-active');

    const timer = setInterval(() => {
      const prev = idx;
      idx = (idx + 1) % kbSlides.length;
      // Simultaneous GSAP crossfade — no snap, no hitch
      gsap.to(kbSlides[prev], { opacity: 0, duration: 1.2, ease: 'power2.inOut' });
      gsap.to(kbSlides[idx],  { opacity: 1, duration: 1.2, ease: 'power2.inOut' });
      if (dots[prev]) dots[prev].classList.remove('kb-dot-active');
      if (dots[idx])  dots[idx].classList.add('kb-dot-active');
    }, 3800);

    _kbTimers.set(slide, timer);
  }

  function _stopGallery(slide) {
    const t = _kbTimers.get(slide);
    if (t) { clearInterval(t); _kbTimers.delete(slide); }
    const gallery = slide.querySelector('.gallery-kb');
    if (!gallery) return;
    gsap.set(gallery.querySelectorAll('.kb-slide'), { opacity: 0 });
    slide.querySelectorAll('.gallery-dot').forEach(d => d.classList.remove('kb-dot-active'));
  }

  // ── Emoji Rain ──────────────────────────────────────────────────
  const RAIN_EMOJIS = ['🌉','🔑','💰','📈','🏡','🎉','✨','🎊','💫','🥂','🏠','💎'];
  let _rainInterval      = null;
  let _rainBackEl        = null;   // .emoji-rain-back inside closing slide
  let _emojiRainEnabled  = false;  // off by default — toggle with 😅 button

  function _spawnEmoji(isBack) {
    // Back-layer goes inside the slide (behind text); front goes on fixed overlay
    const container = isBack
      ? _rainBackEl
      : document.getElementById('emoji-rain');
    if (!container) return;

    const el = document.createElement('span');
    el.className   = 'emoji-particle ' + (isBack ? 'ep-back' : 'ep-front');
    el.textContent = RAIN_EMOJIS[Math.floor(Math.random() * RAIN_EMOJIS.length)];

    const startX = Math.random() * 105 - 2;
    const drift  = (Math.random() - 0.5) * (isBack ? 80 : 140);
    const rot    = (Math.random() - 0.5) * 540;
    // Back emojis fall slower + start more transparent → feel farther away
    const dur    = isBack
      ? 4.0 + Math.random() * 2.8
      : 2.8 + Math.random() * 2.4;
    const maxOp  = isBack ? 0.38 : 1;
    const scale  = isBack
      ? 0.4 + Math.random() * 0.45
      : 0.7 + Math.random() * 0.7;
    const delay  = Math.random() * 0.3;
    const fallH  = isBack ? container.offsetHeight + 120 : window.innerHeight + 140;

    gsap.set(el, { left: startX + 'vw', top: '-80px', opacity: 0, rotation: 0, scale });
    container.appendChild(el);

    gsap.timeline({ onComplete: () => el.remove() })
      .to(el, { opacity: maxOp, duration: 0.35, ease: 'power2.out', delay })
      .to(el, { y: fallH, x: drift, rotation: rot, duration: dur, ease: 'none' }, '<0.1')
      .to(el, { opacity: 0, duration: 0.7, ease: 'power1.in' }, `-=0.85`);
  }

  function startEmojiRain(slide) {
    stopEmojiRain(); // always clear first — prevents stuck state from stale intervals
    _rainBackEl = slide ? slide.querySelector('.emoji-rain-back') : null;

    // Initial burst — mix of front and back for instant depth
    for (let i = 0; i < 22; i++) {
      setTimeout(() => _spawnEmoji(i % 3 === 0), i * 55);
    }
    // Steady rain: ~60% front, 40% back
    _rainInterval = setInterval(() => _spawnEmoji(Math.random() < 0.4), 180);
  }

  function stopEmojiRain() {
    if (_rainInterval) { clearInterval(_rainInterval); _rainInterval = null; }
    _rainBackEl = null;
    document.querySelectorAll('.emoji-particle').forEach(el => {
      gsap.to(el, { opacity: 0, duration: 0.4, onComplete: () => el.remove() });
    });
  }

  // ── SF Fog ──────────────────────────────────────────────────────
  // Three depth layers drift right-to-left (ocean fog direction).
  // Each layer has different blur, bokeh glow, opacity, and speed —
  // together they create a parallax atmosphere over all slides.
  // Perlin noise drives each cloud's Y so they curl and breathe
  // organically rather than sliding in a straight line.
  const FOG_LAYERS = [
    // [ cssClass, minOp, maxOp, minDur, maxDur, weight ]
    ['fog-deep', 0.06, 0.11,  90, 150, 6],  // Karl — enormous, glacial, dominant
    ['fog-mid',  0.08, 0.13,  70, 110, 3],  // supporting mass
    ['fog-near', 0.09, 0.15,  55,  85, 1],  // rare, nearly as slow
  ];
  // Weighted layer picker
  const _fogLayerPool = FOG_LAYERS.flatMap(([cls,,,,,w]) => Array(w).fill(cls));

  // Active fog particles tracked for Perlin Y drive
  const _fogActive = [];

  function _spawnFogCloud() {
    const fog = document.getElementById('sf-fog');
    const el  = document.createElement('span');

    // Pick depth layer
    const layerCls = _fogLayerPool[Math.floor(Math.random() * _fogLayerPool.length)];
    const cfg = FOG_LAYERS.find(l => l[0] === layerCls);
    const [cls, minOp, maxOp, minDur, maxDur] = cfg;

    el.className   = 'fog-particle ' + cls;
    el.textContent = '☁️';

    const fromRight = Math.random() > 0.18;          // mostly right→left like real SF fog
    const startX    = fromRight ?  108 : -40;        // vw
    const endX      = fromRight ? -42  :  110;       // vw
    const y         = Math.random() * 92;            // vh — fill whole screen
    const dur       = minDur + Math.random() * (maxDur - minDur);
    const op        = minOp  + Math.random() * (maxOp  - minOp);
    const fadeT     = dur * 0.14;

    // Perlin offsets — each cloud wanders a unique path
    const ox       = Math.random() * 100;
    const oy       = Math.random() * 100;
    // Deeper layers wander less (heavier mass), near wisps wander more
    const yRange   = cls === 'fog-deep' ? 38 : cls === 'fog-mid' ? 60 : 88;
    const tSpeed   = cls === 'fog-deep' ? 0.012 : cls === 'fog-mid' ? 0.018 : 0.026;

    gsap.set(el, { left: startX + 'vw', top: y + 'vh', opacity: 0 });
    fog.appendChild(el);

    const entry = { el, ox, oy, yRange, tSpeed, alive: true };
    _fogActive.push(entry);

    gsap.timeline({
      onComplete: () => {
        entry.alive = false;
        el.remove();
      }
    })
      .to(el, { opacity: op, duration: fadeT, ease: 'power1.in' })
      .to(el, { left: endX + 'vw', duration: dur, ease: 'none' }, 0)
      .to(el, { opacity: 0, duration: fadeT, ease: 'power1.out' }, `-=${fadeT}`);
  }

  function _startFog() {
    // Seed: immediately place clouds at random x positions so there's no
    // awkward empty-screen moment at the start
    for (let i = 0; i < 6; i++) {
      setTimeout(() => {
        const fog = document.getElementById('sf-fog');
        const el  = document.createElement('span');
        const layerCls = _fogLayerPool[Math.floor(Math.random() * _fogLayerPool.length)];
        const cfg = FOG_LAYERS.find(l => l[0] === layerCls);
        const [cls, minOp, maxOp, minDur, maxDur] = cfg;
        el.className   = 'fog-particle ' + cls;
        el.textContent = '☁️';
        const x      = Math.random() * 100;
        const y      = Math.random() * 92;
        const dur    = minDur + Math.random() * (maxDur - minDur);
        const op     = (minOp + Math.random() * (maxOp - minOp)) * 0.75;
        const ox     = Math.random() * 100;
        const oy     = Math.random() * 100;
        const yRange = cls === 'fog-deep' ? 38 : cls === 'fog-mid' ? 60 : 88;
        const tSpeed = cls === 'fog-deep' ? 0.012 : cls === 'fog-mid' ? 0.018 : 0.026;

        gsap.set(el, { left: x + 'vw', top: y + 'vh', opacity: op });
        fog.appendChild(el);

        const entry = { el, ox, oy, yRange, tSpeed, alive: true };
        _fogActive.push(entry);

        const endX = x - 55 - Math.random() * 55;
        gsap.to(el, {
          left: endX + 'vw', opacity: 0, duration: dur, ease: 'none',
          onComplete: () => { entry.alive = false; el.remove(); }
        });
      }, i * 200);
    }

    // Steady new clouds every 6s — unhurried, like real marine layer
    setInterval(_spawnFogCloud, 6000);

    // Perlin Y drive for all active fog clouds — runs every frame.
    // X is owned by the GSAP tween (left CSS), Y is owned by transform —
    // no conflict. Culls dead entries to keep the array lean.
    gsap.ticker.add(time => {
      // Cull dead entries periodically
      if (_fogActive.length > 30) {
        for (let i = _fogActive.length - 1; i >= 0; i--) {
          if (!_fogActive[i].alive) _fogActive.splice(i, 1);
        }
      }
      const t = time;
      _fogActive.forEach(({ el, ox, oy, yRange, tSpeed, alive }) => {
        if (!alive) return;
        gsap.set(el, { y: pnoise(t * tSpeed + ox, oy) * yRange });
      });
    });
  }

  // ── Word-split utility ───────────────────────────────────────────
  // Wraps each word in a <span class="wi"> for staggered word reveals.
  // Idempotent — returns existing spans on repeat calls.
  // Preserves <br> and other inline elements as-is.
  function splitWords(el) {
    if (!el) return [];
    if (el.dataset.ws) return Array.from(el.querySelectorAll('.wi'));
    el.dataset.ws = '1';
    const nodes = Array.from(el.childNodes);
    el.innerHTML = '';
    const spans = [];
    nodes.forEach(node => {
      if (node.nodeType === Node.ELEMENT_NODE) {
        el.appendChild(node); return; // preserve <br> etc.
      }
      node.textContent.split(/(\s+)/).forEach(part => {
        if (/^\s+$/.test(part)) { el.appendChild(document.createTextNode(part)); return; }
        if (!part) return;
        const s = document.createElement('span');
        s.className = 'wi';
        s.textContent = part;
        el.appendChild(s);
        spans.push(s);
      });
    });
    return spans;
  }

  // ── Animate a slide's children in ───────────────────────────────
  // Uses fromTo() exclusively so start AND end states are unambiguous —
  // gsap.from() alone breaks when elements were previously set to opacity:0.
  function animateIn(slide) {
    const type = (Array.from(slide.classList)
      .find(c => c.startsWith('slide-') && c !== 'slide-inner') || '')
      .replace('slide-', '');

    const tl = gsap.timeline();

    const get  = sel => slide.querySelector(sel);
    const getA = sel => Array.from(slide.querySelectorAll(sel));

    const eyebrow   = get('.eyebrow');
    const icon      = get('.slide-icon');
    const headline  = get('.headline');
    const sub       = get('.subheading');
    const bullets   = getA('.bullets li');
    const bq        = get('blockquote');
    const cite      = get('cite');
    const watermark = get('.quote-watermark');
    const cols      = getA('.col');
    const frame     = get('.media-frame');
    const gframe    = get('.gallery-frame');
    const caption   = get('.media-caption');
    const cta       = get('.cta');
    const contact   = get('.contact');
    const note      = get('.slide-note');

    const S = 0.09; // stagger per item

    // Helper: fromTo with visible end state — always resets rotation/filter
    const ft = (el, from, opts, pos) => {
      if (!el) return;
      tl.fromTo(el, from, {
        y: 0, x: 0, scale: 1, opacity: 1, rotateX: 0, rotateY: 0,
        ...opts
      }, pos);
    };

    // Eyebrow clip-path wipe: left → right reveal
    const ftEyebrow = (pos) => {
      if (!eyebrow) return;
      tl.fromTo(eyebrow,
        { opacity: 1, clipPath: 'inset(0 100% 0 0)' },
        { opacity: 1, clipPath: 'inset(0 0% 0 0)', duration: 0.52, ease: EASE_OUT }, pos);
    };

    // Headline word-stagger + Apple-style blur-to-sharp focus
    const ftWords = (el, pos, yAmt = 26) => {
      if (!el) return;
      const words = splitWords(el);
      // Container: snap opacity then blur-clear (depth-of-field focus pull)
      tl.fromTo(el,
        { opacity: 1, filter: 'blur(7px)' },
        { opacity: 1, filter: 'blur(0px)', duration: DUR * 1.15, ease: 'power2.out' }, pos);
      // Words: stagger up from below, riding the blur clear
      if (words.length) {
        tl.fromTo(words,
          { y: yAmt, opacity: 0 },
          { y: 0, opacity: 1, stagger: 0.065, duration: DUR * 0.95, ease: EASE_OUT }, pos);
      }
    };

    switch (type) {

      case 'title':
        ft(icon, { y: -16, opacity: 0 }, { duration: DUR * 0.75, ease: EASE_OUT }, 0);
        ftEyebrow(0.06);
        ftWords(headline, icon || eyebrow ? 0.18 : 0, 32);
        ft(sub, { y: 20, opacity: 0 }, { duration: DUR, ease: EASE_OUT }, 0.38);
        break;

      case 'content':
        ftEyebrow(0);
        ftWords(headline, 0.12, 22);
        bullets.forEach((li, i) =>
          ft(li, { x: -18, opacity: 0 }, { duration: DUR * 0.85, ease: EASE_OUT }, 0.26 + i * S));
        ft(note, { opacity: 0 }, { duration: DUR * 0.55, ease: EASE_SOFT }, 0.26 + bullets.length * S + 0.1);
        break;

      case 'quote': {
        if (watermark) tl.fromTo(watermark,
          { opacity: 0, scale: 1.4 },
          { opacity: 0.065, scale: 1, duration: 0.95, ease: EASE_OUT }, 0);
        ft(icon, { scale: 0.7, opacity: 0 }, { duration: DUR * 0.75, ease: EASE_SPRING }, 0.1);
        ftEyebrow(0.18);
        const bqWords = splitWords(bq);
        if (bq) tl.set(bq, { opacity: 1 }, 0);
        if (bqWords.length) tl.fromTo(bqWords,
          { y: 18, opacity: 0 },
          { y: 0, opacity: 1, stagger: 0.04, duration: DUR, ease: EASE_OUT }, 0.28);
        ft(cite, { y: 12, opacity: 0 }, { duration: DUR * 0.7, ease: EASE_SOFT }, 0.52);
        ft(get('.quote-credit'), { y: 8, opacity: 0 }, { duration: DUR * 0.6, ease: EASE_SOFT }, 0.66);
        break;
      }

      case 'two-column':
        ftEyebrow(0);
        ftWords(headline, 0.1, 18);
        ft(cols[0], { x: -42, opacity: 0, rotateX: 6, transformPerspective: 1200 },
          { duration: DUR, ease: EASE_OUT }, 0.24);
        ft(cols[1], { x:  42, opacity: 0, rotateX: 6, transformPerspective: 1200 },
          { duration: DUR, ease: EASE_OUT }, 0.34);
        bullets.forEach((li, i) => ft(li, { y: 8, opacity: 0 },
          { duration: DUR * 0.65, ease: EASE_OUT }, 0.44 + i * 0.07));
        break;

      case 'stats': {
        ftEyebrow(0);
        ftWords(headline, 0.1, 18);
        const statCards = getA('.stat-card');
        statCards.forEach((card, i) =>
          ft(card, { y: 28, scale: 0.93, opacity: 0, rotateX: 12, transformPerspective: 900 },
            { duration: DUR * 1.05, ease: EASE_SPRING }, 0.2 + i * 0.09));
        tl.call(() => {
          slide.querySelectorAll('.stat-value[data-target]').forEach(el => {
            el.style.minWidth = el.offsetWidth + 'px';
            const raw    = el.dataset.target;
            const prefix = raw.match(/^[^0-9]*/)[0];
            const suffix = raw.match(/[^0-9.]*$/)[0];
            const num    = parseFloat(raw.replace(/[^0-9.]/g, '')) || 0;
            const isInt  = Number.isInteger(num);
            gsap.fromTo({ v: 0 }, { v: 0 }, {
              v: num, duration: 1.1, ease: 'power2.out',
              onUpdate: function () {
                const val = this.targets()[0].v;
                el.textContent = prefix + (isInt ? Math.round(val).toLocaleString() : val.toFixed(1)) + suffix;
              }
            });
          });
        }, [], 0.3);
        break;
      }

      case 'gallery':
        ftEyebrow(0);
        ftWords(headline, 0.08, 16);
        ft(gframe,  { scale: 1.04, opacity: 0, filter: 'blur(10px)' },
          { duration: DUR * 1.2, ease: EASE_OUT, filter: 'blur(0px)' }, 0.16);
        ft(caption, { opacity: 0 }, { duration: DUR * 0.6, ease: EASE_SOFT }, 0.55);
        tl.call(() => _startGallery(slide), [], 0.42);
        break;

      case 'media':
        ftWords(headline, 0, 18);
        ft(frame,   { scale: 1.05, opacity: 0, filter: 'blur(8px)' },
          { duration: DUR * 1.1, ease: EASE_OUT, filter: 'blur(0px)' }, headline ? 0.12 : 0);
        ft(caption, { opacity: 0 }, { duration: DUR * 0.6, ease: EASE_SOFT }, 0.45);
        break;

      case 'closing': {
        const closingWords = splitWords(headline);
        if (headline) tl.fromTo(headline,
          { opacity: 1, filter: 'blur(8px)' },
          { opacity: 1, filter: 'blur(0px)', duration: DUR * 1.2, ease: 'power2.out' }, 0);
        if (closingWords.length) tl.fromTo(closingWords,
          { scale: 0.86, opacity: 0, rotateX: 10, transformPerspective: 1000 },
          { scale: 1, opacity: 1, rotateX: 0, stagger: 0.08, duration: DUR * 1.15, ease: EASE_SPRING }, 0);
        ft(cta,     { y: 20, opacity: 0 }, { duration: DUR,        ease: EASE_OUT  }, 0.34);
        ft(contact, { opacity: 0 },        { duration: DUR * 0.75, ease: EASE_SOFT }, 0.50);
        tl.call(() => { if (_emojiRainEnabled && slides[current] === slide) startEmojiRain(slide); }, [], 0.5);
        break;
      }

      default: {
        const all = [icon, eyebrow, headline, sub, bq, cite,
                     frame, caption, cta, contact, note,
                     ...bullets, ...cols].filter(Boolean);
        all.forEach((el, i) => ft(el, { y: 12, opacity: 0 },
          { duration: DUR, ease: EASE_OUT }, i * S));
      }
    }

    return tl;
  }

  // ── Reset slide children to hidden before entering ──────────────
  // Called before a slide becomes active to prevent flashing of
  // previously-animated content (which has GSAP inline opacity:1).
  const CHILD_SEL = '.eyebrow, .slide-icon, .headline, .subheading, ' +
    '.bullets li, blockquote, cite, .quote-credit, .col, .stat-card, .media-frame, .gallery-frame, ' +
    '.media-caption, .cta, .contact, .slide-note';

  function resetSlide(slide) {
    _stopGallery(slide);
    stopEmojiRain();
    gsap.set(slide.querySelectorAll(CHILD_SEL), { opacity: 0 });
    // Reset split word spans so they don't flash visible when headline container is revealed
    gsap.set(slide.querySelectorAll('.wi'), { y: 26, opacity: 0, scale: 1 });
    gsap.set(slide.querySelectorAll('.headline, blockquote'), { filter: 'none' });
    const wm = slide.querySelector('.quote-watermark');
    if (wm) gsap.set(wm, { opacity: 0, scale: 1.4 });
  }

  // ── Navigate to a slide ──────────────────────────────────────────
  function goTo(next, dir) {
    if (next < 0 || next >= TOTAL || animating) return;
    animating = true;

    const from = slides[current];
    const to   = slides[next];
    const dx   = dir * 36;

    _stopGallery(from);      // stop Ken Burns on outgoing slide
    resetSlide(to);          // hide incoming slide's children before visible

    // Outgoing slide
    gsap.to(from, {
      opacity: 0,
      x: -dx,
      duration: 0.28,
      ease: EASE_SOFT,
      onComplete() {
        from.classList.remove('active');
        gsap.set(from, { clearProps: 'x,opacity' });
      }
    });

    // Incoming slide — starts offset, snaps to 0
    gsap.set(to, { opacity: 1, x: dx * 0.6 });
    to.classList.add('active');

    gsap.to(to, {
      x: 0,
      duration: 0.35,
      ease: EASE_OUT,
      delay: 0.12,
      onComplete() { animating = false; }
    });

    // Animate content in after slide starts arriving
    setTimeout(() => animateIn(to), 100);

    current = next;
    updateHUD();
  }

  // ── HUD ──────────────────────────────────────────────────────────
  function updateHUD() {
    document.getElementById('counter').textContent = `${current + 1} / ${TOTAL}`;
    document.getElementById('progress').style.width = `${((current + 1) / TOTAL) * 100}%`;
  }

  // ── Hide hint after first interaction ───────────────────────────
  let hintDismissed = false;
  function dismissHint() {
    if (hintDismissed) return;
    hintDismissed = true;
    const hint = document.getElementById('hint');
    gsap.to(hint, { opacity: 0, duration: 0.4 });
  }

  // ── Input handling ───────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    dismissHint();
    switch (e.key) {
      case 'ArrowRight': case 'ArrowDown': case ' ':
        e.preventDefault(); goTo(current + 1, 1); break;
      case 'ArrowLeft': case 'ArrowUp':
        e.preventDefault(); goTo(current - 1, -1); break;
      case 'f': case 'F':
        toggleFullscreen(); break;
      case 'Home':
        e.preventDefault(); goTo(0, -1); break;
      case 'End':
        e.preventDefault(); goTo(TOTAL - 1, 1); break;
    }
  });

  document.getElementById('deck').addEventListener('click', e => {
    dismissHint();
    const rect = e.currentTarget.getBoundingClientRect();
    const frac = (e.clientX - rect.left) / rect.width;
    goTo(frac > 0.42 ? current + 1 : current - 1, frac > 0.42 ? 1 : -1);
  });

  // Touch / swipe
  let t0x = 0, t0y = 0;
  document.addEventListener('touchstart', e => {
    t0x = e.touches[0].clientX;
    t0y = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - t0x;
    const dy = e.changedTouches[0].clientY - t0y;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      dismissHint();
      goTo(current + (dx < 0 ? 1 : -1), dx < 0 ? 1 : -1);
    }
  }, { passive: true });

  // ── Fullscreen ───────────────────────────────────────────────────
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.().catch(() => {});
    } else {
      document.exitFullscreen?.();
    }
  }

  // ── Init ─────────────────────────────────────────────────────────
  const first = slides[0];
  first.classList.add('active');
  gsap.set(first, { opacity: 1 });
  resetSlide(first);   // guarantee all children start at opacity:0 via
                       // inline styles *before* the first RAF fires,
                       // so there's no 1-frame flash even if CSS pre-hide
                       // loses a specificity battle or paints late.
  animateIn(first);
  updateHUD();

  // Perlin atmosphere — runs throughout the entire presentation
  initGobos();      // slow-drifting radial blobs (Perlin-driven)
  initStarfield();  // twinkling star field
  initBokeh();      // blurred bokeh discs

  _startFog();    // SF fog — ambient across all slides

  // ── Jump buttons ─────────────────────────────────────────────────
  document.getElementById('btn-first').addEventListener('click', e => {
    e.stopPropagation();
    if (current !== 0) goTo(0, -1);
  });
  document.getElementById('btn-last').addEventListener('click', e => {
    e.stopPropagation();
    if (current !== TOTAL - 1) goTo(TOTAL - 1, 1);
  });

  // ── Emoji rain toggle ─────────────────────────────────────────────
  document.getElementById('btn-emoji-toggle').addEventListener('click', e => {
    e.stopPropagation();
    _emojiRainEnabled = !_emojiRainEnabled;
    document.getElementById('btn-emoji-toggle').classList.toggle('ts-active', _emojiRainEnabled);
    // If we're currently on the closing slide, start/stop immediately
    const activeSlide = slides[current];
    if (activeSlide && activeSlide.dataset.type === 'closing') {
      _emojiRainEnabled ? startEmojiRain(activeSlide) : stopEmojiRain();
    }
  });

  // ── Text size control ────────────────────────────────────────────
  const TS_CLASSES = ['ts-sm', 'ts-md', 'ts-lg', 'ts-xl'];

  function applyTextSize(size) {
    TS_CLASSES.forEach(c => document.documentElement.classList.remove(c));
    if (size !== 'md') document.documentElement.classList.add(`ts-${size}`);
    document.querySelectorAll('.ts-btn').forEach(b => {
      b.classList.toggle('ts-active', b.dataset.ts === size);
    });
    try { localStorage.setItem('pres-ts', size); } catch(e) {}
  }

  document.querySelectorAll('.ts-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      applyTextSize(btn.dataset.ts);
    });
  });

  // Restore saved preference
  try {
    const saved = localStorage.getItem('pres-ts');
    if (saved && TS_CLASSES.includes(`ts-${saved}`)) applyTextSize(saved);
  } catch(e) {}

  // Fade hint out after 4 s of inactivity
  setTimeout(() => {
    if (!hintDismissed) gsap.to(document.getElementById('hint'), { opacity: 0, duration: 0.6 });
  }, 4000);

}());
</script>

</body>
</html>
